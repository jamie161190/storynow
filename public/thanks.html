<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HearTheirName</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<script>
// Legacy route. The old verify-email flow used to land here. The current
// flow sends customers straight from /start to /preview/{id}?t={token},
// so this page only ever sees stragglers from very old mailings.
// If a story id + token are present, bounce to the live preview page.
// Otherwise send them home.
(function(){
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var token = params.get('t');
  if (id && token) {
    window.location.replace('/preview/' + encodeURIComponent(id) + '?t=' + encodeURIComponent(token));
  } else {
    window.location.replace('/');
  }
})();
</script>
</head>
<body></body>
</html>
