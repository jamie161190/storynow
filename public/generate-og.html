<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FEFBF6 0%, #EDE8FF 50%, #F5F0FF 100%); font-family: sans-serif; }
.card {
  text-align: center;
  padding: 60px;
}
.logo { font-size: 64px; font-weight: 900; color: #7C5CFC; margin-bottom: 24px; letter-spacing: -1px; }
.tagline { font-size: 40px; font-weight: 800; color: #2D2844; line-height: 1.3; max-width: 800px; margin: 0 auto 20px; }
.highlight { color: #7C5CFC; }
.sub { font-size: 22px; color: #6B6490; font-weight: 500; max-width: 700px; margin: 0 auto 28px; line-height: 1.5; }
.price { display: inline-block; background: #7C5CFC; color: white; padding: 12px 32px; border-radius: 50px; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">storytold</div>
  <div class="tagline">Audio stories that know <span class="highlight">your child</span> by name</div>
  <div class="sub">Bedtime, adventure, or learning. Their name, their friends, their world.</div>
  <div class="price">Free preview, then just £9.99</div>
</div>
</body>
</html>
