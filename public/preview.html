// ─── Track preview play: fire ONCE per page session, lets admin see engagement ───
// Uses sessionStorage so refreshing the page counts as one new play, but pause/resume
// in the same session doesn't double-count.
function trackPreviewPlay(){
  if (!storyId) return;
  const key = 'htn_preview_played_' + storyId;
  if (sessionStorage.getItem(key)) return;
  sessionStorage.setItem(key, '1');
  // Fire-and-forget. We don't block playback on this.
  fetch('/api/track-preview-play', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ storyId, accessToken }),
  }).catch(() => {});
}

// ─── Contact-Jamie modal: button → modal → POST /api/contact-jamie ───
function setupContactJamie(){
  const openBtn = document.getElementById('contactJamieBtn');
  const playerAmendBtn = document.getElementById('playerAmendBtn');
  const overlay = document.getElementById('contactOverlay');
  const cancelBtn = document.getElementById('contactCancel');
  const sendBtn = document.getElementById('contactSend');
  const messageEl = document.getElementById('contactMessage');
  const statusEl = document.getElementById('contactStatus');
  if (!overlay) return;

  function open(){
    overlay.classList.add('show');
    statusEl.textContent = '';
    statusEl.className = 'contact-status';
    setTimeout(() => messageEl.focus(), 100);
  }
  function close(){
    overlay.classList.remove('show');
  }

  if (openBtn) openBtn.addEventListener('click', open);
  if (playerAmendBtn) playerAmendBtn.addEventListener('click', open);
  // Inline "clicking here" link in the From Jamie note at the bottom — scroll
  // the customer back up to the player area so they see the context shift,
  // then open the message modal so they can type.
  const finalLink = document.getElementById('finalJamieMsgLink');
  if (finalLink) finalLink.addEventListener('click', () => {
    const player = document.getElementById('player') || document.querySelector('.player') || document.body;
    player.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(open, 320);
  });
  cancelBtn.addEventListener('click', close);
  setupListenLater();
  // Close when clicking outside the card
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  // Close on Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('show')) close();
  });

  sendBtn.addEventListener('click', async () => {
    const msg = (messageEl.value || '').trim();
    if (msg.length < 3) {
      statusEl.textContent = 'A few words please.';
      statusEl.className = 'contact-status err';
      return;
    }
    sendBtn.disabled = true;
    cancelBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    statusEl.textContent = '';
    statusEl.className = 'contact-status';
    try {
      const res = await fetch('/api/contact-jamie', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ storyId, accessToken, message: msg }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) throw new Error(data.error || 'Send failed');
      statusEl.textContent = "Got it. I'll redo your preview and email you the new link.";
      statusEl.className = 'contact-status ok';
      messageEl.value = '';
      sendBtn.textContent = 'Sent ✓';
      setTimeout(close, 1800);
    } catch (e) {
      statusEl.textContent = 'Couldn\'t send: ' + (e.message || e) + '. Try emailing jamie@heartheirname.com instead.';
      statusEl.className = 'contact-status err';
      sendBtn.disabled = false;
      cancelBtn.disabled = false;
      sendBtn.textContent = 'Send to Jamie';
    }
  });
}

// ─── Player wiring: real audio + waveform progress + music toggle ───
function setupPlayer(){
  const audio = document.getElementById('audio');
  const bg = document.getElementById('bgMusic');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const cur = document.getElementById('curTime');
  const dur = document.getElementById('durTime');
  const waveform = document.getElementById('waveform');
  const bars = waveform ? waveform.querySelectorAll('span') : [];
  const musicBtn = document.getElementById('musicToggle');
  const musicLabel = document.getElementById('musicLabel');

  // Music defaults ON: it's part of the intended experience. Toggle is right
  // there if the customer wants to silence it.
  let musicOn = true;
  const TARGET_VOL = 0.4;
  if (bg) bg.volume = 0;

  function fmt(s){ if(!s||isNaN(s))return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
  function setPlayIcon(playing){
    playIcon.innerHTML = playing
      ? '<rect x="6" y="4.5" width="4" height="15" rx="1.2"/><rect x="14" y="4.5" width="4" height="15" rx="1.2"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }
  function fadeIn(){
    if (!bg) return;
    bg.volume = 0;
    let v = 0;
    const t = setInterval(() => { v += 0.04; if (v >= TARGET_VOL) { bg.volume = TARGET_VOL; clearInterval(t); } else bg.volume = v; }, 120);
  }
  function fadeOut(){
    if (!bg) return;
    let v = bg.volume;
    const t = setInterval(() => { v -= 0.04; if (v <= 0) { bg.volume = 0; bg.pause(); clearInterval(t); } else bg.volume = v; }, 120);
  }
  function paintWave(ratio){
    if (!bars.length) return;
    const cutoff = Math.floor(ratio * bars.length);
    bars.forEach((b, i) => {
      if (i < cutoff) b.classList.add('played');
      else b.classList.remove('played');
    });
  }

  function toggleMusic(){
    musicOn = !musicOn;
    musicBtn.classList.toggle('off', !musicOn);
    musicBtn.setAttribute('aria-pressed', String(musicOn));
    if (musicLabel) musicLabel.textContent = musicOn ? 'Music on' : 'Music off';
    if (musicOn) {
      if (!audio.paused && bg) { bg.play().catch(() => {}); fadeIn(); }
    } else {
      fadeOut();
    }
  }
  if (musicBtn) {
    musicBtn.addEventListener('click', toggleMusic);
    musicBtn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMusic(); }
    });
  }

  audio.addEventListener('loadedmetadata', () => dur.textContent = fmt(audio.duration));
  audio.addEventListener('timeupdate', () => {
    cur.textContent = fmt(audio.currentTime);
    const ratio = audio.duration ? audio.currentTime / audio.duration : 0;
    paintWave(ratio);
  });
  audio.addEventListener('ended', () => {
    setPlayIcon(false);
    fadeOut();
    paintWave(1);
  });

  // Wrap audio.play() — Safari throws on autoplay-blocked contexts; without a
  // catch we'd flip the icon to "playing" while no audio actually started.
  function tryPlay(){
    const p = audio.play();
    if (p && typeof p.catch === 'function') {
      p.catch(() => { setPlayIcon(false); });
    }
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused){
      tryPlay();
      setPlayIcon(true);
      if (musicOn && bg) { bg.play().catch(() => {}); fadeIn(); }
      trackPreviewPlay();
    } else {
      audio.pause();
      if (bg) bg.pause();
      setPlayIcon(false);
    }
  });

  if (waveform) {
    waveform.addEventListener('click', e => {
      const r = waveform.getBoundingClientRect();
      const ratio = (e.clientX - r.left) / r.width;
      if (audio.duration) {
        audio.currentTime = ratio * audio.duration;
        paintWave(ratio);
      }
    });
  }

  // ─── Media Session API ───────────────────────────────────────────────
  // Tells iOS / Android there's active media so playback continues when the
  // screen locks, and shows lock-screen + AirPods + Bluetooth controls with
  // the child's name + cover. Without this, locking the phone pauses audio
  // and there's no transport UI anywhere outside the tab.
  setupMediaSession(audio);
}

function setupMediaSession(audio){
  if (!('mediaSession' in navigator)) return;
  try {
    const childName = (lastChildName && lastChildName !== 'their') ? lastChildName : 'your child';
    const voice = (window.__lastVoice || '').trim();
    navigator.mediaSession.metadata = new MediaMetadata({
      title: `A story for ${childName}`,
      artist: voice ? `Read by ${voice}` : 'HearTheirName',
      album: 'HearTheirName · Preview',
      artwork: [
        { src: '/og-cover.png',  sizes: '512x512', type: 'image/png' },
        { src: '/apple-touch-icon.png', sizes: '180x180', type: 'image/png' },
        { src: '/favicon.png',  sizes: '192x192', type: 'image/png' }
      ]
    });
    navigator.mediaSession.setActionHandler('play',  () => { audio.play().catch(()=>{}); });
    navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
    navigator.mediaSession.setActionHandler('seekto', (d) => {
      if (d.seekTime != null && audio.duration) audio.currentTime = Math.min(audio.duration, Math.max(0, d.seekTime));
    });
    navigator.mediaSession.setActionHandler('seekbackward', () => {
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    });
    navigator.mediaSession.setActionHandler('seekforward', () => {
      if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
    });
    audio.addEventListener('play',  () => { navigator.mediaSession.playbackState = 'playing'; });
    audio.addEventListener('pause', () => { navigator.mediaSession.playbackState = 'paused'; });
  } catch (_) { /* Media Session unsupported on this browser — silent. */ }
}

// ─── Sticky CTA: hides while the audio player is on screen, shows everywhere else ───
//     Hidden via CSS at ≥720px regardless. The trigger is the audio player aside —
//     once it's scrolled off the top, the sticky takes its place and stays visible
//     all the way through founder, CTA, reviews, FAQ, final CTA, footer.
function setupStickyCta(){
  const sticky = document.getElementById('stickyBar');
  if (!sticky) return;

  // Observe every on-page CTA whose presence should suppress the sticky bar:
  // the player card itself (so the sticky doesn't sit under the player), and
  // every buy button on the page (so the sticky doesn't double up with a
  // visible CTA in the decision card or final-CTA block). Any of them
  // intersecting the viewport hides the sticky; once none are visible, the
  // sticky takes over.
  const watched = [
    document.querySelector('aside.player'),
    document.getElementById('playerBuyBtn'),
    document.getElementById('checkoutBtn1'),
    document.getElementById('checkoutBtn2')
  ].filter(Boolean);
  if (!watched.length) return;

  const visibleSet = new Set();
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) visibleSet.add(e.target);
      else visibleSet.delete(e.target);
    });
    // Show the sticky only when ZERO of the watched CTAs are visible —
    // i.e. the customer is in a no-CTA stretch of the page (scrolling
    // between blocks) and the sticky is the only call to action handy.
    if (visibleSet.size === 0) sticky.classList.add('show');
    else sticky.classList.remove('show');
  }, { threshold: 0, rootMargin: '0px' });
  watched.forEach(el => io.observe(el));
}

// ─── "Want to listen later" inline email-capture form ───
// Click the CTA → reveals two email fields (entry + confirm) → submit
// triggers /api/email-preview-link, which saves the email to the row AND
// fires the existing preview-ready template via Resend. Used for parents
// who can't listen in the moment AND as an early-funnel email-capture
// (their click on the inbox email primes deliverability of later sends).
function setupListenLater(){
  const cta = document.getElementById('playerLaterBtn');
  const form = document.getElementById('playerLaterForm');
  const emailEl = document.getElementById('playerLaterEmail');
  const confirmEl = document.getElementById('playerLaterEmailConfirm');
  const errEl = document.getElementById('playerLaterError');
  const sendBtn = document.getElementById('playerLaterSendBtn');
  if (!cta || !form || !emailEl || !confirmEl || !sendBtn) return;

  cta.addEventListener('click', () => {
    const expanded = !form.hidden;
    form.hidden = expanded;
    cta.setAttribute('aria-expanded', String(!expanded));
    if (!expanded) setTimeout(() => emailEl.focus(), 30);
  });

  function showError(msg){
    if (!errEl) return;
    errEl.textContent = msg;
    errEl.hidden = false;
  }
  function hideError(){
    if (!errEl) return;
    errEl.hidden = true;
  }
  emailEl.addEventListener('input', hideError);
  confirmEl.addEventListener('input', hideError);

  sendBtn.addEventListener('click', async () => {
    const a = (emailEl.value || '').trim();
    const b = (confirmEl.value || '').trim();
    if (!a || !b) { showError('Both fields please, so we know we have it right.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(a)) { showError('That email doesn\'t look right. Mind checking?'); return; }
    if (a.toLowerCase() !== b.toLowerCase()) { showError('Those don\'t match. Try again.'); return; }
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    try {
      const res = await fetch('/api/email-preview-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ storyId, accessToken, email: a }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) throw new Error(data.error || 'Send failed');
      // Replace the form contents in place with a calm confirmation
      form.classList.add('is-sent');
      form.innerHTML = '<p class="player-later-sent-msg">Go and check your email now, it should be there instantly. If it isn\'t in your inbox, have a quick look in your spam.</p>';
      capturedEmail = a;
    } catch (e) {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Email me the link';
      showError('Couldn\'t send: ' + (e.message || e) + '. Try again, or email jamie@heartheirname.com.');
    }
  });
}

// ─── Stripe checkout ───
// Email is collected by Stripe Checkout itself (one less form for us). The
// webhook reads `customer_details.email` back from the session and patches the
// row so the story-ready email lands. capturedEmail stays around for the rare
// case where we already know it (gift senders, returning customers via login).
let _checkoutInFlight = false;
async function startCheckout(){
  if (_checkoutInFlight) return;
  _checkoutInFlight = true;

  const btns = document.querySelectorAll('#checkoutBtn1, #checkoutBtn2, #stickyBtn, #playerBuyBtn');
  btns.forEach(b => { b.disabled = true; b.dataset.origText = b.textContent; b.textContent = 'Opening checkout…'; });

  // ── Meta Pixel: InitiateCheckout ──
  // Use a deterministic event_id so the server-side CAPI mirror (fired from
  // checkout-paid.mjs) deduplicates with the browser pixel.
  const checkoutEventId = 'checkout_' + storyId + '_' + Date.now();
  const fbp = window.htnPixel ? window.htnPixel.fbp() : '';
  const fbc = window.htnPixel ? window.htnPixel.fbc() : '';
  try {
    if (window.htnPixel) {
      window.htnPixel.track('InitiateCheckout', {
        value: (window.__priceDisplay || '£24.99').replace(/[^0-9.]/g, ''),
        currency: window.__priceCurrency || 'GBP',
        content_name: 'Full story',
        content_type: 'product',
        content_ids: ['storytold_personalised_story']
      }, { eventId: checkoutEventId });
    }
  } catch(e){}

  try {
    const res = await fetch('/api/checkout-paid', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ storyId, accessToken, fbp, fbc, checkoutEventId, email: capturedEmail })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.url) window.location.href = data.url;
    else throw new Error();
  } catch (e) {
    btns.forEach(b => { b.disabled = false; b.textContent = b.dataset.origText || ('Order · ' + (window.__priceDisplay || '£24.99')); });
    alert("Couldn't open checkout. Please try again, or email hello@heartheirname.com");
  } finally {
    _checkoutInFlight = false;
  }
}
