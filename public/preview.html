<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Your preview · HearTheirName</title>
<script defer src="/analytics.js"></script>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1a1426">
<meta name="description" content="A 2-minute taste of a personalised audio story. Listen first. Decide after.">
<link rel="icon" type="image/png" href="/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@300..500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #1a1426;
  --ink-2: #2d2238;
  --paper: #f0eee9;
  --paper-2: #e8e3d6;
  --paper-3: #ddd5c2;
  --plum: #3d2a5c;
  --plum-2: #5a3f83;
  --honey: #e8a34a;
  --blush: #d97757;
  --blush-2: #c25a38;
  --terra: #d97757;
  --terra-2: #c25a38;
  --green: #3a7560;
  --line: rgba(26, 20, 38, 0.14);
  --line-2: rgba(26, 20, 38, 0.08);
  --muted: rgba(26, 20, 38, 0.62);
  --muted-2: rgba(26, 20, 38, 0.42);
  --serif: "Newsreader", "Iowan Old Style", "Palatino", Georgia, serif;
  --sans: "Instrument Sans", ui-sans-serif, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --container: min(100% - 32px, 460px);
  --gap: clamp(40px, 6vw, 88px);
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
button { font: inherit; cursor: pointer; }
a { color: inherit; }

.wrap { width: var(--container); margin: 0 auto; }

/* ─── Header ─── */
header.site {
  padding: 14px 0 14px;
  border-bottom: 1px solid var(--line-2);
  position: sticky; top: 0; z-index: 40;
  background: rgba(240, 238, 233, .92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.site .wrap { display: flex; align-items: center; justify-content: center; }
.wordmark {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-decoration: none;
}
.wordmark .glyph { width: 22px; height: 14px; display: inline-flex; align-items: center; gap: 1.5px; }
.wordmark .glyph span { flex: 1; background: var(--ink); border-radius: 1px; }
.wordmark em { font-style: italic; color: var(--plum-2); font-weight: 400; }

/* ─── States (loading / waiting / error / login / paid-pending) ─── */
.state {
  text-align: center;
  padding: 72px 24px;
  max-width: 560px;
  margin: 0 auto;
}
.state-icon {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin: 0 auto 18px;
}
.state h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3.4vw, 38px);
  letter-spacing: -0.014em;
  margin: 0 0 14px;
  color: var(--ink);
  line-height: 1.15;
}
.state .sub {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.55;
  margin: 0 auto 24px;
  max-width: 440px;
}
.state .sub a { color: var(--plum-2); }
.state-link {
  display: inline-block;
  background: var(--blush);
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  padding: 14px 24px;
  border-radius: 999px;
  font-size: 14.5px;
}
.state-ul {
  list-style: none;
  padding: 0;
  margin: 0 auto;
  text-align: left;
  max-width: 380px;
  display: flex; flex-direction: column;
  gap: 12px;
}
.state-ul li {
  display: flex; gap: 12px;
  padding: 12px 14px;
  background: var(--paper-2);
  border-radius: 12px;
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.45;
}
.state-ul .when {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--plum-2);
  width: 90px;
  flex-shrink: 0;
  padding-top: 2px;
}
.refresh-note {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted-2);
  margin-top: 22px;
}

/* ─── Generating screen (active in-browser wait) ─── */
.state-generating {
  padding-top: 32px;
  padding-bottom: 48px;
}
.gen-banner {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--terra);
  background: rgba(216, 122, 62, 0.08);
  border: 1px solid rgba(216, 122, 62, 0.28);
  padding: 6px 14px;
  border-radius: 999px;
  margin-bottom: 18px;
}
.gen-banner--soft {
  color: var(--green);
  background: rgba(58, 117, 96, 0.10);
  border-color: rgba(58, 117, 96, 0.30);
}
.gen-title {
  font-family: var(--serif);
  font-size: clamp(26px, 4.6vw, 38px);
  font-weight: 500;
  line-height: 1.15;
  margin: 0 0 14px;
  color: var(--ink);
  max-width: 28ch;
}
.gen-sub {
  font-size: 15px;
  line-height: 1.55;
  color: var(--muted);
  margin: 0 auto 26px;
  max-width: 36ch;
}
.gen-status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  padding: 9px 16px;
  border-radius: 999px;
  margin-bottom: 28px;
}
.gen-status-dot {
  width: 9px;
  height: 9px;
  background: var(--terra);
  border-radius: 999px;
  animation: gen-pulse 1.4s ease-in-out infinite;
}
@keyframes gen-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(0.85); }
}
.gen-status-label {
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.005em;
}
.gen-game {
  margin: 4px auto 0;
  max-width: 320px;
}
.gen-game-prompt {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin: 0 0 12px;
}
.gen-game-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  max-width: 280px;
  margin: 0 auto;
}
.gen-card {
  appearance: none;
  border: 1.5px solid var(--line);
  background: var(--paper-2);
  aspect-ratio: 1;
  border-radius: 12px;
  font-size: 24px;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
  user-select: none;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gen-card::before {
  content: "";
  display: block;
  width: 8px;
  height: 8px;
  background: var(--line-2, var(--line));
  border-radius: 999px;
  opacity: 0.5;
}
.gen-card.is-flipped::before { display: none; }
.gen-card.is-flipped {
  background: #fff;
  border-color: var(--terra);
}
.gen-card.is-matched {
  background: rgba(216, 122, 62, 0.12);
  border-color: var(--terra);
  cursor: default;
}
.gen-card:hover:not(.is-flipped):not(.is-matched) {
  border-color: var(--ink);
  transform: translateY(-1px);
}
.gen-game-score {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted-2);
  margin: 14px 0 0;
}

/* ─── Input reveal: lines fading in one at a time ─── */
.gen-reveal {
  max-width: 460px;
  margin: 26px auto 0;
  padding: 18px 22px 14px;
  background: rgba(255, 255, 255, 0.5);
  border: 1px solid var(--line);
  border-radius: 14px;
  text-align: left;
}
.gen-reveal-eye {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted-2);
  font-weight: 600;
  margin: 0 0 10px;
  text-align: center;
}
.gen-reveal-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.gen-reveal-item {
  font-family: var(--serif);
  font-size: 17px;
  line-height: 1.45;
  color: var(--ink);
  margin: 6px 0;
  padding: 4px 0;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.gen-reveal-item.is-shown {
  opacity: 1;
  transform: translateY(0);
}
.gen-reveal-item::before {
  content: "·";
  color: var(--terra);
  font-weight: 700;
  margin-right: 10px;
}

/* ─── Game wrapper + tab switcher ─── */
.gen-game-wrap {
  margin: 28px auto 0;
  max-width: 360px;
}
.gen-game-tabs {
  display: inline-flex;
  gap: 4px;
  padding: 4px;
  background: var(--paper-2);
  border-radius: 999px;
  border: 1px solid var(--line);
  margin: 0 auto 16px;
}
.gen-game-tab {
  appearance: none;
  background: transparent;
  border: 0;
  padding: 7px 16px;
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.005em;
  color: var(--muted);
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.gen-game-tab:hover { color: var(--ink); }
.gen-game-tab.is-active {
  background: var(--ink);
  color: #fff;
}

/* ─── Tic-tac-toe board ─── */
.gen-ttt {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  max-width: 220px;
  margin: 0 auto;
}
.gen-ttt-cell {
  appearance: none;
  border: 1.5px solid var(--line);
  background: var(--paper-2);
  aspect-ratio: 1;
  border-radius: 10px;
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s, background 0.15s;
  user-select: none;
}
.gen-ttt-cell:hover:not(.is-x):not(.is-o) {
  border-color: var(--ink);
  transform: translateY(-1px);
}
.gen-ttt-cell.is-x { color: var(--terra); border-color: var(--terra); background: #fff; }
.gen-ttt-cell.is-o { color: var(--plum); border-color: var(--plum); background: #fff; }

/* ─── Progress bar (replaces the rotating testimonials block) ─── */
/* Time-based fill animation reaches ~95% over 2.5 minutes, so the customer
   can see things are happening even if the network goes quiet. The polling
   loop snaps it to 100% once the audio actually lands. */
.gen-progress {
  max-width: 460px;
  margin: 28px auto 0;
  text-align: center;
}
.gen-progress-copy {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  margin: 0 0 12px;
  letter-spacing: -0.003em;
}
.gen-progress-track {
  position: relative;
  height: 8px;
  background: rgba(31, 27, 46, 0.10);
  border-radius: 999px;
  overflow: hidden;
}
.gen-progress-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0%;
  background: linear-gradient(90deg, var(--plum), var(--terra));
  border-radius: 999px;
  transition: width 0.4s ease;
}
.gen-progress-fill.is-running {
  animation: gen-progress-grow 150s cubic-bezier(.22,.61,.36,1) forwards;
}
.gen-progress-fill.is-done { width: 100% !important; animation: none; }
@keyframes gen-progress-grow { from { width: 0%; } to { width: 95%; } }
.gen-safety {
  font-size: 12.5px;
  color: var(--muted-2);
  margin: 28px auto 0;
  max-width: 38ch;
  line-height: 1.55;
}
.gen-safety a { color: var(--plum); font-weight: 600; }

.gen-close-tab {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  max-width: 460px;
  margin: 26px auto 0;
  padding: 16px 18px;
  background: rgba(58, 117, 96, 0.08);
  border: 1px solid rgba(58, 117, 96, 0.22);
  border-radius: 14px;
  text-align: left;
}
.gen-close-tab-icon {
  flex: 0 0 26px;
  width: 26px; height: 26px;
  border-radius: 999px;
  background: var(--green);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  margin-top: 1px;
}
.gen-close-tab-title {
  margin: 0 0 4px;
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--ink);
  line-height: 1.3;
}
.gen-close-tab-sub {
  margin: 0;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--muted);
}
.gen-close-tab-sub strong {
  color: var(--ink);
  font-weight: 600;
}

/* ─── Inbox-priming card on the post-payment screen ─── */
.inbox-prime {
  max-width: 460px;
  margin: 24px auto 0;
  padding: 22px 24px 20px;
  background: rgba(255, 255, 255, 0.65);
  border: 1px solid var(--line);
  border-radius: 14px;
  text-align: left;
}
.inbox-prime-eye {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted-2);
  font-weight: 600;
  margin: 0 0 8px;
}
.inbox-prime-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--ink);
  line-height: 1.3;
  margin: 0 0 6px;
}
.inbox-prime-sub {
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--muted);
  margin: 0 0 16px;
}
.inbox-prime-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.inbox-prime-list li {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 0;
  border-top: 1px solid var(--line-2);
}
.inbox-prime-list li:first-child { border-top: 0; padding-top: 4px; }
.inbox-prime-num {
  flex: 0 0 24px;
  width: 24px;
  height: 24px;
  border-radius: 999px;
  background: var(--ink);
  color: #fff;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
}
.inbox-prime-step { flex: 1; min-width: 0; }
.inbox-prime-step-title {
  font-size: 14.5px;
  line-height: 1.5;
  color: var(--ink);
  margin: 0 0 4px;
  font-weight: 500;
}
.inbox-prime-step-hint {
  font-size: 13px;
  line-height: 1.5;
  color: var(--muted);
  margin: 0;
}
.inbox-prime-copy {
  appearance: none;
  background: rgba(216, 122, 62, 0.08);
  border: 1px dashed rgba(216, 122, 62, 0.45);
  color: var(--terra-2);
  font-family: var(--mono);
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.005em;
  padding: 4px 10px 5px;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  vertical-align: baseline;
  margin: 0 2px;
}
.inbox-prime-copy:hover {
  background: rgba(216, 122, 62, 0.14);
  border-style: solid;
  border-color: var(--terra);
}
.inbox-prime-copy.is-copied {
  background: rgba(58, 117, 96, 0.12);
  border-color: var(--green);
  border-style: solid;
  color: var(--green);
}
.inbox-prime-copy-tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  font-family: var(--sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 4px 9px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.inbox-prime-copy:hover .inbox-prime-copy-tip,
.inbox-prime-copy.is-copied .inbox-prime-copy-tip { opacity: 1; }

/* ─── Hero ─── */
.hero { padding: 36px 0 8px; }
.hero-eye {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--blush-2);
  text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
}
.hero-eye .dot {
  width: 7px; height: 7px;
  border-radius: 50%; background: var(--blush);
  box-shadow: 0 0 0 4px rgba(217,119,87,.22);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(217,119,87,.22); }
  50% { box-shadow: 0 0 0 6px rgba(217,119,87,.10); }
}
h1 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(34px, 6vw, 60px);
  line-height: 1.04;
  letter-spacing: -0.022em;
  color: var(--ink);
  margin: 0 0 18px;
  text-wrap: balance;
}
h1 em { font-style: italic; color: var(--plum-2); }
.hero p {
  font-size: clamp(16px, 1.6vw, 19px);
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  text-wrap: pretty;
  max-width: 60ch;
}

/* ─── Player ─── */
.player {
  margin: 28px 0 0;
  border-radius: 22px;
  background: linear-gradient(165deg, #2d2238 0%, #1a1426 60%, #14101d 100%);
  color: rgba(255,255,255,.92);
  padding: 24px 22px 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 14px 40px rgba(20,16,29,.25);
}
.player::before {
  content: ""; position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(232,163,74,.20), transparent 70%);
  pointer-events: none;
}
.player-top {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 18px; position: relative;
}
.cover {
  width: 64px; height: 64px;
  border-radius: 12px;
  background: linear-gradient(135deg, #4a3470, #2d2238);
  border: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  line-height: 1.1;
  text-align: center;
  color: rgba(255,255,255,.78);
  flex-shrink: 0;
  position: relative;
}
.cover::after {
  content: ""; position: absolute; inset: 4px;
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 8px;
}
.player-meta { flex: 1; min-width: 0; }
.player-meta .label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
  margin-bottom: 4px;
}
.player-meta .title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  line-height: 1.15;
  margin: 0;
  color: rgba(255,255,255,.96);
}
.waveform {
  height: 36px;
  display: flex; align-items: end; gap: 2px;
  margin: 14px 0 8px;
  position: relative;
  cursor: pointer;
}
.waveform span {
  flex: 1;
  background: rgba(255,255,255,.16);
  border-radius: 1px;
  pointer-events: none;
}
.waveform span.played { background: var(--honey); }
.player-controls {
  display: flex; align-items: center; gap: 14px;
  margin-top: 8px; position: relative;
}
.play-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--blush);
  border: none;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  box-shadow: 0 6px 18px rgba(217,119,87,.4);
}
.play-btn svg { width: 18px; height: 18px; }
.player-time {
  font-family: var(--mono);
  font-size: 11.5px;
  color: rgba(255,255,255,.65);
  flex: 1;
  display: flex; justify-content: space-between;
}
.music-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 16px;
  padding: 8px 12px 8px 10px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 999px;
  font-size: 12.5px;
  color: rgba(255,255,255,.82);
  flex-wrap: wrap;
  cursor: pointer;
  user-select: none;
}
.music-toggle .switch {
  width: 24px; height: 14px;
  background: var(--honey);
  border-radius: 8px;
  position: relative;
  flex-shrink: 0;
  transition: background .15s;
}
.music-toggle .switch::after {
  content: "";
  position: absolute;
  right: 2px; top: 2px;
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  transition: right .15s;
}
.music-toggle.off .switch { background: rgba(255,255,255,.20); }
.music-toggle.off .switch::after { right: 12px; }
.music-toggle .hint {
  font-size: 10.5px;
  color: rgba(255,255,255,.50);
  font-family: var(--mono);
  letter-spacing: 0.05em;
}
.player-foot {
  margin-top: 14px;
  font-size: 12.5px;
  font-style: italic;
  color: rgba(255,255,255,.52);
  line-height: 1.4;
}
/* Primary buy button living inside the player card. Same shape as the
   decision-card btn-primary so it reads as the same action, just placed
   close to the audio so the customer can buy the second they decide. */
.player-buy {
  appearance: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  margin: 16px 0 0;
  padding: 16px 22px;
  background: var(--terra);
  color: #fff;
  border: 0;
  border-radius: 999px;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.005em;
  cursor: pointer;
  box-shadow: 0 8px 22px -6px rgba(217,119,87,.45);
  transition: background .15s, transform .12s, box-shadow .15s;
}
.player-buy:hover { background: var(--blush-2); transform: translateY(-1px); box-shadow: 0 12px 28px -8px rgba(217,119,87,.55); }
.player-buy:active { transform: translateY(0); }
.player-buy:disabled { opacity: 0.65; cursor: progress; }
.player-buy-note {
  margin: 8px 0 0;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--honey);
  text-align: center;
  font-weight: 600;
}
/* Amendment-promise CTA inside the player card. Sits right under the
   "Listen first. Decide after." footnote so it catches the customer
   exactly when they're forming an opinion about what's not quite right. */
.player-amend {
  appearance: none;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  width: 100%;
  margin: 14px 0 0;
  padding: 14px 16px;
  background: rgba(255,255,255,.06);
  border: 1px dashed rgba(255,255,255,.22);
  border-radius: 14px;
  color: rgba(255,255,255,.88);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.55;
  text-align: left;
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s, transform .12s;
}
.player-amend:hover {
  background: rgba(255,255,255,.10);
  border-color: rgba(255,255,255,.40);
  border-style: solid;
  color: #fff;
}
.player-amend:active { transform: scale(.99); }
.player-amend strong {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 500;
  color: var(--honey);
  font-size: 14.5px;
  display: block;
  margin-bottom: 2px;
}
.player-amend-icon {
  flex: 0 0 28px;
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: rgba(232,163,74,.18);
  color: var(--honey);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  margin-top: 1px;
}

/* "Want to listen later" CTA + inline email-confirm form. Same shape as
   the amendment CTA so they read as a pair, but green-tinted to signal
   "no rush" rather than amber-honey "needs attention". */
.player-later { margin-top: 8px; }
.player-later strong { color: #B5D8C5; }
.player-later-icon {
  background: rgba(58,117,96,.22);
  color: #B5D8C5;
}
.player-later-form {
  margin: 12px 0 0;
  padding: 14px 16px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 12px;
  animation: laterFormOpen .22s ease-out;
}
@keyframes laterFormOpen { from { opacity: 0; transform: translateY(-4px) } to { opacity: 1; transform: translateY(0) } }
.player-later-form label {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  font-weight: 600;
  margin: 6px 0 4px;
}
.player-later-form label:first-child { margin-top: 0; }
.player-later-form input {
  width: 100%;
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: 14px;
  color: #fff;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 8px;
  outline: none;
  margin-bottom: 8px;
  box-sizing: border-box;
  transition: border-color .15s, background .15s;
}
.player-later-form input::placeholder { color: rgba(255,255,255,.32); }
.player-later-form input:focus {
  border-color: #B5D8C5;
  background: rgba(255,255,255,.10);
}
.player-later-error {
  margin: 4px 0 8px;
  font-size: 12.5px;
  color: #FFB4A8;
  font-weight: 500;
}
.player-later-send {
  appearance: none;
  width: 100%;
  margin-top: 4px;
  padding: 12px 18px;
  background: var(--green, #3a7560);
  color: #fff;
  border: 0;
  border-radius: 999px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .12s, background .15s;
}
.player-later-send:hover { background: #4a8a73; }
.player-later-send:disabled { opacity: 0.6; cursor: progress; }
.player-later-hint {
  margin: 10px 0 0;
  font-size: 11.5px;
  color: rgba(255,255,255,.55);
  font-style: italic;
  text-align: center;
  line-height: 1.5;
}
.player-later-hint strong { color: rgba(255,255,255,.85); font-style: normal; font-family: var(--mono); font-size: 11px; }
.player-later-form.is-sent {
  background: rgba(58,117,96,.16);
  border-color: rgba(181,216,197,.42);
  text-align: center;
  padding: 24px 18px;
}
.player-later-form.is-sent .player-later-sent-msg {
  font-family: var(--serif);
  font-size: 17px;
  font-style: italic;
  color: #B5D8C5;
  line-height: 1.4;
}

/* ─── Decision block ─── */
.decision {
  margin: 28px 0 0;
  padding: 30px 26px 26px;
  border-radius: 22px;
  background: linear-gradient(165deg, #2d2238, #1a1426);
  color: rgba(255,255,255,.92);
  position: relative;
  overflow: hidden;
}
.decision::after {
  content: "";
  position: absolute;
  bottom: -80px; left: -50px;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(90,63,131,.40), transparent 65%);
}
.decision .eye {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--honey);
  text-transform: uppercase;
  margin-bottom: 14px;
  position: relative;
}
.decision h2 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(24px, 3vw, 30px);
  line-height: 1.15;
  letter-spacing: -0.014em;
  margin: 0 0 14px;
  color: rgba(255,255,255,.96);
  text-wrap: balance;
  position: relative;
}
.decision p {
  font-size: 15px;
  line-height: 1.55;
  color: rgba(255,255,255,.74);
  margin: 0 0 22px;
  position: relative;
}
.btn-primary {
  display: block;
  width: 100%;
  background: var(--blush);
  color: #fff;
  font-weight: 600;
  font-size: 15.5px;
  padding: 17px 20px;
  border-radius: 999px;
  border: none;
  text-align: center;
  margin-bottom: 12px;
  box-shadow: 0 10px 28px rgba(217,119,87,.35);
  position: relative;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
  text-decoration: none;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(217,119,87,.42); }
.btn-primary:disabled { opacity: .65; cursor: progress; }
.btn-secondary {
  display: block;
  width: 100%;
  background: transparent;
  color: rgba(255,255,255,.92);
  font-weight: 500;
  font-size: 14.5px;
  padding: 14px 20px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.18);
  text-align: center;
  position: relative;
  transition: border-color .15s, background .15s;
  text-decoration: none;
  cursor: pointer;
}
.btn-secondary:hover { border-color: rgba(255,255,255,.32); background: rgba(255,255,255,.04); }

.cta-promise {
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--honey);
  text-align: center;
  margin: 10px 0 4px;
  font-weight: 600;
}

/* Inline review pulled above the buy button */
.decision-review {
  margin: 0 0 22px;
  padding: 16px 20px 18px;
  border-radius: 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.10);
  text-align: center;
}
.decision-review-stars {
  display: inline-flex;
  gap: 2px;
  color: var(--honey);
  margin-bottom: 8px;
}
.decision-review-stars svg { width: 14px; height: 14px; }
.decision-review-quote {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  font-style: italic;
  color: #fff;
  line-height: 1.4;
  margin: 0 0 8px;
  letter-spacing: -0.005em;
}
.decision-review-quote strong { color: var(--honey); font-style: normal; font-weight: 700; }
.decision-review-by {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin: 0;
}

.pills {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 16px;
  margin-top: 22px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.10);
  position: relative;
}
.pill {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: rgba(255,255,255,.78);
  line-height: 1.3;
}
.pill .ck { color: var(--honey); flex-shrink: 0; }

/* ─── Sections ─── */
section.s {
  padding: var(--gap) 0 0;
  position: relative;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}
h2.h {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3.6vw, 44px);
  line-height: 1.12;
  letter-spacing: -0.018em;
  color: var(--ink);
  margin: 0 0 20px;
  text-wrap: balance;
  max-width: 22ch;
}
h2.h em { font-style: italic; color: var(--plum-2); }
.lede {
  font-size: clamp(15px, 1.4vw, 18px);
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 14px;
  text-wrap: pretty;
  max-width: 60ch;
}

/* ─── Sameness card ─── */
.same-card {
  padding: 30px 24px 26px;
  background: var(--paper);
  border: 1px solid var(--line-2);
  border-radius: 18px;
  margin-top: 4px;
}
.same-lede {
  font-size: clamp(15px, 1.4vw, 17px);
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 20px;
}
.same-row {
  display: flex; gap: 16px;
  padding: 18px 0;
  border-top: 1px solid var(--line-2);
}
.same-row:first-of-type { border-top: none; padding-top: 4px; }
.same-row .label {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--plum-2);
  text-transform: uppercase;
  width: 96px;
  flex-shrink: 0;
  padding-top: 2px;
}
.same-row .body {
  font-size: 14.5px;
  line-height: 1.5;
  color: var(--ink-2);
}
.same-row .body strong {
  font-weight: 600; color: var(--ink); display: block; margin-bottom: 2px;
}
.same-quote {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(16px, 1.6vw, 20px);
  line-height: 1.4;
  color: var(--plum);
  margin: 22px 0 0;
  padding-top: 22px;
  border-top: 1px solid var(--line-2);
  text-wrap: pretty;
}

/* ─── Shareability section ─── */
.share .scene {
  position: relative;
  margin: 28px calc(50% - 50vw) 28px;
  width: 100vw;
  height: 380px;
  background: radial-gradient(ellipse at 50% 60%, #2d2238 0%, #1a1426 60%, #14101d 100%);
  overflow: hidden;
  border-top: 1px solid rgba(255,255,255,.06);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.share .scene::before, .share .scene::after {
  content: ""; position: absolute; border-radius: 50%;
}
.share .scene::before {
  width: 280px; height: 280px;
  top: -60px; left: 10%;
  background: radial-gradient(circle, rgba(232,163,74,.18), transparent 70%);
}
.share .scene::after {
  width: 320px; height: 320px;
  bottom: -90px; right: 10%;
  background: radial-gradient(circle, rgba(90,63,131,.35), transparent 70%);
}
.mini-phone {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 140px; height: 268px;
  background: #14101d;
  border: 4px solid #2d2238;
  border-radius: 22px;
  padding: 8px;
  z-index: 5;
  box-shadow: 0 18px 40px rgba(0,0,0,.5);
}
.mini-phone-screen {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #2d2238, #1a1426);
  border-radius: 14px;
  padding: 14px 12px;
  display: flex; flex-direction: column;
  color: rgba(255,255,255,.92);
}
.mp-eyebrow {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,.42);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.mp-title {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  line-height: 1.15;
  margin-bottom: auto;
}
.mp-wave {
  height: 22px;
  display: flex; align-items: end; gap: 2px;
  margin: 14px 0 10px;
}
.mp-wave span { flex: 1; background: var(--honey); border-radius: 1px; opacity: .85; }
.mp-controls { display: flex; align-items: center; gap: 8px; }
.mp-play {
  width: 26px; height: 26px;
  background: var(--blush);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 9px;
}
.mp-time { font-family: var(--mono); font-size: 8px; color: rgba(255,255,255,.55); }
.chip {
  position: absolute;
  background: rgba(247, 241, 230, .96);
  border-radius: 999px;
  padding: 8px 12px 8px 8px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 18px rgba(0,0,0,.25);
  z-index: 4;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 500;
}
.chip .av {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px;
  font-weight: 600;
  color: #fff;
}
.chip .play { width: 12px; height: 12px; margin-left: 2px; color: var(--blush); flex-shrink: 0; }
.chip.c1 { top: 40px; left: calc(50% - 230px); }
.chip.c1 .av { background: #b85d8a; }
.chip.c2 { top: 70px; left: calc(50% + 130px); }
.chip.c2 .av { background: #5a3f83; }
.chip.c3 { bottom: 60px; left: calc(50% - 220px); }
.chip.c3 .av { background: #c88632; }
.chip.c4 { bottom: 30px; left: calc(50% + 130px); }
.chip.c4 .av { background: #2d6a55; }
.lines { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

.share-pull {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(17px, 1.8vw, 22px);
  line-height: 1.4;
  color: var(--plum);
  margin: 0 0 8px;
  padding-left: 14px;
  border-left: 2px solid var(--honey);
  text-wrap: pretty;
  max-width: 50ch;
}
.share-trust {
  margin-top: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.share-trust-row {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.4;
}
.share-trust-row > span:last-child { flex: 1; }
.share-trust-row .tick {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--plum-2);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 1px;
}
.share-trust-row strong { font-weight: 600; color: var(--ink); }

/* ─── Reviews ─── */
.reviews-head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.reviews-head .stars { display: inline-flex; gap: 2px; color: #00b67a; }
.reviews-head .stars svg { width: 16px; height: 16px; }
.reviews-head .summary { font-size: 13.5px; color: var(--muted); }
.reviews-head .summary strong { color: var(--ink); font-weight: 600; }
.reviews-head .tp {
  margin-left: auto;
  background: #00b67a;
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
}
.reviews-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
.review {
  padding: 20px 0;
  border-top: 1px solid var(--line-2);
}
.review:first-of-type { border-top: none; padding-top: 0; }
.review-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.review-av {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--plum);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 600;
}
.review-name { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.2; }
.review-meta { font-size: 12px; color: var(--muted-2); margin-top: 1px; }
.review-when { margin-left: auto; font-size: 12px; color: var(--muted-2); }
.review-stars { display: inline-flex; gap: 2px; color: #00b67a; margin-bottom: 8px; }
.review-stars svg { width: 12px; height: 12px; }
.review h5 {
  font-family: var(--sans);
  font-size: 14.5px;
  font-weight: 600;
  margin: 0 0 6px;
  color: var(--ink);
}
.review p { font-size: 14px; line-height: 1.5; color: var(--ink-2); margin: 0; }

/* ─── Founder ─── */
.founder { margin-top: 8px; }
.founder-photo {
  width: 100%;
  aspect-ratio: 4 / 5;
  border-radius: 18px;
  background: #2a2418 url('/jamie-chase.jpg') center/cover no-repeat;
  position: relative;
  overflow: hidden;
  margin-bottom: 24px;
}
/* Subtle dark gradient at the top so the caption remains readable on the photo */
.founder-photo::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.35) 0%, rgba(0,0,0,0) 35%);
  pointer-events: none;
}
.founder-photo .caption {
  position: absolute;
  top: 18px; left: 20px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.78);
  text-shadow: 0 1px 2px rgba(0,0,0,.45);
  z-index: 1;
}
.founder-quote {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(20px, 2.2vw, 28px);
  line-height: 1.25;
  color: var(--ink);
  margin: 0 0 18px;
  text-wrap: pretty;
  letter-spacing: -0.005em;
  max-width: 30ch;
}
.founder-quote::before {
  content: "\201C";
  color: var(--plum-2);
  font-size: 1.4em;
  line-height: 0;
  vertical-align: -0.35em;
  margin-right: 4px;
}
.founder-byline {
  display: flex; align-items: center; gap: 10px;
  font-size: 13.5px;
  color: var(--muted);
  margin-bottom: 22px;
}
.founder-byline strong {
  color: var(--ink); font-weight: 600;
  font-family: var(--serif); font-size: 16px;
}
.founder-body {
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0;
  max-width: 56ch;
}

/* ─── Timeline ─── */
.timeline {
  position: relative;
  padding-left: 24px;
  margin-top: 8px;
}
.timeline::before {
  content: ""; position: absolute;
  top: 8px; bottom: 8px; left: 7px;
  width: 1px; background: var(--line);
}
.step { position: relative; padding-bottom: 24px; }
.step:last-child { padding-bottom: 0; }
.step::before {
  content: "";
  position: absolute;
  top: 6px; left: -24px;
  width: 15px; height: 15px;
  border-radius: 50%;
  background: var(--paper);
  border: 2px solid var(--plum-2);
}
.step.now::before { background: var(--blush); border-color: var(--blush); }
.step .when {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--plum-2);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.step h5 { font-family: var(--sans); font-size: 15px; font-weight: 600; margin: 0 0 4px; color: var(--ink); }
.step p { font-size: 14px; line-height: 1.5; color: var(--muted); margin: 0; max-width: 50ch; }

/* ─── Promise ─── */
.promise {
  margin-top: 16px;
  padding: 30px 26px 24px;
  background: linear-gradient(165deg, #f0eee9, #e8e3d6);
  border: 1px solid var(--line-2);
  border-radius: 18px;
  max-width: 720px;
}
.promise-tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green);
  background: rgba(58,117,96,.10);
  padding: 5px 10px;
  border-radius: 999px;
  margin-bottom: 14px;
}
.promise h3 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(22px, 2.4vw, 28px);
  line-height: 1.18;
  margin: 0 0 14px;
  color: var(--ink);
  text-wrap: pretty;
}
.promise p {
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-2);
  margin: 0 0 12px;
}
.promise-sig {
  margin-top: 16px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 19px;
  color: var(--plum);
}

/* ─── FAQ ─── */
.faq details {
  border-top: 1px solid var(--line-2);
  padding: 20px 0;
}
.faq details:last-of-type { border-bottom: 1px solid var(--line-2); }
.faq summary {
  list-style: none;
  cursor: pointer;
  display: flex; align-items: flex-start; gap: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.35;
}
.faq summary > span.q { flex: 1; }
.faq summary::-webkit-details-marker { display: none; }
.faq summary .chev {
  color: var(--plum-2);
  font-size: 20px;
  line-height: 1;
  flex-shrink: 0;
  transition: transform .2s;
}
.faq details[open] summary .chev { transform: rotate(45deg); }
.faq .a {
  margin-top: 12px;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink-2);
  max-width: 65ch;
}

/* ─── Final CTA ─── */
.final {
  margin: var(--gap) 0 0;
  padding: 40px 32px 34px;
  border-radius: 22px;
  background: linear-gradient(165deg, #2d2238 0%, #1a1426 70%, #14101d 100%);
  color: rgba(255,255,255,.94);
  position: relative;
  overflow: hidden;
}
.final::before {
  content: ""; position: absolute;
  top: -100px; right: -100px;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(232,163,74,.18), transparent 70%);
}
.final h3 {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3.4vw, 40px);
  line-height: 1.12;
  letter-spacing: -0.018em;
  margin: 0 0 14px;
  color: rgba(255,255,255,.96);
  text-wrap: balance;
  position: relative;
}
.final h3 em { font-style: italic; color: var(--honey); }
.final p {
  font-size: 15px;
  line-height: 1.55;
  color: rgba(255,255,255,.74);
  margin: 0 0 22px;
  position: relative;
  max-width: 56ch;
}
.final-cta {
  display: block;
  width: 100%;
  background: var(--blush);
  color: #fff;
  font-weight: 600;
  font-size: 16px;
  padding: 18px 20px;
  border-radius: 999px;
  border: none;
  margin-bottom: 14px;
  box-shadow: 0 14px 32px rgba(217,119,87,.40);
  position: relative;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.final-cta:hover { transform: translateY(-1px); box-shadow: 0 18px 40px rgba(217,119,87,.5); }
.final-cta:disabled { opacity: .65; cursor: progress; }
.final-foot {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,.55);
  margin: 0;
  position: relative;
}
.final-jamie {
  margin-top: 26px;
  padding: 20px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 14px;
  display: flex; gap: 14px;
  position: relative;
  max-width: 640px;
}
.final-jamie .av {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(232,163,74,.18);
  color: var(--honey);
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.final-jamie p {
  font-size: 13.5px;
  line-height: 1.5;
  color: rgba(255,255,255,.78);
  margin: 0;
}
.final-jamie strong { color: rgba(255,255,255,.95); font-weight: 600; }
.inline-link {
  appearance: none; background: none; border: 0; padding: 0;
  font: inherit; color: var(--terra); cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
}
.inline-link:hover { color: #E89760; }

/* ─── Footer ─── */
footer.site {
  padding: 48px 0 calc(96px + env(safe-area-inset-bottom, 0px));
  text-align: center;
}
footer.site p {
  font-size: 12.5px;
  color: var(--muted-2);
  margin: 0;
}

/* ─── Contact-Jamie modal ─── */
.contact-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(31,27,46,.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
}
.contact-overlay.show { display: flex; }
.contact-card {
  background: var(--paper);
  border-radius: 18px;
  padding: 28px 26px 22px;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 30px 80px rgba(0,0,0,.4);
}
.contact-card h3 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  color: var(--ink);
  margin: 0 0 8px;
  line-height: 1.2;
}
.contact-card p.lede {
  font-size: 14.5px;
  color: var(--muted);
  margin: 0 0 16px;
  line-height: 1.5;
}
.contact-card textarea {
  width: 100%;
  min-height: 130px;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  background: rgba(255,253,247,.6);
  resize: vertical;
  outline: none;
}
.contact-card textarea:focus { border-color: var(--terra); }
.contact-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.contact-actions .btn-cancel {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 11px 18px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.contact-actions .btn-send {
  background: var(--terra);
  color: #fff;
  border: 0;
  border-radius: 999px;
  padding: 11px 22px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 18px -6px rgba(216,122,62,.55);
}
.contact-actions .btn-send:disabled { opacity: .65; cursor: progress; }
.contact-status {
  margin: 8px 0 0;
  font-size: 13px;
  color: var(--muted);
  min-height: 18px;
}
.contact-status.ok { color: #2f7a3a; }
.contact-status.err { color: #b13a3a; }

/* ─── Sticky CTA bar ─── */
.stickybar {
  position: fixed;
  left: 12px; right: 12px;
  bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  max-width: 720px;
  margin: 0 auto;
  background: rgba(247, 241, 230, .94);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 10px 12px 10px 16px;
  display: none;
  align-items: center; gap: 10px;
  z-index: 30;
  box-shadow: 0 6px 24px rgba(0,0,0,.10);
}
.stickybar.show { display: flex; }
.stickybar .info { flex: 1; min-width: 0; }
.stickybar .title {
  font-size: 13.5px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stickybar .sub {
  font-size: 11.5px; color: var(--muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.stickybar .btn {
  background: var(--blush);
  color: #fff;
  font-weight: 600;
  font-size: 13.5px;
  padding: 11px 18px;
  border-radius: 999px;
  border: none;
  white-space: nowrap;
  cursor: pointer;
}

/* ──────────────────────────────────────────
   TABLET   ≥ 720px
   ────────────────────────────────────────── */
@media (min-width: 720px) {
  :root { --container: min(100% - 56px, 720px); }
  .hero { padding: 56px 0 8px; }
  .player { padding: 30px 30px 26px; }
  .decision { padding: 38px 36px 32px; }
  .pills { grid-template-columns: repeat(4, 1fr); }
  .reviews-grid {
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    column-gap: 28px;
  }
  .review {
    padding: 24px;
    border: 1px solid var(--line-2);
    border-radius: 14px;
    background: var(--paper);
  }
  .review:first-of-type { padding: 24px; }
  .timeline {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0 28px;
    padding: 24px 0 0;
  }
  .timeline::before {
    top: 30px; bottom: auto; left: 8px; right: 8px;
    width: auto; height: 1px;
  }
  .step { padding-bottom: 0; padding-top: 30px; }
  .step::before { top: -3px; left: 0; }
  .stickybar { display: none !important; }
  .share .scene { height: 440px; }
  .chip.c1 { top: 70px; left: calc(50% - 280px); }
  .chip.c2 { top: 90px; left: calc(50% + 170px); }
  .chip.c3 { bottom: 90px; left: calc(50% - 270px); }
  .chip.c4 { bottom: 50px; left: calc(50% + 170px); }
}

/* ──────────────────────────────────────────
   DESKTOP   ≥ 1024px
   ────────────────────────────────────────── */
@media (min-width: 1024px) {
  :root {
    --container: min(100% - 96px, 1180px);
    --gap: 120px;
  }
  body { font-size: 17px; }
  header.site { padding: 18px 0; }

  /* Hero: side-by-side */
  .hero {
    padding: 80px 0 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 56px;
    align-items: center;
  }
  .hero .left { padding-right: 24px; }
  .player { margin: 0; }

  /* Decision sits as a full-width card after hero */
  .decision {
    margin-top: 32px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 56px;
    align-items: center;
    padding: 48px 56px;
  }
  .decision .copy { grid-column: 1; }
  .decision .actions { grid-column: 2; align-self: stretch; display: flex; flex-direction: column; justify-content: center; }
  .decision .pills {
    grid-column: 1 / -1;
    grid-template-columns: repeat(4, 1fr);
    margin-top: 28px;
  }

  /* Sameness: heading left, card right */
  section.sameness { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 56px; align-items: start; }
  section.sameness .head { padding-top: 8px; }
  section.sameness .same-card { margin-top: 0; padding: 36px; }

  /* Share */
  .share .scene { height: 520px; margin: 36px calc(50% - 50vw) 36px; }
  .mini-phone { width: 168px; height: 320px; }
  .mp-eyebrow { font-size: 8px; }
  .mp-title { font-size: 15px; }
  .chip { font-size: 14px; padding: 10px 16px 10px 10px; }
  .chip .av { width: 28px; height: 28px; font-size: 12px; }
  .chip.c1 { top: 80px; left: calc(50% - 360px); }
  .chip.c2 { top: 110px; left: calc(50% + 220px); }
  .chip.c3 { bottom: 110px; left: calc(50% - 340px); }
  .chip.c4 { bottom: 70px; left: calc(50% + 220px); }
  .share-trust { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 32px; }

  /* Reviews: 3-up */
  .reviews-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }

  /* Founder: photo left, text right */
  .founder {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 64px;
    align-items: center;
  }
  .founder-photo { margin-bottom: 0; aspect-ratio: 4 / 5; }
  .founder-quote { margin-top: 0; }

  /* Final CTA */
  .final {
    padding: 64px 72px 56px;
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 56px;
    align-items: center;
  }
  .final .copy { grid-column: 1; }
  .final .right { grid-column: 2; }
  .final-jamie { margin-top: 0; }

  footer.site { padding: 64px 0 32px; }
}

/* ──────────────────────────────────────────
   LARGE   ≥ 1440px
   ────────────────────────────────────────── */
@media (min-width: 1440px) {
  :root { --container: min(100% - 120px, 1280px); }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .hero-eye .dot { animation: none; }
  .btn-primary, .btn-secondary, .final-cta { transition: none; }
}

<body>

<header class="site">
  <div class="wrap">
    <a href="/" class="wordmark">
      <span class="glyph"><span></span><span style="height:70%"></span><span></span><span style="height:50%"></span></span>
      Hear<em>Their</em>Name
    </a>
  </div>
</header>

<main id="root">
  <div class="state">
    <div class="state-icon">⏳</div>
    <h1>Loading your preview…</h1>
    <p class="sub">One sec.</p>
  </div>
</main>

<!-- Sticky CTA bar (mobile only — hidden ≥ 720px) -->
<div class="stickybar" id="stickyBar">
  <div class="info">
    <div class="title" id="stickyTitle">Make their story</div>
    <div class="sub"><span data-price>£24.99</span> · the full 15-minute story</div>
  </div>
  <button class="btn" id="stickyBtn" type="button">Make it · <span data-price>£24.99</span></button>
</div>

<!-- Contact-Jamie modal -->
<div class="contact-overlay" id="contactOverlay" role="dialog" aria-modal="true" aria-labelledby="contactTitle">
  <div class="contact-card">
    <h3 id="contactTitle">Tell me what to change</h3>
    <p class="lede">Anything not right? A name, the tone, a detail you forgot, the way the voice sounds, anything. Tell me and I'll redo your preview. No need to buy first.</p>
    <textarea id="contactMessage" placeholder="e.g. Amelia is spelled with a 'y'. Can you mention his dog Chip more? The tone reads a bit too young for a 13-year-old."></textarea>
    <div class="contact-status" id="contactStatus"></div>
    <div class="contact-actions">
      <button class="btn-cancel" id="contactCancel" type="button">Never mind</button>
      <button class="btn-send" id="contactSend" type="button">Send the changes to Jamie</button>
    </div>
  </div>
</div>

<script>
// ─── Currency localisation ─────────────────────────────────────
// Server returns localised price based on visitor's country. We swap every
// [data-price] element with the returned display string and stash the value
// for later code paths (button re-enable, dynamic renders). Some prices are
// inside template literals that mount later, so applyPriceLabels() is exposed
// and called again after each preview render. Falls back to £24.99 on failure.
window.__priceDisplay = '£24.99';
window.__priceCurrency = 'GBP';
window.applyPriceLabels = function(){
  document.querySelectorAll('[data-price]').forEach(el => { el.textContent = window.__priceDisplay; });
};
window.__pricePromise = (async function localisePrice(){
  try {
    const r = await fetch('/api/get-pricing', { credentials: 'omit' });
    if (!r.ok) return;
    const p = await r.json();
    if (!p || !p.display) return;
    window.__priceDisplay = p.display;
    window.__priceCurrency = p.currency;
    window.applyPriceLabels();
  } catch (e) { /* keep £24.99 fallback */ }
})();

// ─── Routing: storyId from /preview/{id} or /preview.html?id={id}
//    accessToken from ?t=...  ───────────────────────────────────
const pathParts = window.location.pathname.split('/').filter(Boolean);
const lastSeg = pathParts[pathParts.length - 1] || '';
const queryId = new URLSearchParams(window.location.search).get('id') || '';
const storyId = lastSeg && lastSeg !== 'preview.html' && lastSeg !== 'preview' ? lastSeg : queryId;
const accessToken = new URLSearchParams(window.location.search).get('t') || '';
// Email is collected at checkout time (the April flow). We track the
// captured value here so subsequent reloads / sticky CTAs don't re-prompt.
let capturedEmail = '';
let lastChildName = 'their';
// ?paid=1 is appended by Stripe success_url in checkout-paid.mjs. We use it
// to render an immediate "thanks, story being written" view even before the
// webhook fires (the webhook is async — without this the customer would see
// the regular preview page and assume nothing happened).
const justPaid = new URLSearchParams(window.location.search).get('paid') === '1';
const checkoutSessionId = new URLSearchParams(window.location.search).get('cs') || '';

// ── Meta Pixel: Purchase (client-side) ──
// Fire once when we land here from Stripe's success_url with ?paid=1&cs=<sid>.
// CAPI mirror is fired from stripe-webhook-paid.mjs with the same event_id
// (`purchase_<sid>`) — Meta dedups. Persist in sessionStorage to survive page
// reloads (refresh during ?paid=1 should NOT fire a duplicate Purchase).
if (justPaid && checkoutSessionId) {
  try {
    const firedKey = 'htn_purchase_fired_' + checkoutSessionId;
    if (!sessionStorage.getItem(firedKey)) {
      const fire = () => {
        try {
          if (window.htnPixel) {
            window.htnPixel.track('Purchase', {
              value: (window.__priceDisplay || '£24.99').replace(/[^0-9.]/g, ''),
              currency: window.__priceCurrency || 'GBP',
              content_name: 'Full story',
              content_type: 'product',
              content_ids: ['storytold_personalised_story'],
              num_items: 1
            }, { eventId: 'purchase_' + checkoutSessionId });
            sessionStorage.setItem(firedKey, '1');
          }
        } catch(e){}
      };
      if (window.htnPixel) fire();
      else window.addEventListener('load', fire, { once: true });
    }
  } catch(e){}
}

let pollTimer = null;
// Tolerance for transient network blips during polling: don't blow the
// wait-screen away on a single failed poll. Reset to zero on every success.
let _pollFailures = 0;
const POLL_FAILURE_LIMIT = 3;

function esc(s){
  if (s == null) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}
function poss(name){
  if (!name) return 'their';
  return name + "'s";
}

async function load(){
  if (!storyId) { showError(); return; }
  try {
    const url = `/api/preview-meta?id=${encodeURIComponent(storyId)}${accessToken ? `&t=${encodeURIComponent(accessToken)}` : ''}`;
    const res = await fetch(url, { credentials: 'include' });
    if (res.status === 403) { handlePollFailure(true); return; }
    if (!res.ok) { handlePollFailure(false); return; }
    const data = await res.json();
    _pollFailures = 0;
    capturedEmail = data.email || capturedEmail;
    if (data.childName) lastChildName = data.childName;
    if (data.storyData?.voice) window.__lastVoice = data.storyData.voice;
    render(data);
  } catch (e) { handlePollFailure(false); }
}

// Handle a single failed /api/preview-meta call. We tolerate up to a few
// transient failures while polling (mobile flaky network, brief 5xx)
// without nuking the wait screen. The first poll has no tolerance — if
// the page can't load at all, we want to surface the error fast.
function handlePollFailure(isAuth){
  _pollFailures += 1;
  // First load OR auth failure: bail straight away.
  if (isAuth && !pollTimer) { showLogin(); return; }
  if (!pollTimer) { showError(); return; }
  // Subsequent polling failures: tolerate, then give up.
  if (_pollFailures >= POLL_FAILURE_LIMIT) {
    if (isAuth) showLogin(); else showError();
  }
  // Otherwise: keep the wait screen up; the next tick will retry.
}

function showLogin(){
  document.getElementById('root').innerHTML = `
    <div class="state">
      <div class="state-icon">🔒</div>
      <h1>Sign in to listen.</h1>
      <p class="sub">This preview is tied to your email. Sign in, or use the recovery link we emailed you when you submitted the form.</p>
      <a class="state-link" href="/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}">Sign in</a>
    </div>`;
}

function showError(){
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (_statusCycleTimer) { clearInterval(_statusCycleTimer); _statusCycleTimer = null; }
  _lastRenderedScreen = 'error';
  document.getElementById('root').innerHTML = `
    <div class="state">
      <div class="state-icon">⚠️</div>
      <h1>Something went wrong.</h1>
      <p class="sub">Try refreshing. If it keeps happening, email <a href="mailto:hello@heartheirname.com">hello@heartheirname.com</a>.</p>
    </div>`;
}

// Track screen-level UI state so we don't re-render the game UI on every
// poll tick (which would reset the player's progress in the memory game).
let _lastRenderedScreen = null;

function render(data){
  // 1. Full story is ready → bounce straight to listen page.
  if (data.paid && data.full){
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    window.location.href = `/listen/${storyId}${accessToken ? `?t=${accessToken}` : ''}`;
    return;
  }
  // 2a. Manual delivery path: customer is among the small handful where
  //     Jamie is making the story by hand. Show the "thanks, within 24h"
  //     screen instead of the auto-generation wait UI. Still polls so when
  //     Jamie ships and audio_url lands, the page bounces them to listen.
  if ((justPaid || data.paid) && data.deliveryMode === 'manual') {
    if (_lastRenderedScreen !== 'paid-manual') {
      renderPaidManual(data);
      _lastRenderedScreen = 'paid-manual';
    }
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(load, 30000); // every 30s — no rush, Jamie ships when ready
    return;
  }
  // 2b. Auto-generation path: paid but full not ready → "writing your full
  //     story" screen with game. Polls aggressively so when audio_url
  //     lands the customer is bounced straight to /listen.
  if (justPaid || data.paid){
    if (_lastRenderedScreen !== 'paid-pending') {
      renderPaidPending(data);
      _lastRenderedScreen = 'paid-pending';
      setTimeout(() => initMemoryGame('genGameBoard', 'genGameScore'), 50);
      initGameSwitcher();
      initInputReveal(data);
      startProgressBar();
      startStatusCycler(data, 'genStatusLabel', 'genStatusDot', 'fullStoryMsgs');
    }
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(load, 4000);
    return;
  }
  // 3. Preview not generated yet → "writing your preview" screen with game.
  //    Aggressive polling because customer is in-browser waiting actively.
  if (!data.preview){
    if (_lastRenderedScreen !== 'waiting') {
      renderWaiting(data);
      _lastRenderedScreen = 'waiting';
      setTimeout(() => initMemoryGame('genGameBoard', 'genGameScore'), 50);
      initGameSwitcher();
      initInputReveal(data);
      startProgressBar();
      startStatusCycler(data, 'genStatusLabel', 'genStatusDot', 'previewMsgs');
    }
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(load, 3000);
    return;
  }
  // 4. Preview ready, no payment yet → the main sales page.
  if (_lastRenderedScreen !== 'ready') {
    finishProgressBar();
    renderReady(data);
    _lastRenderedScreen = 'ready';
  }
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Tic-tac-toe vs the house. Customer is X. House plays a calm
//    minimax-light: blocks immediate loss, takes immediate win, otherwise
//    plays centre or a random open square. Quick rounds, low cognitive load.
function initTicTacToe(boardId, scoreId){
  const board = document.getElementById(boardId);
  const score = document.getElementById(scoreId);
  if (!board) return;
  let cells = Array(9).fill('');
  let ended = false;
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  function winner(board){
    for (const [a,b,c] of LINES){ if (board[a] && board[a]===board[b] && board[b]===board[c]) return board[a]; }
    return null;
  }
  function full(board){ return board.every(c => c !== ''); }
  function draw(){
    board.innerHTML = '';
    cells.forEach((v, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'gen-ttt-cell';
      btn.dataset.idx = i;
      btn.textContent = v;
      if (v === 'X') btn.classList.add('is-x');
      if (v === 'O') btn.classList.add('is-o');
      btn.addEventListener('click', onCellClick);
      board.appendChild(btn);
    });
  }
  function findBest(player, opponent){
    // Win if you can
    for (let i = 0; i < 9; i++){
      if (cells[i] === ''){
        cells[i] = player;
        if (winner(cells) === player){ cells[i] = ''; return i; }
        cells[i] = '';
      }
    }
    // Block opponent's win
    for (let i = 0; i < 9; i++){
      if (cells[i] === ''){
        cells[i] = opponent;
        if (winner(cells) === opponent){ cells[i] = ''; return i; }
        cells[i] = '';
      }
    }
    // Take centre, then corners, then any
    if (cells[4] === '') return 4;
    const corners = [0,2,6,8].filter(i => cells[i] === '');
    if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    const open = cells.map((c, i) => c === '' ? i : -1).filter(i => i >= 0);
    return open[Math.floor(Math.random() * open.length)];
  }
  function setScore(text){ if (score) score.textContent = text; }
  function endGame(result){
    ended = true;
    if (result === 'X') setScore("You won. Nicely done.");
    else if (result === 'O') setScore("House took it. Tap any square to play again.");
    else setScore("Drawn. Tap any square to play again.");
  }
  function reset(){
    cells = Array(9).fill('');
    ended = false;
    setScore('');
    draw();
  }
  function onCellClick(e){
    const i = parseInt(e.currentTarget.dataset.idx, 10);
    if (ended){ reset(); return; }
    if (cells[i] !== '') return;
    cells[i] = 'X';
    draw();
    let w = winner(cells);
    if (w){ endGame(w); return; }
    if (full(cells)){ endGame(null); return; }
    // House plays after a tiny delay so the move feels deliberate.
    setTimeout(() => {
      const move = findBest('O', 'X');
      if (move != null) cells[move] = 'O';
      draw();
      const w2 = winner(cells);
      if (w2){ endGame(w2); return; }
      if (full(cells)){ endGame(null); }
    }, 300);
  }
  reset();
}

// ── Memory match game (ported from index-old-backup.html L4380, restyled)
function initMemoryGame(boardId, scoreId){
  const board = document.getElementById(boardId);
  if (!board) return;
  const emojis = ['🐶','🦄','🚀','🌙','🐱','🦕','🧸','⭐'];
  const pairs = [...emojis, ...emojis];
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  board.innerHTML = '';
  let flipped = [];
  let matched = 0;
  const scoreEl = document.getElementById(scoreId);
  pairs.forEach((emoji, idx) => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'gen-card';
    card.textContent = '';
    card.dataset.emoji = emoji;
    card.dataset.idx = idx;
    card.addEventListener('click', function() {
      if (flipped.length >= 2 || this.dataset.matched || this.dataset.flipped) return;
      this.textContent = emoji;
      this.dataset.flipped = '1';
      this.classList.add('is-flipped');
      flipped.push(this);
      if (flipped.length === 2) {
        if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
          matched++;
          flipped[0].dataset.matched = '1';
          flipped[1].dataset.matched = '1';
          flipped[0].classList.add('is-matched');
          flipped[1].classList.add('is-matched');
          flipped = [];
          if (scoreEl) scoreEl.textContent = matched + ' of ' + emojis.length + ' pairs';
          if (matched === emojis.length && scoreEl) scoreEl.textContent = 'All pairs found.';
        } else {
          setTimeout(() => {
            flipped.forEach(c => { c.textContent = ''; c.classList.remove('is-flipped'); delete c.dataset.flipped; });
            flipped = [];
          }, 800);
        }
      }
    });
    board.appendChild(card);
  });
  if (scoreEl) scoreEl.textContent = '';
}
