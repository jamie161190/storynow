<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B4E"/>
      <stop offset="100%" style="stop-color:#1A0F2E"/>
    </linearGradient>
    <linearGradient id="hpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#F1753B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C5CFC;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C5CFC;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background circle (Facebook crops to circle) -->
  <rect width="500" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle glow in center -->
  <circle cx="250" cy="230" r="180" fill="url(#glow)"/>

  <!-- Headphone + book icon, centered -->
  <g transform="translate(250, 225) scale(3.2)">
    <!-- Open book -->
    <path d="M-28 28 Q-28 -8 0 -14 L0 22 Q-28 28 -28 28Z" fill="white" opacity="0.9"/>
    <path d="M28 28 Q28 -8 0 -14 L0 22 Q28 28 28 28Z" fill="white" opacity="0.75"/>
    <!-- Book spine line -->
    <line x1="0" y1="-14" x2="0" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

    <!-- Headphone arc -->
    <path d="M-30 10 Q-30 -24 0 -30 Q30 -24 30 10" fill="none" stroke="url(#hpGrad)" stroke-width="5" stroke-linecap="round"/>

    <!-- Ear pieces -->
    <rect x="-36" y="6" width="13" height="18" rx="6.5" fill="url(#hpGrad)"/>
    <rect x="23" y="6" width="13" height="18" rx="6.5" fill="url(#hpGrad)"/>

    <!-- Sound waves -->
    <path d="M12 -4 Q19 -7 12 -14" fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M17 0 Q26 -5 17 -16" fill="none" stroke="#FFB347" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- Stars / sparkles -->
  <text x="105" y="140" font-size="22" opacity="0.7">✨</text>
  <text x="368" y="120" font-size="16" opacity="0.5">⭐</text>
  <text x="80" y="340" font-size="14" opacity="0.4">✦</text>
  <text x="400" y="350" font-size="18" opacity="0.55">✨</text>
  <text x="185" y="108" font-size="12" opacity="0.4">✦</text>
  <text x="310" y="105" font-size="14" opacity="0.5">✦</text>

  <!-- Brand name below icon -->
  <text x="250" y="390" font-family="'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle" fill="#C8B5FF" letter-spacing="-0.5">Hear Their</text>
  <text x="250" y="440" font-family="'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif" font-size="50" font-weight="900" text-anchor="middle" fill="#FF8C42" letter-spacing="-1">Name.</text>
</svg>
