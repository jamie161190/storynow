<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Their story · HearTheirName</title>
<meta name="robots" content="noindex">
<script defer src="/analytics.js"></script>
<link rel="icon" type="image/png" href="/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{--paper:#F4ECDB;--paper-2:#EFE4CD;--ink:#1F1B2E;--ink-2:#3D2E5A;--muted:#5C5240;--muted-2:#8A7E64;--line:rgba(31,27,46,.12);--plum:#4B2E83;--plum-2:#7A55C9;--terra:#D87A3E;--rose:#E0B7A0;--gold:#B89149;--serif:"Cormorant Garamond",Georgia,serif;--sans:"Inter",system-ui,sans-serif;--hand:"Caveat",cursive;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
.container{width:100%;max-width:680px;margin:0 auto;padding:0 24px}
.serif{font-family:var(--serif);font-weight:500;letter-spacing:-.005em}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);font-weight:500}

.btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:14px;padding:10px 18px;border-radius:8px;background:var(--ink);color:var(--paper);text-decoration:none;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn--ghost:hover{background:rgba(0,0,0,.04)}
.btn--terra{background:var(--terra);color:#fff}

header.s{border-bottom:1px solid var(--line);background:rgba(244,236,219,.85)}
.headerbar{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none}
.logo-text{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink)}
.logo-text em{font-style:italic;font-weight:500;color:var(--plum)}
.nav-r{display:flex;align-items:center;gap:14px;font-size:13px;color:var(--muted)}
.nav-r a{color:inherit;text-decoration:none}
.user-avatar{width:28px;height:28px;border-radius:999px;background:var(--plum);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}

main.s{padding:48px 0 64px}

h1.story-h{font-family:var(--serif);font-size:clamp(34px,5vw,46px);font-weight:500;letter-spacing:-.01em;line-height:1.05;margin:14px 0 12px}
.story-meta-row{display:flex;gap:16px;font-size:14px;color:var(--muted);margin-bottom:32px;flex-wrap:wrap}

.player{padding:4px;background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:24px}
.player-inner{background:var(--ink);color:var(--paper);border-radius:11px;padding:clamp(20px,3vw,28px)}
.player-head{display:flex;align-items:center;gap:18px}
.player-cover{width:88px;height:88px;border-radius:12px;background:linear-gradient(135deg,#4B2E83 0%,#7A55C9 50%,#C46A2E 100%);padding:1px;flex-shrink:0}
.player-cover-inner{background:#1A1428;border-radius:11px;height:100%;width:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:8px}
.player-cover-for{font-family:var(--serif);font-style:italic;font-size:10px;color:rgba(255,255,255,.55)}
.player-cover-name{font-family:var(--serif);font-weight:600;font-size:18px;line-height:1.05;margin-top:2px;color:#F4ECDB;word-break:break-word}
.player-meta{flex:1;min-width:0}
.player-kicker{font-family:var(--mono);font-size:10px;color:rgba(244,236,219,.6);letter-spacing:.1em}
.player-title{font-family:var(--serif);font-size:20px;font-weight:500;margin-top:4px;line-height:1.3}
.player-controls{margin-top:22px;display:flex;align-items:center;gap:14px}
.player-play{appearance:none;border:0;cursor:pointer;width:48px;height:48px;border-radius:999px;background:var(--terra);color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px -6px rgba(216,122,62,.6)}
.player-progress-wrap{flex:1;min-width:0}
.player-bar{height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;cursor:pointer}
.player-bar-fill{height:100%;width:0%;background:var(--rose);transition:width .1s linear}
.player-time{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:rgba(244,236,219,.55);margin-top:6px}
.player-bar-hit{padding:12px 0;cursor:pointer;background-clip:content-box}
.player-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:13px;color:rgba(244,236,219,.6);gap:10px;flex-wrap:wrap}
.player-foot .hint{font-style:italic}
.music-pill{display:inline-flex;align-items:center;gap:6px;padding:11px 16px;border-radius:999px;border:1px solid rgba(244,236,219,.2);background:rgba(255,255,255,.06);font-size:13px;color:var(--paper);cursor:pointer;font-family:var(--sans);font-weight:500;min-height:44px}

.action-row{display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap}

.note-card{padding:22px 24px;background:rgba(255,253,247,.7);border:1px solid var(--line);border-radius:14px;margin-bottom:18px}
.note-card .h{font-family:var(--serif);font-size:18px;font-weight:500;margin:0 0 6px}
.note-card .p{font-size:14px;color:var(--muted);line-height:1.6;margin:0}

.warn{padding:16px 22px;background:rgba(216,122,62,.08);border:1px solid rgba(216,122,62,.2);border-radius:10px;font-size:13.5px;margin-bottom:24px}
.warn a{color:var(--terra);text-decoration:underline}

.upsell{margin-top:32px;padding-top:32px;border-top:1px solid var(--line);text-align:center}
.upsell .h{font-family:var(--serif);font-size:22px;font-weight:500;margin:0 0 6px}
.upsell .p{color:var(--muted);font-size:14px;margin:0 0 16px}
.upsell .btn{padding:12px 22px;font-size:14px}

.toast{position:fixed;bottom:max(24px,calc(24px + env(safe-area-inset-bottom)));left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:999px;font-size:14px;z-index:200;transition:transform .25s}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── REVIEW HERO ── */
.review-hero{margin:32px 0 0;padding:30px clamp(22px,3vw,32px);background:#FFF8F0;border:1px solid #F0E0CC;border-radius:18px;position:relative;overflow:hidden;transition:box-shadow .4s ease,transform .4s ease}
.review-hero.is-finished{box-shadow:0 18px 60px -24px rgba(216,122,62,.45);transform:translateY(-2px)}
.review-hero .glow{position:absolute;top:-60px;right:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(216,122,62,.18),transparent 70%);pointer-events:none}
.review-hero .review-cap{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--plum);text-transform:uppercase;font-weight:600;margin:0 0 10px;position:relative}
.review-hero h2{font-family:var(--serif);font-size:clamp(22px,3vw,28px);font-weight:500;line-height:1.25;margin:0 0 12px;color:var(--ink);letter-spacing:-.005em;position:relative}
.review-hero h2 em{font-style:italic;color:var(--plum)}
.review-hero p{font-size:14.5px;line-height:1.6;color:var(--muted);margin:0 0 20px;position:relative}
.tp-cta{display:flex;align-items:center;gap:14px;padding:16px 18px;background:#fff;border:1.5px solid #00B67A;border-radius:12px;text-decoration:none;color:var(--ink);transition:transform .15s ease,box-shadow .15s ease;position:relative;margin:0 0 14px}
.tp-cta:hover{transform:translateY(-1px);box-shadow:0 8px 20px -8px rgba(0,182,122,.35)}
.tp-cta .tp-star{width:36px;height:36px;border-radius:8px;background:#00B67A;color:#fff;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.tp-cta .tp-text{flex:1;display:flex;flex-direction:column;gap:2px}
.tp-cta .tp-text .title{font-weight:600;font-size:14.5px;color:var(--ink)}
.tp-cta .tp-text .sub{font-size:12px;color:var(--muted-2)}
.tp-cta .tp-arrow{font-size:16px;color:var(--muted-2)}
.review-hero .reassure{font-size:12.5px;color:var(--muted-2);margin:0 0 18px;position:relative}
.jamie-mini{padding:14px 16px;background:rgba(244,236,219,.5);border-radius:10px;display:flex;gap:12px;align-items:flex-start;position:relative}
.jamie-mini-avatar{width:38px;height:38px;border-radius:999px;background:#E5D6B7;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--hand);font-size:20px;color:var(--plum)}
.jamie-mini-text{font-size:13.5px;color:var(--muted);line-height:1.55;font-style:italic}
.jamie-mini-text .sig{font-family:var(--hand);font-size:18px;color:var(--plum);font-style:normal;margin-top:6px}

/* ── SHARE SECTION ── */
.share-section{margin:24px 0 0;padding:24px clamp(20px,3vw,28px);background:rgba(255,253,247,.7);border:1px solid var(--line);border-radius:16px}
.share-section h3{font-family:var(--serif);font-size:20px;font-weight:500;margin:0 0 6px}
.share-section p{font-size:14px;color:var(--muted);margin:0 0 16px;line-height:1.55}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.share-btn{appearance:none;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:var(--sans);font-weight:500;font-size:14px;padding:12px 16px;border-radius:10px;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.share-btn:hover{background:var(--paper-2)}
.share-btn--full{width:100%;grid-column:1/-1}

/* ── PRACTICAL ACTIONS ── */

/* ── SOCIAL PROOF MINI BAR ── */
.proof-bar{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:18px;border-radius:12px;background:rgba(255,253,247,.6);border:1px solid var(--line);margin:24px 0 0;font-size:13px;color:var(--muted)}
.proof-bar .stars{color:#00B67A;letter-spacing:1px;font-size:14px}
.proof-bar .who{color:var(--ink);font-weight:600}

/* ── MOBILE OPTIMISATION (≤540px) — 99% of customers ── */
@media(max-width:540px){
  /* Tighter header */
  header.s .headerbar{height:56px}
  .logo svg{width:20px;height:20px}
  .logo-text{font-size:17px}
  .nav-r{gap:10px;font-size:12.5px}
  main.s{padding:24px 0 calc(40px + env(safe-area-inset-bottom))}
  .container{padding:0 18px}

  /* Hero title */
  h1.story-h{font-size:30px;line-height:1.05;margin:10px 0 10px}
  .story-meta-row{font-size:13px;gap:12px;margin-bottom:22px}

  /* Player: smaller cover, bigger play button (touch target) */
  .player{padding:3px;border-radius:14px;margin-bottom:20px}
  .player-inner{padding:18px;border-radius:11px}
  .player-cover{width:72px;height:72px}
  .player-cover-name{font-size:15px}
  .player-cover-for{font-size:9px}
  .player-kicker{font-size:9.5px}
  .player-title{font-size:17px;margin-top:2px}
  .player-controls{margin-top:18px;gap:12px}
  .player-play{width:56px;height:56px}
  .player-play svg{width:22px;height:22px}

  /* Note card */
  .note-card{padding:18px 20px}
  .note-card .h{font-size:17px}
  .note-card .p{font-size:13.5px}

  /* Review hero: bigger Trustpilot CTA, easier to tap */
  .review-hero{padding:24px 20px;margin-top:24px;border-radius:14px}
  .review-hero h2{font-size:22px}
  .review-hero p{font-size:14px}
  .tp-cta{padding:14px 16px;gap:12px;border-radius:10px}
  .tp-cta .tp-star{width:34px;height:34px}
  .tp-cta .tp-text .title{font-size:14px}
  .tp-cta .tp-text .sub{font-size:11.5px}
  .review-hero .reassure{font-size:12px}
  .jamie-mini{padding:12px 14px}
  .jamie-mini-text{font-size:13px}

  /* Share section: bigger tap targets */
  .share-section{padding:20px;border-radius:14px;margin-top:20px}
  .share-section h3{font-size:18px}
  .share-section p{font-size:13.5px;margin-bottom:14px}
  .share-grid{gap:8px}
  .share-btn{padding:14px 16px;font-size:14.5px;border-radius:10px;min-height:48px}

/* Proof bar: tighter */
  .proof-bar{padding:14px;gap:8px;font-size:12.5px;margin-top:20px}

  /* Warn block: tighter */
  .warn{padding:14px 18px;font-size:13px}

  /* Upsell: full-width terra CTA */
  .upsell{margin-top:28px;padding-top:24px}
  .upsell .h{font-size:20px}
  .upsell .p{font-size:13.5px}
  .upsell .btn{width:100%;padding:14px 22px;font-size:14.5px;min-height:48px}
}

/* Extra-small phones (iPhone SE / 320px) */
@media(max-width:360px){
  .container{padding:0 14px}
  h1.story-h{font-size:27px}
  .player-cover{width:64px;height:64px}
  .player-cover-name{font-size:13px}
  .review-hero h2{font-size:20px}
}

/* Honour reduce-motion */
@media(prefers-reduced-motion:reduce){
  .review-hero{transition:none}
  .toast{transition:none}
}
</style>
</head>
<body>

<header class="s">
  <div class="container headerbar">
    <a href="/" class="logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="3" y="6" width="26" height="20" rx="3" fill="#1F1B2E"/>
        <path d="M16 8v18M11 12v10M21 12v10M7 14v6M25 14v6" stroke="#F4ECDB" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Hear<em>Their</em>Name</span>
    </a>
    <div class="nav-r">
      <a href="mailto:hello@heartheirname.com">Help</a>
    </div>
  </div>
</header>

<main class="s">
  <div class="container" id="root">
    <p>Loading…</p>
  </div>
</main>

<div class="toast" id="toast">Link copied.</div>

<script>
const pathParts = window.location.pathname.split('/').filter(Boolean);
const storyId = pathParts[pathParts.length - 1];
const accessToken = new URLSearchParams(window.location.search).get('t') || '';

function esc(s){ if (s == null) return ''; return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fmt(s){ if(!s||isNaN(s))return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

async function load(){
  try {
    const url = `/api/preview-meta?id=${encodeURIComponent(storyId)}${accessToken ? `&t=${encodeURIComponent(accessToken)}` : ''}`;
    const res = await fetch(url, { credentials: 'include' });
    if (res.status === 403){ showLogin(); return; }
    if (!res.ok){ showError(); return; }
    const data = await res.json();
    if (!data.paid || !data.full){
      // Not paid yet, bounce to preview/listen
      window.location.href = `/preview/${storyId}${accessToken ? `?t=${accessToken}` : ''}`;
      return;
    }
    render(data);
  } catch(e){ showError(); }
}

function showLogin(){
  document.getElementById('root').innerHTML = `
    <div style="text-align:center;padding:40px 0">
      <h1 class="serif" style="font-size:32px;font-weight:500;margin:0 0 12px">Sign in to listen.</h1>
      <p style="color:var(--muted);max-width:440px;margin:0 auto 24px;line-height:1.6">This story is tied to your email. Sign in to access it.</p>
      <a class="btn" href="/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}">Sign in</a>
    </div>`;
}

function showError(){
  document.getElementById('root').innerHTML = `<p>Something went wrong. Please refresh or email <a href="mailto:hello@heartheirname.com" style="color:var(--plum)">hello@heartheirname.com</a>.</p>`;
}

function render(data){
  const childName = esc(data.childName || 'their');
  const title = data.preview?.title || data.storyData?.title || `${childName}'s Story`;
  const audioUrl = data.full.url;
  const jamieNote = data.full.jamieNote || '';

  document.getElementById('root').innerHTML = `
    <div class="kicker" style="color:var(--terra)">DELIVERED</div>
    <h1 class="story-h">${esc(title)}</h1>
    <div class="story-meta-row">
      <span>~15 min</span>
      <span>·</span>
      <span>Recorded by Jamie</span>
    </div>

    <div class="player">
      <div class="player-inner">
        <div class="player-head">
          <div class="player-cover"><div class="player-cover-inner">
            <div class="player-cover-for">a story for</div>
            <div class="player-cover-name">${childName}</div>
          </div></div>
          <div class="player-meta">
            <div class="player-kicker">FULL STORY · YOURS FOREVER</div>
            <div class="player-title">${esc(title.replace(/^and /, ''))}</div>
          </div>
        </div>
        <div class="player-controls">
          <button class="player-play" id="playBtn" aria-label="Play">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5L7 4.5z"/></svg>
          </button>
          <div class="player-progress-wrap">
            <div class="player-bar-hit" id="bar"><div class="player-bar"><div class="player-bar-fill" id="barFill"></div></div></div>
            <div class="player-time"><span id="cur">0:00</span><span id="dur">0:00</span></div>
          </div>
        </div>
        <div class="player-foot">
          <span class="hint">Yours forever. Save it. Share it.</span>
          <button id="musicToggle" type="button" class="music-pill">♫ Music on</button>
        </div>
        <audio id="audio" preload="auto" src="${esc(audioUrl)}"></audio>
        <audio id="bgMusic" preload="none" loop src="${esc((data.storyData?.storyKind === 'adventure') ? '/music/adventure-ambient.mp3?v=7' : '/music/bedtime-ambient.mp3?v=5')}"></audio>
      </div>
    </div>

    ${jamieNote ? `
      <div class="note-card">
        <div class="h">A note from Jamie</div>
        <p class="p">${esc(jamieNote)}</p>
      </div>` : ''}

    <!-- ── REVIEW HERO (highlights when story finishes) ── -->
    <section class="review-hero" id="reviewHero">
      <div class="glow"></div>
      <p class="review-cap" id="reviewCap">✦ one small thing</p>
      <h2 id="reviewHead">If this lands, tell us in <em>one sentence</em>.</h2>
      <p>A quick review is the single biggest thing that helps other parents find us. It's the reason a family like yours ended up here in the first place.</p>
      <a class="tp-cta" href="https://www.trustpilot.com/review/heartheirname.com" target="_blank" rel="noopener" onclick="trackReviewClick()">
        <span class="tp-star">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden><path d="M12 2l2.9 6.9L22 10l-5.5 4.8L18 22l-6-3.7L6 22l1.5-7.2L2 10l7.1-1.1z"/></svg>
        </span>
        <span class="tp-text">
          <span class="title">Leave a quick review on Trustpilot</span>
          <span class="sub">no signup · about 60 seconds</span>
        </span>
        <span class="tp-arrow">↗</span>
      </a>
      <p class="reassure">No account. No signup. Just a star rating and a line.</p>
      <div class="jamie-mini">
        <div class="jamie-mini-avatar">J</div>
        <div class="jamie-mini-text">
          "If your child smiled, or went quiet, or asked to hear it again, a short review helps another family find their way here. That's the whole reason we ask."
          <div class="sig">Jamie &amp; Chase</div>
        </div>
      </div>
    </section>

    <!-- ── SHARE ── -->
    <section class="share-section">
      <h3>Share with grandparents (or anyone).</h3>
      <p>This link is yours. Tap to send it to family and they can listen straight away. No login, no signup.</p>
      <div class="share-grid">
        <button type="button" class="share-btn" id="shareWaBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.247-.694.247-1.289.173-1.413z"/></svg>
          WhatsApp
        </button>
        <button type="button" class="share-btn" id="shareEmailBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          Email
        </button>
        <button type="button" class="share-btn share-btn--full" id="copyLinkBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Copy link
        </button>
      </div>
    </section>

<!-- ── SOCIAL PROOF MINI BAR ── -->
    <div class="proof-bar">
      <span class="stars">★★★★★</span>
      <span><strong class="who">4.9</strong> on Trustpilot</span>
      <span style="color:var(--muted-2)">·</span>
      <span>Made by Jamie + family</span>
    </div>

    <div class="warn" style="margin-top:24px">
      <strong>Something not right?</strong> Just reply to my email with anything you'd like changed and I'll redo it. No amount of edits is too many.
    </div>

    <div class="upsell">
      <div class="h">Want one for another little one?</div>
      <p class="p">Same warmth, made from scratch.</p>
      <a class="btn btn--terra" href="/start">Start a new story</a>
    </div>`;

  setupPlayer();
  // Wire share buttons via addEventListener (apostrophe-safe — onclick attribute
  // would break for names like O'Reilly because esc() doesn't escape `'`).
  // childName here is already HTML-escaped from the render() call but we use
  // the raw `data.childName` from the closure to build text/URLs cleanly.
  const rawName = data.childName || '';
  const waBtn = document.getElementById('shareWaBtn');
  const emailBtn = document.getElementById('shareEmailBtn');
  const copyBtn = document.getElementById('copyLinkBtn');
  if (waBtn) waBtn.addEventListener('click', () => shareWhatsApp(rawName));
  if (emailBtn) emailBtn.addEventListener('click', () => shareEmail(rawName));
  if (copyBtn) copyBtn.addEventListener('click', () => copyShareLink());
}

// ── SHARE HELPERS ──
function trackReviewClick(){
  fetch('/api/track-pageview', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page: '/listen/' + storyId, screen_name: 'story_review_click' })
  }).catch(()=>{});
}
function trackShare(method){
  fetch('/api/track-pageview', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page: '/listen/' + storyId, screen_name: 'story_share_' + method })
  }).catch(()=>{});
}
function buildShareUrl(){
  // Build a clean URL from origin + pathname + access token (preserves token,
  // strips any other query params or hash fragments cleanly).
  const base = window.location.origin + window.location.pathname;
  return base + (accessToken ? `?t=${encodeURIComponent(accessToken)}` : '');
}
function shareWhatsApp(name){
  trackShare('whatsapp');
  const url = buildShareUrl();
  const text = `We had a personalised audio story made for ${name || 'our little one'} by HearTheirName. Just tap to listen: ${url}`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}
function shareEmail(name){
  trackShare('email');
  const url = buildShareUrl();
  const subject = `Listen to ${name || 'their'} story`;
  const body = `We had a personalised audio story made by HearTheirName. Just tap the link to listen: ${url}\n\nIf you'd like one made for a child you love, you can get one at heartheirname.com`;
  window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
}
function copyShareLink(){
  trackShare('copy');
  const url = buildShareUrl();
  navigator.clipboard.writeText(url).then(() => showToast('Link copied. Send it on.')).catch(() => {
    const t = document.createElement('textarea');
    t.value = url; document.body.appendChild(t); t.select();
    try { document.execCommand('copy'); showToast('Link copied. Send it on.'); } catch(e){}
    document.body.removeChild(t);
  });
}

function setupPlayer(){
  const audio = document.getElementById('audio');
  const bg = document.getElementById('bgMusic');
  const playBtn = document.getElementById('playBtn');
  const bar = document.getElementById('bar');
  const fill = document.getElementById('barFill');
  const cur = document.getElementById('cur');
  const dur = document.getElementById('dur');
  const musicBtn = document.getElementById('musicToggle');

  let musicOn = true;
  const TARGET_VOL = 0.4;
  if (bg) bg.volume = 0;

  function fadeIn(){
    if (!bg) return;
    bg.volume = 0;
    let v = 0;
    const t = setInterval(() => {
      v += 0.04;
      if (v >= TARGET_VOL) { bg.volume = TARGET_VOL; clearInterval(t); }
      else bg.volume = v;
    }, 120);
  }

  function fadeOut(){
    if (!bg) return;
    let v = bg.volume;
    const t = setInterval(() => {
      v -= 0.04;
      if (v <= 0) { bg.volume = 0; bg.pause(); clearInterval(t); }
      else bg.volume = v;
    }, 120);
  }

  if (musicBtn) {
    musicBtn.addEventListener('click', () => {
      musicOn = !musicOn;
      if (musicOn) {
        musicBtn.textContent = '♫ Music on';
        if (!audio.paused && bg) { bg.play().catch(() => {}); bg.volume = TARGET_VOL; }
      } else {
        musicBtn.textContent = '♫ Music off';
        if (bg) bg.volume = 0;
      }
    });
  }

  audio.addEventListener('loadedmetadata', () => dur.textContent = fmt(audio.duration));
  audio.addEventListener('timeupdate', () => {
    cur.textContent = fmt(audio.currentTime);
    fill.style.width = (audio.duration ? (audio.currentTime / audio.duration * 100) : 0) + '%';
  });
  audio.addEventListener('ended', () => {
    playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5L7 4.5z"/></svg>';
    fadeOut();
    // Highlight the review hero and update the copy now they've finished
    const hero = document.getElementById('reviewHero');
    if (hero) {
      hero.classList.add('is-finished');
      const cap = document.getElementById('reviewCap');
      const head = document.getElementById('reviewHead');
      if (cap) cap.textContent = '✦ the story has ended';
      if (head) head.innerHTML = 'If it landed, tell us in <em>one sentence</em>.';
      // Scroll review hero into view after a short pause — but only if the
      // user is actually looking at the page. Otherwise (phone face-down at
      // bedtime), just leave the highlight; they'll see it when they pick up.
      setTimeout(() => {
        if (document.visibilityState === 'visible') {
          hero.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 600);
    }
  });
  playBtn.addEventListener('click', () => {
    if (audio.paused){
      audio.play();
      playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4.5" width="4" height="15" rx="1.2"/><rect x="14" y="4.5" width="4" height="15" rx="1.2"/></svg>';
      if (musicOn && bg) { bg.play().catch(() => {}); fadeIn(); }
    } else {
      audio.pause();
      if (bg) bg.pause();
      playBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5L7 4.5z"/></svg>';
    }
  });
  bar.addEventListener('click', e => {
    const r = bar.getBoundingClientRect();
    const ratio = (e.clientX - r.left) / r.width;
    if (audio.duration) audio.currentTime = ratio * audio.duration;
  });
}

load();
</script>
