<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Creator Hub | Storytold</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --purple: #7C5CFC;
      --purple-light: #EDE8FF;
      --purple-soft: #B8A9FF;
      --orange: #FF8C42;
      --orange-light: #FFF0E5;
      --bg: #FEFBF6;
      --card: #FFFFFF;
      --text: #2D2844;
      --text-soft: #6B6490;
      --text-muted: #7A7285;
      --border: #EDE8FF;
      --green: #4ECB71;
      --green-light: #E3FAEB;
      --shadow: 0 4px 24px rgba(124,92,252,0.08);
      --shadow-lg: 0 8px 40px rgba(124,92,252,0.12);
      --radius: 16px;
      --radius-lg: 24px;
      --radius-full: 9999px;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    body {
      overflow-x: hidden;
    }

    /* === SCREENS === */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: flex;
    }

    /* === SCREEN 1: GATE === */
    #screen-gate {
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .gate-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .gate-logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--purple);
      margin-bottom: 30px;
      letter-spacing: -1px;
    }

    .gate-card h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 30px;
      color: var(--text);
    }

    .gate-card label {
      display: block;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .gate-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      margin-bottom: 20px;
      transition: all 0.2s ease;
    }

    .gate-card input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(124,92,252,0.1);
    }

    .gate-error {
      color: #E63946;
      font-size: 14px;
      margin-bottom: 15px;
      display: none;
    }

    .btn-unlock {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-unlock:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-unlock:active {
      transform: translateY(0);
    }

    /* === SCREEN 2: REGISTER === */
    #screen-register {
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .register-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }

    .register-card h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 30px;
      color: var(--text);
    }

    .register-card label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 8px;
      margin-top: 20px;
    }

    .register-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      transition: all 0.2s ease;
      margin-bottom: 12px;
    }

    .register-card input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(124,92,252,0.1);
    }

    .children-inputs {
      margin-bottom: 10px;
    }

    .add-child-btn {
      padding: 10px 16px;
      background: var(--purple-light);
      color: var(--purple);
      border: 2px solid var(--purple);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .add-child-btn:hover {
      background: var(--purple);
      color: white;
    }

    .add-child-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .password-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .btn-letsgo {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn-letsgo:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* === SCREEN 3: HUB === */
    #screen-hub {
      display: none;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
      padding: 20px;
    }

    #screen-hub.active {
      display: flex;
    }

    /* Top Bar */
    .hub-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .hub-greeting {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .hub-topbar-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-topbar {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .btn-topbar:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Hub Content */
    .hub-content {
      flex: 1;
      overflow-y: auto;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* Beginner Guides Section */
    .guides-section {
      margin-bottom: 50px;
    }

    .guides-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 20px;
      background: var(--purple-light);
      border-radius: var(--radius);
      margin-bottom: 20px;
      user-select: none;
    }

    .guides-header h2 {
      font-size: 20px;
      font-weight: 800;
      color: var(--purple);
      margin: 0;
    }

    .guides-toggle {
      font-size: 24px;
      color: var(--purple);
      transition: transform 0.3s ease;
    }

    .guides-toggle.open {
      transform: rotate(180deg);
    }

    .guides-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .guides-content.open {
      max-height: 2000px;
    }

    .guide-item {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .guide-item h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
    }

    .guide-item p {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.8;
      margin-bottom: 15px;
    }

    .guide-item ul {
      margin-left: 20px;
      margin-bottom: 15px;
    }

    .guide-item li {
      font-size: 15px;
      color: var(--text-soft);
      margin-bottom: 8px;
      line-height: 1.8;
    }

    .guide-svg {
      margin: 20px 0;
      text-align: center;
    }

    /* Content Cards Grid */
    .content-section {
      margin-bottom: 50px;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 16px;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn.active {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--purple);
      color: var(--purple);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
      margin-bottom: 50px;
    }

    @media (min-width: 768px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1200px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .content-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .content-card:hover:not(.locked) {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--purple);
    }

    .content-card.locked {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .card-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
      text-transform: capitalize;
    }

    .badge-bedtime {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge-adventure {
      background: var(--orange-light);
      color: var(--orange);
    }

    .badge-gift {
      background: var(--green-light);
      color: var(--green);
    }

    .badge-parent {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge-founder {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge-young-creator {
      background: var(--orange-light);
      color: var(--orange);
    }

    .badge-grandparent {
      background: var(--purple-light);
      color: var(--purple);
    }

    .badge-specialist {
      background: var(--orange-light);
      color: var(--orange);
    }

    .badge-no-face {
      background: var(--border);
      color: var(--text-soft);
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .card-taken {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn-take {
      flex: 1;
      padding: 10px 12px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-take:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .badge-taken {
      flex: 1;
      padding: 10px 12px;
      background: var(--green-light);
      color: var(--green);
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .share-icons {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .share-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .share-btn:hover {
      background: var(--purple-light);
      color: var(--purple);
    }

    .lock-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: rgba(255,255,255,0.95);
      z-index: 10;
    }

    /* === MODALS === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius-lg);
      max-height: 90vh;
      overflow-y: auto;
      max-width: 600px;
      width: 100%;
      padding: 30px;
      position: relative;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s ease;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: none;
      background: var(--border);
      border-radius: 8px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--purple-light);
      color: var(--purple);
    }

    .modal h2 {
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 24px;
      padding-right: 50px;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .modal-section p {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .modal-section ul {
      margin-left: 20px;
      margin-bottom: 10px;
    }

    .modal-section li {
      font-size: 15px;
      color: var(--text-soft);
      margin-bottom: 8px;
      line-height: 1.8;
    }

    .modal-svg {
      margin: 20px 0;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      padding-top: 24px;
      border-top: 2px solid var(--border);
    }

    .btn-modal-take {
      flex: 1;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-modal-take:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .modal-share {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-share-btn {
      padding: 12px 16px;
      background: var(--border);
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-share-btn:hover {
      background: var(--purple-light);
      color: var(--purple);
    }

    /* Referral Modal */
    .referral-content {
      text-align: center;
    }

    .referral-link-box {
      background: var(--purple-light);
      border: 2px solid var(--purple);
      border-radius: var(--radius);
      padding: 16px;
      margin: 20px 0;
      word-break: break-all;
      font-family: 'Quicksand', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--purple);
    }

    .btn-copy {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }

    .btn-copy:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn-copy.copied {
      background: var(--green);
    }

    .referral-message {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      margin: 20px 0;
    }

    .referral-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .stat-box {
      background: var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--purple);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Earnings Modal */
    .password-verify {
      margin-bottom: 24px;
    }

    .earnings-content {
      display: none;
    }

    .earnings-content.visible {
      display: block;
    }

    .earnings-stat {
      background: var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .earnings-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .earnings-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--purple);
    }

    /* Password Prompt Modal */
    .password-modal {
      max-width: 420px;
    }

    .password-input-group {
      margin-bottom: 20px;
    }

    .password-input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 10px;
    }

    .password-input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      transition: all 0.2s ease;
    }

    .password-input-group input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(124,92,252,0.1);
    }

    .password-error {
      color: #E63946;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    .password-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-verify {
      flex: 1;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--purple) 0%, #9B7CFF 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-verify:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn-cancel {
      flex: 1;
      padding: 12px 24px;
      background: var(--border);
      color: var(--text-soft);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-cancel:hover {
      background: var(--purple-light);
    }

    /* Founder Lock Prompt */
    .founder-lock-prompt {
      max-width: 420px;
      text-align: center;
    }

    .founder-lock-prompt p {
      font-size: 15px;
      color: var(--text-soft);
      margin-bottom: 20px;
    }

    .founder-lock-prompt input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      margin-bottom: 20px;
      transition: all 0.2s ease;
    }

    .founder-lock-prompt input:focus {
      outline: none;

    // Wait for DOM to be ready
    document.addEventListener('DOMContentLoaded', function() {

    // ====== API HELPERS ======
    async function apiSignup(name, childNames, password) {
      try {
        const res = await fetch('/api/creator-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'signup', name, childNames, password })
        });
        return await res.json();
      } catch (e) {
        console.error('Signup error:', e);
        return null;
      }
    }

    async function apiTakePiece(creatorId, creatorName, pieceNumber, pieceTitle) {
      try {
        const res = await fetch('/api/content-take', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ creatorId, creatorName, pieceNumber, pieceTitle })
        });
        return await res.json();
      } catch (e) {
        console.error('Take error:', e);
        return null;
      }
    }

    async function apiGetTakes(creatorId) {
      try {
        const res = await fetch(`/api/content-take?creator_id=${creatorId}`);
        return await res.json();
      } catch (e) {
        console.error('Get takes error:', e);
        return null;
      }
    }

    async function apiGetAllTakes() {
      try {
        const res = await fetch('/api/content-take?pieces=true');
        return await res.json();
      } catch (e) {
        console.error('Get all takes error:', e);
        return null;
      }
    }

    async function apiGetReferralStats(refCode) {
      try {
        const res = await fetch(`/api/referral-stats?code=${encodeURIComponent(refCode)}`);
        return await res.json();
      } catch (e) {
        console.error('Referral stats error:', e);
        return null;
      }
    }

    // ====== STATE ======
    let takeCounts = {}; // { pieceNumber: count }

    function getCreatorData() {
      return JSON.parse(sessionStorage.getItem('creatorData') || '{}');
    }

    function setCreatorData(data) {
      sessionStorage.setItem('creatorData', JSON.stringify(data));
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    // ====== SCREEN 1: GATE ======
    document.getElementById('btn-unlock').addEventListener('click', function() {
      const code = document.getElementById('gate-code').value.trim();
      const errorEl = document.querySelector('.gate-error');

      if (code === 'StoryToldWLV') {
        errorEl.style.display = 'none';
        // Check if already registered in this session
        const existing = getCreatorData();
        if (existing && existing.id) {
          document.querySelector('.hub-greeting').textContent = 'Hey, ' + existing.name;
          showScreen('screen-hub');
          initializeHub();
        } else {
          showScreen('screen-register');
        }
      } else {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Incorrect access code. Try again.';
      }

      if (e.key === 'Enter') document.getElementById('btn-unlock').click();
    });

      const children = Array.from(childInputs).map(i => i.value.trim()).filter(v => v);
      if (!children.length) { alert("Please enter at least one child's name"); return; }
      if (!password) { alert('Please set a password'); return; }

      // Show loading state
      this.textContent = 'Setting up...';
      this.disabled = true;

      // Call API
      const result = await apiSignup(name, children, password);

      if (result && result.success && result.creator) {
        const creator = result.creator;
        setCreatorData({
          id: creator.id,
          name: creator.name,
          children: creator.child_names || children,
          password: password,
          referralCode: creator.referral_code,
          takenPieces: []
        });

        // Load their existing takes if returning creator
        if (result.existing) {
          const takesResult = await apiGetTakes(creator.id);
          if (takesResult && takesResult.takes) {
            const data = getCreatorData();
            data.takenPieces = takesResult.takes.map(t => t.piece_number);
            setCreatorData(data);
          }
        }

        document.querySelector('.hub-greeting').textContent = 'Hey, ' + name;
        showScreen('screen-hub');
        initializeHub();
      } else {
        alert('Something went wrong. Please try again.');
        this.textContent = "Let's go";
        this.disabled = false;
      }
    });

    // ====== SCREEN 3: HUB ======
    async function initializeHub() {
      renderGuidesSection();

      // Load take counts from API
      const allTakes = await apiGetAllTakes();
      if (allTakes && allTakes.counts) {
        takeCounts = {};
        Object.keys(allTakes.counts).forEach(k => {
          takeCounts[parseInt(k)] = allTakes.counts[k].count;
        });
      }

      renderContentGrid();
      setupTopBarListeners();
    }

    function renderGuidesSection() {
      const guidesContent = document.querySelector('.guides-content');
      guidesContent.innerHTML = '<div class="guide-item"><h3>What is 9:16?</h3><p>9:16 means vertical, the way you hold your phone normally. It fills the whole screen on TikTok and Instagram Stories. 1:1 is a square, like an Instagram post in someone\'s feed. 4:5 is slightly taller than a square, used for Instagram feed posts.</p><div class="guide-svg">' + getAspectRatioSVG() + '</div></div><div class="guide-item"><h3>How to adapt 9:16 to newsfeed</h3><ol><li>Open CapCut (free app). Duplicate your project.</li><li>Tap the canvas or ratio button. Change it to 1:1.</li><li>Your video will look zoomed in. Pinch to zoom out and drag to reposition so the important part (usually the face) stays in the centre.</li><li>Export. Now you have two versions: one for Stories/Reels and one for newsfeeds.</li></ol></div><div class="guide-item"><h3>Basic video editing in CapCut</h3><ol><li>Download CapCut (free). Open it and tap New Project. Import your video.</li><li>Trim the start and end: drag the edges of the clip to keep only the good bit.</li><li>Add text: tap Text at the bottom, tap Add Text, type your words, drag to position them on screen, then drag the text bar on the timeline to set when it appears and disappears.</li><li>Add a second text the same way for the reveal moment.</li><li>Tap the export button (top right). Save to your camera roll. Post.</li></ol></div>';
    }

    function renderContentGrid() {
      const grid = document.querySelector('.cards-grid');
      const filters = document.querySelector('.filters');

      const categories = ['all', 'bedtime', 'adventure', 'parent', 'gift', 'young-creator', 'grandparent', 'specialist', 'no-face', 'founder'];
      filters.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
        btn.textContent = cat === 'no-face' ? 'No Face' : cat === 'young-creator' ? 'Young Creator' : cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.dataset.filter = cat;
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          filterAndRenderCards(cat);
        });
        filters.appendChild(btn);
      });

      filterAndRenderCards('all');
    }

    function filterAndRenderCards(filter) {
      const grid = document.querySelector('.cards-grid');
      const creatorData = getCreatorData();

      const filtered = filter === 'all' ? PIECES : PIECES.filter(p => {
        if (filter === 'founder') return p.founder;
        return p.cat === filter || p.tags.includes(filter);
      });

      grid.innerHTML = '';
      filtered.forEach(piece => {
        const card = document.createElement('div');
        card.className = 'content-card' + (piece.founder ? ' locked' : '');
        card.dataset.pieceId = piece.n;

        const taken = creatorData.takenPieces && creatorData.takenPieces.includes(piece.n);
        const count = takeCounts[piece.n] || 0;

        let actionHtml = '';
        if (piece.founder) {
          actionHtml = '<button class="btn-take" onclick="event.stopPropagation(); openFounderLock(' + piece.n + ')">Unlock</button>';
        } else if (taken) {
          actionHtml = '<div class="badge-taken">Taken</div>';
        } else {
          actionHtml = '<button class="btn-take" onclick="event.stopPropagation(); handleTake(' + piece.n + ')">Take this</button>';
        }

        card.innerHTML = (piece.founder ? '<div class="lock-overlay">🔒</div>' : '') +
          '<div class="card-badge badge-' + piece.cat + '">' + piece.cat + '</div>' +
          '<div class="card-title">' + piece.n + '. ' + piece.title + '</div>' +
          '<div class="card-subtitle">' + piece.who + '</div>' +
          '<div class="card-meta">Length: ' + piece.length + '</div>' +
          '<div class="card-meta">Ratio: ' + piece.ratio + '</div>' +
          '<div class="card-taken">' + (count > 0 ? count + ' creator' + (count > 1 ? 's' : '') + ' taken this' : 'Available') + '</div>' +
          '<div class="card-actions">' + actionHtml +
          '<div class="share-icons">' +
          '<button class="share-btn" title="Share on WhatsApp" onclick="event.stopPropagation(); shareWhatsApp(' + piece.n + ')">📱</button>' +
          '<button class="share-btn" title="Share via Email" onclick="event.stopPropagation(); shareEmail(' + piece.n + ')">✉️</button>' +
          '</div></div>';

        card.addEventListener('click', function(e) {
          if (!e.target.classList.contains('btn-take') && !e.target.classList.contains('share-btn')) {
            if (piece.founder) {
              openFounderLock(piece.n);
            } else {
              openCardDetail(piece);
            }
          }
        });

        grid.appendChild(card);
      });
    }

    // ====== TAKE FUNCTIONALITY ======
    async function handleTake(pieceId) {
      const creatorData = getCreatorData();
      const piece = PIECES.find(p => p.n === pieceId);
      if (!creatorData.takenPieces) creatorData.takenPieces = [];

      if (!creatorData.takenPieces.includes(pieceId)) {
        // Call API
        await apiTakePiece(creatorData.id, creatorData.name, pieceId, piece.title);

        // Update local state
        creatorData.takenPieces.push(pieceId);
        setCreatorData(creatorData);

        // Update count
        takeCounts[pieceId] = (takeCounts[pieceId] || 0) + 1;

        // Re-render
        const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
        filterAndRenderCards(activeFilter);
      }
    }

    // Make handleTake global for onclick
    window.handleTake = handleTake;

    // ====== FOUNDER LOCK ======
    function openFounderLock(pieceId) {
      const overlay = document.querySelector('.modal-overlay');
      const modal = document.querySelector('.modal');

      modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
        '<div class="founder-lock-prompt">' +
        '<h2 style="text-align: center; margin-bottom: 20px;">Founder Content</h2>' +
        '<p>This content is locked for the Storytold founder. Enter the access code to unlock.</p>' +
        '<input type="password" id="founder-password" placeholder="Access code" />' +
        '<div class="founder-error" id="founder-error"></div>' +
        '<div class="founder-actions">' +
        '<button class="btn-unlock-founder" onclick="verifyFounderPassword(' + pieceId + ')">Unlock</button>' +
        '<button class="btn-close-founder" onclick="closeModal()">Cancel</button>' +
        '</div></div>';

      overlay.classList.add('active');
      setTimeout(function() { document.getElementById('founder-password').focus(); }, 100);
    }
    window.openFounderLock = openFounderLock;

    function verifyFounderPassword(pieceId) {
      const password = document.getElementById('founder-password').value.trim();
      const errorEl = document.getElementById('founder-error');

      if (password === 'ChaseAndEllis') {
        const piece = PIECES.find(p => p.n === pieceId);
        closeModal();
        setTimeout(function() { openCardDetail(piece); }, 300);
      } else {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Incorrect password.';
      }
    }
    window.verifyFounderPassword = verifyFounderPassword;

    // ====== CARD DETAIL MODAL ======
    function openCardDetail(piece) {
      const overlay = document.querySelector('.modal-overlay');
      const modal = document.querySelector('.modal');
      const creatorData = getCreatorData();
      const taken = creatorData.takenPieces && creatorData.takenPieces.includes(piece.n);

      const positioningSvg = getPositioningSVG(piece.positioning);

      let actionHtml = '';
      if (taken) {
        actionHtml = '<button class="btn-modal-take" style="background: var(--green-light); color: var(--green); cursor: default;">Already taken</button>';
      } else {
        actionHtml = '<button class="btn-modal-take" onclick="handleTake(' + piece.n + '); closeModal();">Take This Piece</button>';
      }

      modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
        '<h2>' + piece.title + '</h2>' +
        '<div class="modal-section"><h3>Who This Is For</h3><p>' + piece.who + '</p></div>' +
        '<div class="modal-section"><h3>Content Length</h3><p>' + piece.length + '</p></div>' +
        '<div class="modal-section"><h3>Aspect Ratio</h3><p>' + piece.ratio + '</p><p style="font-size:13px;color:var(--text-muted);margin-top:10px;">' + piece.ratioNote + '</p></div>' +
        '<div class="modal-section"><h3>What To Do</h3><p>' + piece.whatToDo + '</p></div>' +
        '<div class="modal-section"><h3>What Not To Do</h3><p style="color:#c0392b;">' + piece.whatNotToDo + '</p></div>' +
        '<div class="modal-section"><h3>Background</h3><p>' + piece.background + '</p></div>' +
        '<div class="modal-section"><h3>Positioning</h3><p>' + piece.positioningText + '</p><div class="modal-svg">' + positioningSvg + '</div></div>' +
        '<div class="modal-section"><h3>Text On Screen</h3><p>' + piece.textOnScreen + '</p></div>' +
        '<div class="modal-section"><h3>Sound</h3><p>' + piece.sound + '</p></div>' +
        '<div class="modal-actions">' + actionHtml + '</div>' +
        '<div class="modal-share">' +
        '<button class="modal-share-btn" onclick="shareWhatsApp(' + piece.n + ')">📱 WhatsApp</button>' +
        '<button class="modal-share-btn" onclick="shareEmail(' + piece.n + ')">✉️ Email</button>' +
        '</div>';

      overlay.classList.add('active');
    }

    function closeModal() {
      document.querySelector('.modal-overlay').classList.remove('active');
    }
    window.closeModal = closeModal;

    // ====== SHARE ======
    function shareWhatsApp(pieceId) {
      const piece = PIECES.find(p => p.n === pieceId);
      const text = "Hey! I'm creating content for Storytold (personalised kids' stories). Check out this content idea: " + piece.title + ". Get the full brief here: https://storytold.ai/creators (code: StoryToldWLV)";
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }
    window.shareWhatsApp = shareWhatsApp;

    function shareEmail(pieceId) {
      const piece = PIECES.find(p => p.n === pieceId);
      var subject = 'Storytold Content Brief: ' + piece.title;
      var body = "Check out this content idea for Storytold: " + piece.title + "\n\nGet the full brief here: https://storytold.ai/creators (code: StoryToldWLV)";
      window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    }
    window.shareEmail = shareEmail;

    // ====== TOP BAR ======
    function setupTopBarListeners() {
      var btns = document.querySelectorAll('.btn-topbar');
      if (btns[0]) btns[0].addEventListener('click', openReferralModal);
      if (btns[1]) btns[1].addEventListener('click', openEarningsModal);
    }

    async function openReferralModal() {
      const creatorData = getCreatorData();
      const referralLink = 'https://storytold.ai?ref=' + creatorData.referralCode;

      // Fetch live stats
      let visits = 0, conversions = 0, earnings = 0;
      const stats = await apiGetReferralStats(creatorData.referralCode);
      if (stats) {
        visits = stats.visits || 0;
        conversions = stats.conversions || 0;
        earnings = conversions * 5;
      }

      const overlay = document.querySelector('.modal-overlay');
      const modal = document.querySelector('.modal');

      modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
        '<h2 style="text-align:center;">Your Referral Link</h2>' +
        '<div class="referral-content">' +
        '<p style="margin-bottom:20px;">Share your unique link. You earn £5 for every story purchased through it.</p>' +
        '<div class="referral-link-box">' + referralLink + '</div>' +
        '<button class="btn-copy" id="copy-btn" onclick="copyReferralLink()">Copy Link</button>' +
        '<button class="btn-topbar" style="width:100%;margin-top:10px;" onclick="shareReferralWhatsApp()">📱 Share on WhatsApp</button>' +
        '<div class="referral-stats">' +
        '<div class="stat-box"><div class="stat-value">' + visits + '</div><div class="stat-label">Visits</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + conversions + '</div><div class="stat-label">Purchases</div></div>' +
        '<div class="stat-box"><div class="stat-value">£' + earnings + '</div><div class="stat-label">Earned</div></div>' +
        '</div></div>';

      overlay.classList.add('active');
    }

    function copyReferralLink() {
      const creatorData = getCreatorData();
      var referralLink = 'https://storytold.ai?ref=' + creatorData.referralCode;
      navigator.clipboard.writeText(referralLink).then(function() {
        var btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
      });
    }
    window.copyReferralLink = copyReferralLink;

    function shareReferralWhatsApp() {
      const creatorData = getCreatorData();
      var referralLink = 'https://storytold.ai?ref=' + creatorData.referralCode;
      var text = 'Create a personalised story for your child at storytold.ai. Use my link: ' + referralLink;
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }
    window.shareReferralWhatsApp = shareReferralWhatsApp;

    async function openEarningsModal() {
      const overlay = document.querySelector('.modal-overlay');
      const modal = document.querySelector('.modal');

      modal.innerHTML = '<button class="modal-close" onclick="closeModal()">×</button>' +
        '<h2 style="text-align:center;">My Earnings</h2>' +
        '<div class="password-verify">' +
        '<p style="font-size:14px;color:var(--text-soft);margin-bottom:15px;">Enter your password to view your earnings.</p>' +
        '<input type="password" id="earnings-password" placeholder="Your password" style="width:100%;padding:0.85rem 1rem;border:2px solid var(--border);border-radius:12px;font-family:Quicksand,sans-serif;margin-bottom:10px;" />' +
        '<div class="founder-error" id="earnings-error"></div>' +
        '<button class="btn-unlock-founder" onclick="verifyEarningsPassword()" style="width:100%;margin-top:10px;">View Earnings</button>' +
        '</div>' +
        '<div class="earnings-content" id="earnings-content" style="display:none;"></div>';

      overlay.classList.add('active');
      setTimeout(function() { document.getElementById('earnings-password').focus(); }, 100);
    }

    async function verifyEarningsPassword() {
      const password = document.getElementById('earnings-password').value.trim();
      const creatorData = getCreatorData();
      const errorEl = document.getElementById('earnings-error');

      if (password === creatorData.password) {
        // Fetch live stats
        let visits = 0, conversions = 0, earnings = 0;
        const stats = await apiGetReferralStats(creatorData.referralCode);
        if (stats) {
          visits = stats.visits || 0;
          conversions = stats.conversions || 0;
          earnings = conversions * 5;
        }

        document.querySelector('.password-verify').style.display = 'none';
        var ec = document.getElementById('earnings-content');
        ec.style.display = 'block';
        ec.innerHTML = '<div style="text-align:center;padding:20px 0;">' +
          '<div style="font-size:2rem;font-weight:800;color:var(--purple);">£' + earnings + '</div>' +
          '<div style="font-size:0.9rem;color:var(--text-soft);margin-top:5px;">Total Earnings</div>' +
          '</div>' +
          '<div class="referral-stats">' +
          '<div class="stat-box"><div class="stat-value">' + visits + '</div><div class="stat-label">Link Visits</div></div>' +
          '<div class="stat-box"><div class="stat-value">' + conversions + '</div><div class="stat-label">Purchases</div></div>' +
          '</div>' +
          '<p style="font-size:13px;color:var(--text-muted);margin-top:20px;text-align:center;">You can come back anytime with your name and password to check your earnings.</p>';
      } else {
        errorEl.style.display = 'block';
        errorEl.textContent = 'Incorrect password.';
      }
    }
    window.verifyEarningsPassword = verifyEarningsPassword;

    // ====== GUIDES TOGGLE ======
    document.querySelector('.guides-header').addEventListener('click', function() {
      var toggle = this.querySelector('.guides-toggle');
      var content = document.querySelector('.guides-content');
      toggle.classList.toggle('open');
      content.classList.toggle('open');
    });

    // Modal close on overlay click
    document.querySelector('.modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Initialize with gate screen
    showScreen('screen-gate');

    }); // end DOMContentLoaded
  </script>
</body>
</html>
