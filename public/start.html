<script>
// Page-view tracking — fires once on load so we can see funnel drop-off
// between /start, /preview, and /order-confirmed in the page_views table.
try {
  const urlParams = new URLSearchParams(window.location.search);
  fetch('/api/track-pageview', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      page: '/start',
      referrer: document.referrer || '',
      utm_source: urlParams.get('utm_source') || '',
      utm_medium: urlParams.get('utm_medium') || '',
      utm_campaign: urlParams.get('utm_campaign') || '',
      device: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
    })
  }).catch(()=>{});
} catch(e){}
</script>

<style>
:root{
  --paper:#F4ECDB; --paper-2:#EFE4CD; --paper-3:#E7D9BA;
  --ink:#1F1B2E; --ink-2:#3D2E5A;
  --muted:#5C5240; --muted-2:#8A7E64;
  --line:rgba(31,27,46,.12); --line-2:#D6C7A4;
  --plum:#4B2E83; --plum-2:#7A55C9;
  --terra:#D87A3E; --terra-2:#C46A2E;
  --rose:#E0B7A0; --moss:#6F8A4F; --gold:#B89149;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --hand:"Caveat",cursive;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background-image:radial-gradient(rgba(80,60,30,.05) 1px,transparent 1px),radial-gradient(rgba(80,60,30,.04) 1px,transparent 1px);background-size:3px 3px,7px 7px;background-position:0 0,1px 2px;opacity:.55;mix-blend-mode:multiply}
::selection{background:var(--plum);color:var(--paper)}
a{color:inherit}
.app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
.container{width:100%;max-width:1200px;margin:0 auto;padding:0 24px}
@media(min-width:900px){.container{padding:0 40px}}
.serif{font-family:var(--serif);font-weight:500;letter-spacing:-.005em}
.hand{font-family:var(--hand)}
.mono{font-family:var(--mono);font-size:.78em;letter-spacing:.04em;text-transform:uppercase}
.italic-plum{font-style:italic;color:var(--plum)}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);font-weight:500}

.btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;padding:18px 28px;border-radius:999px;background:var(--terra);color:#fff;box-shadow:0 8px 24px -10px rgba(216,122,62,.55);transition:transform .15s ease,background .15s ease,opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:10px;text-decoration:none}
.btn:hover{background:var(--terra-2);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn--ink{background:var(--ink);color:var(--paper)}
.btn--ink:hover{background:#2c2545}
.btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn--ghost:hover{background:rgba(0,0,0,.04)}
.btn--sm{padding:12px 18px;font-size:14px}

/* Header */
header.f{border-bottom:1px solid var(--line);background:rgba(244,236,219,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.headerbar{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none}
.logo-text{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink)}
.logo-text em{font-style:italic;font-weight:500;color:var(--plum)}
.progress-bar{height:3px;background:var(--paper-2)}
.progress-fill{height:100%;background:var(--plum);transition:width .35s ease}
.step-counter{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.06em}

/* Main */
main.f{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
.step-wrap{width:100%;max-width:600px}
.step-wrap.wide{max-width:680px}
.step-wrap.narrow{max-width:540px}
.step-head{text-align:center;margin-bottom:28px}
.step-head h2{font-family:var(--serif);font-size:clamp(26px,3.6vw,38px);margin:0;font-weight:500;line-height:1.2}
.step-head .sub{color:var(--muted);font-size:15px;margin-top:10px;margin-bottom:0}

/* Chips */
.chip{appearance:none;border:1px solid var(--line);background:rgba(255,253,247,.7);border-radius:12px;padding:14px 12px;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;text-align:center;line-height:1.2;transition:border-color .15s,background .15s}
.chip[data-on="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:hover{border-color:var(--plum)}
.chip-card{appearance:none;border:1px solid var(--line);background:rgba(255,253,247,.7);border-radius:16px;padding:24px 18px;cursor:pointer;font-family:var(--sans);text-align:left;color:var(--ink);display:flex;flex-direction:column;align-items:flex-start;transition:border-color .15s}
.chip-card[data-on="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip-card[data-on="true"] *{color:var(--paper) !important}
.chip-card:hover{border-color:var(--plum)}

/* Forms */
.txt{appearance:none;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--sans);font-size:16px;background:rgba(255,253,247,.7);outline:none;color:var(--ink);width:100%}
.txt:focus{border-color:var(--plum)}
textarea.txt{resize:vertical}
.field{margin-bottom:14px}
.field-label{font-family:var(--mono);color:var(--muted-2);margin-bottom:6px;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.field-hint{font-size:12px;color:var(--muted-2);margin-top:6px;line-height:1.5}
.email-suggestion{margin-top:10px;font-size:13.5px;color:var(--ink);background:rgba(75,46,131,.06);border:1px solid rgba(75,46,131,.22);border-radius:10px;padding:10px 14px;line-height:1.4;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.email-suggestion strong{font-weight:600;color:var(--plum)}
.email-suggestion .suggest-accept{appearance:none;background:var(--plum);color:#fff;border:0;border-radius:6px;padding:5px 12px;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;line-height:1;letter-spacing:.01em}
.email-suggestion .suggest-accept:hover{opacity:.9}
.email-suggestion .suggest-dismiss{appearance:none;background:transparent;color:var(--muted-2);border:0;font-family:var(--sans);font-size:12px;cursor:pointer;padding:4px 6px;text-decoration:underline}
.review-stack{display:flex;flex-direction:column;gap:12px}
.review-card{background:rgba(255,253,247,.7);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.review-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px}
.review-card-head .kicker{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
.review-edit{appearance:none;background:transparent;border:1px solid var(--line);color:var(--plum);font-family:var(--sans);font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;cursor:pointer;letter-spacing:.02em}
.review-edit:hover{background:var(--plum);color:#fff;border-color:var(--plum)}
.review-card-body{display:flex;flex-direction:column;gap:6px}
.review-line{font-size:14.5px;color:var(--ink);line-height:1.5}
.review-line strong{font-weight:600}
.review-line em{color:var(--muted)}

/* Toggle */
.toggle{appearance:none;border:0;background:transparent;display:inline-flex;align-items:center;gap:12px;cursor:pointer;padding:0}
.toggle-track{width:42px;height:24px;border-radius:999px;background:var(--paper-3);position:relative;transition:background .2s}
.toggle-track::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:left .2s}
.toggle[data-on="true"] .toggle-track{background:var(--plum)}
.toggle[data-on="true"] .toggle-track::after{left:20px}
.toggle-label{font-size:14px;font-weight:500;color:var(--ink)}

/* Child card */
.child-card{background:rgba(255,253,247,.7);border:1px solid var(--line);border-radius:14px;padding:18px}
.child-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.child-card-remove{appearance:none;border:0;background:transparent;color:var(--muted-2);font-size:12px;cursor:pointer}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:540px){.grid-3{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(3,1fr)}}

/* CTA */
.cta-row{display:flex;justify-content:center;margin-top:32px;gap:12px;flex-wrap:wrap}

/* Confirmation lists */
.timeline{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px}
.timeline li{display:flex;gap:14px;align-items:flex-start}
.timeline li .when{flex:0 0 110px;font-family:var(--mono);font-size:10px;color:var(--plum);padding-top:3px;letter-spacing:.06em;text-transform:uppercase}
.timeline li .what{font-size:14px;color:var(--muted);line-height:1.55}

/* Review summary list */
.sum-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}
.sum-row .k{flex:0 0 130px;font-family:var(--mono);color:var(--muted-2);font-size:10px;padding-top:3px;letter-spacing:.06em;text-transform:uppercase}
.sum-row .v{font-size:14px;color:var(--ink);white-space:pre-wrap}
</style>
</head>

<div class="app" id="app">

<header class="f">
  <div class="container headerbar">
    <button class="btn btn--ghost btn--sm" id="backBtn" type="button" style="padding:8px 14px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/></svg>
      Back
    </button>
    <a href="/" class="logo" aria-label="HearTheirName home">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="3" y="6" width="26" height="20" rx="3" fill="#1F1B2E"/>
        <path d="M16 8v18M11 12v10M21 12v10M7 14v6M25 14v6" stroke="#F4ECDB" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Hear<em>Their</em>Name</span>
    </a>
    <span class="step-counter" id="stepCounter">1 / 11</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:9%"></div>
  </div>
</header>

<main class="f">
  <div class="step-wrap" id="stepHost"></div>
</main>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// Funnel state + step engine
// ─────────────────────────────────────────────────────────────────────────

const PARAMS = new URLSearchParams(window.location.search);
const STARTS_AS_GIFT = PARAMS.get('gift') === '1';
const STARTS_AS_GIFTCARD = PARAMS.get('giftcard') === '1';

const THEMES = [
  ['🦖','Dinosaurs'],['🚀','Space'],['🦄','Unicorns'],
  ['👸','Princesses'],['🐶','Animals'],['🚗','Cars'],
  ['🎮','Gaming'],['🧜','Mermaids'],['🦸','Superheroes']
];
const PLACES = [
  ['🛏️','Bedroom'],['🌲','Magic forest'],['🌌','Outer space'],
  ['🌊','Under the sea'],['🏰','A castle'],['🌴','The jungle'],
  ['⛵','Pirate ship'],['🏫','School'],['✨','Surprise me']
];
const PETS = [
  ['🐶','Dog'],['🐱','Cat'],['🐰','Rabbit'],['🐹','Hamster'],
  ['🐠','Fish'],['🦎','Reptile'],['🐴','Horse'],['🦜','Other']
];
// Numeric age now (was banded). The writer needs an actual number to pitch the
// reading age right — a 13-year-old should not get the same prose as a 7-year-old.
function ageNum(v){ const n = parseInt(v, 10); return Number.isFinite(n) && n >= 0 && n <= 17 ? n : null; }
const PRONOUNS = ['She / her','He / him','They / them'];
const VILLAINS = [
  ['🤪','The Tickle Monster'],
  ['🧦','The Sock Stealer'],
  ['🛌','The Pyjama Police'],
  ['🌙','The Bedtime Bandit']
];

function newChild(){ return { id: Math.random().toString(36).slice(2,8), name:'', age:'', pronouns:'', bestFriend:'', toy:'', intoNow:'', nickname:'', foodNo:'' }; }
function newPet(){ return { kind:'', name:'' }; }

// If the customer typed their child(ren)'s name(s) on the homepage hero
// before clicking through, the homepage appends one ?name=... param per
// child (up to 4). Read all of them once at boot and seed the children
// array. Falls back to a single empty child when nothing was passed in.
function _childrenFromUrl(){
  try {
    const names = new URLSearchParams(window.location.search).getAll('name')
      .map(n => (n || '').trim().slice(0, 24))
      .filter(Boolean)
      .slice(0, 4);
    if (!names.length) return [newChild()];
    return names.map(name => ({ ...newChild(), name }));
  } catch (_) { return [newChild()]; }
}

const state = {
  step: 0,
  data: {
    children: _childrenFromUrl(),
    storyKind: '',
    bestFriend: '', others: '',
    hasPet: false, pets: [], petKind:'', petName:'',
    toy: '',
    hasVillain: true, villainName: '',
    themes: [], themesOther: '',
    place: '', placeReal: '',
    quirk: '',
    heartOut: '',
    isGift: STARTS_AS_GIFT || STARTS_AS_GIFTCARD,
    isGiftCard: STARTS_AS_GIFTCARD,
    giftFrom: '', giftMessage: '', giftDeliveryNote: '', giftSendAt: '',
    email: '',
    requestId: null,
  }
};

// Step count is informational only. The questionnaire steps plus the final
// review step are counted at runtime from STEPS.length. After the review
// step, submitRequest navigates straight to /preview/{id}, so there are no
// further in-funnel steps. Adventure stories add a conditional villain step.

const STEPS = [
  { key:'kind', title:"What kind of story?", sub:"This shapes the pace, voice and where it ends.",
    valid: () => !!state.data.storyKind,
    render: () => `
      <div class="grid-2">
        ${[
          {v:'bedtime',e:'🌙',t:'A bedtime story',d:"Calm, warm, a soft landing into sleep."},
          {v:'adventure',e:'⭐',t:'A bigger adventure',d:"More excitement, for daytime, trips, treats."}
        ].map(o => `
          <button class="chip-card" data-on="${state.data.storyKind === o.v}" data-action="setKind" data-value="${o.v}" type="button">
            <div style="font-size:32px">${o.e}</div>
            <div style="font-family:var(--serif);font-size:20px;font-weight:500;margin-top:8px;line-height:1.35">${o.t}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:16px;line-height:1.5">${o.d}</div>
          </button>
        `).join('')}
      </div>` },

  { key:'children', title:"Who's the story for?", sub:"You can add a sibling or two. They'll share the adventure.",
    valid: () => state.data.children.length > 0 && state.data.children.every(c => c.name.trim() && ageNum(c.age) !== null && c.pronouns),
    invalidHint: () => {
      const issues = state.data.children.map((c, i) => {
        const missing = [];
        if (!c.name.trim()) missing.push('a name');
        if (ageNum(c.age) === null) missing.push('an age');
        if (!c.pronouns) missing.push('pronouns');
        if (missing.length === 0) return null;
        const who = c.name.trim() || `Child ${i + 1}`;
        const joined = missing.length === 1 ? missing[0]
          : missing.length === 2 ? missing.join(' and ')
          : missing.slice(0, -1).join(', ') + ' and ' + missing[missing.length - 1];
        return `${who} still needs ${joined}`;
      }).filter(Boolean);
      return issues.length ? issues.join(' · ') : null;
    },
    render: () => `
      <div style="display:flex;flex-direction:column;gap:14px">
        ${state.data.children.map((c, i) => `
          <div class="child-card">
            <div class="child-card-head">
              <span class="kicker">CHILD ${i+1}</span>
              ${state.data.children.length > 1 ? `<button type="button" class="child-card-remove" data-action="removeChild" data-i="${i}">Remove</button>` : ''}
            </div>
            <input class="txt" placeholder="Their name" value="${esc(c.name)}" data-action="updateChild" data-i="${i}" data-k="name" style="margin-bottom:10px">
            <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
              <input class="txt" type="number" inputmode="numeric" min="0" max="17" placeholder="Age" value="${esc(c.age)}" data-action="updateChild" data-i="${i}" data-k="age" style="width:110px;text-align:center;font-size:18px;padding:12px 10px">
              <div class="field-hint" style="margin:0;font-size:13px">years old</div>
            </div>
            <div class="grid-3">
              ${PRONOUNS.map(p => `<button type="button" class="chip" data-on="${c.pronouns === p}" data-action="updateChild" data-i="${i}" data-k="pronouns" data-v="${esc(p)}" style="padding:10px 6px;font-size:12px">${p}</button>`).join('')}
            </div>
          </div>
        `).join('')}
        ${state.data.children.length < 4 ? `<button type="button" class="btn btn--ghost btn--sm" data-action="addChild" style="align-self:center">＋ Add another child</button>` : ''}
        <div class="field-hint" style="text-align:center;max-width:480px;margin:6px auto 0;line-height:1.55;font-size:13px">
          We'll adapt the story to each child's age. Younger ones get simpler words and shorter sentences, older ones get richer language. With more than one child, we pitch it so it works for all of them.
        </div>
      </div>` },

  // "In your own words" — the free-text personality/feel field. Deliberately
  // placed early (right after the names), while motivation is highest and
  // before form fatigue: it's the highest-signal input for the writer, and
  // filling it lifts overall completion. The copy explicitly tells people
  // NOT to put facts here (names, ages, favourites) because the structured
  // steps after this collect all of that.
  { key:'heart', title:"In your own words.", sub:"Optional, but it's the part that makes the story sound like yours.",
    valid: () => true,
    render: () => {
      // Copy adapts to one child vs several: a solo story has no sibling
      // dynamics to describe, so we focus purely on them; a multi-child
      // story needs the dynamics between them, which is high-signal for
      // the writer.
      const multi = state.data.children.length > 1;
      const intro = multi
        ? "Tell us who they are. Their personalities, how they are with each other, who&rsquo;s the bossy one, who&rsquo;s the softie, the in-jokes, and the feeling you want the story to leave them with. Don&rsquo;t worry about names, ages or favourite things, we&rsquo;ll ask all that next."
        : "Tell us who they are. Their personality, the funny little things they do, the in-jokes, how they are with the people they love, and the feeling you want the story to leave them with. Don&rsquo;t worry about names, ages or favourite things, we&rsquo;ll ask all that next.";
      const placeholder = multi
        ? "e.g. &lsquo;Chase bosses his little sister around but he&rsquo;s the first to comfort her when she cries.&rsquo; Or &lsquo;They&rsquo;re best friends one minute and at war the next, I&rsquo;d love this to feel like a hug for both of them.&rsquo; Or &lsquo;They&rsquo;ve had a hard year and they really need a win.&rsquo;"
        : "e.g. &lsquo;She&rsquo;s just started big school and she&rsquo;s a bit nervous, I&rsquo;d love this to feel like a warm hug.&rsquo; Or &lsquo;He&rsquo;s all energy and noise, but he goes quiet and gentle the second the dog walks in.&rsquo; Or &lsquo;They&rsquo;ve had a hard year and they really need a win.&rsquo;";
      return `
      <div>
        <div class="field-hint" style="margin:0 0 14px;line-height:1.6">${intro}</div>
        <textarea class="txt" rows="6" placeholder="${placeholder}" data-action="setHeartOut">${esc(state.data.heartOut || '')}</textarea>
        <div class="field-hint" style="margin-top:10px;font-style:italic;color:var(--muted-2)">A sentence or two is plenty. This is the part that makes it really theirs.</div>
      </div>`;
    } },

  { key:'world', title:"Their world.", sub:"All optional. Tap anything that fits, or leave it blank and we'll choose based on everything else you've told us.",
    valid: () => true,
    render: () => {
      const childLabel = (c, i) => (c.name && c.name.trim()) ? c.name.trim() : `child ${i + 1}`;
      const multi = state.data.children.length > 1;
      return `
      <div style="display:flex;flex-direction:column;gap:28px">

        <div>
          <div class="kicker" style="margin-bottom:6px">WORLDS THEY LOVE (OPTIONAL)</div>
          <div class="field-hint" style="margin:0 0 12px;line-height:1.55">If something jumps out, tap it. If nothing fits, leave it.</div>
          <div class="grid-3">
            ${THEMES.map(([e,t]) => `
              <button type="button" class="chip" data-on="${state.data.themes.includes(t)}" data-action="toggleTheme" data-v="${esc(t)}" style="flex-direction:column;gap:4px;padding:14px 8px;min-height:80px;display:flex">
                <span style="font-size:24px">${e}</span>

function esc(s){
  if (s == null) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderQuestionStep(){

// ── Email typo detection ──────────────────────────────────────────
// Pure-JS, zero-dependency, zero-quota. Catches common consumer typos
// (gmial.com, hotmial.co.uk, yaho.com, etc.) by comparing the typed
// domain against a whitelist of popular providers via Levenshtein
// distance. Only suggests when the edit distance is 1-2 chars and the
// lengths are close, so we don't false-positive on real corporate domains.
const POPULAR_EMAIL_DOMAINS = [
  'gmail.com','googlemail.com','hotmail.com','hotmail.co.uk','outlook.com','outlook.co.uk',
  'live.com','live.co.uk','yahoo.com','yahoo.co.uk','icloud.com','me.com','mac.com',
  'aol.com','msn.com','btinternet.com','sky.com','virginmedia.com','ntlworld.com',
  'protonmail.com','proton.me','tutanota.com','zoho.com','mail.com','gmx.com','fastmail.com'
];
function levenshtein(a, b){
  if (a === b) return 0;
  if (!a) return b.length;
  if (!b) return a.length;
  const dp = Array.from({length: b.length + 1}, (_, i) => [i]);
  for (let j = 0; j <= a.length; j++) dp[0][j] = j;
  for (let i = 1; i <= b.length; i++){
    for (let j = 1; j <= a.length; j++){
      dp[i][j] = b[i-1] === a[j-1]
        ? dp[i-1][j-1]
        : Math.min(dp[i-1][j-1] + 1, dp[i][j-1] + 1, dp[i-1][j] + 1);
    }
  }
  return dp[b.length][a.length];
}
function suggestEmailFix(email){
  const e = (email || '').trim().toLowerCase();
  const at = e.lastIndexOf('@');
  if (at < 1 || at === e.length - 1) return null;
  const local = e.slice(0, at);
  const domain = e.slice(at + 1);
  if (POPULAR_EMAIL_DOMAINS.includes(domain)) return null;
  let best = null, bestDist = 99;
  for (const d of POPULAR_EMAIL_DOMAINS){
    const dist = levenshtein(domain, d);
    if (dist < bestDist){ bestDist = dist; best = d; }
  }
  // 1-2 char edit distance + similar length = almost certainly a typo
  if (best && bestDist >= 1 && bestDist <= 2 && Math.abs(domain.length - best.length) <= 2){
    return local + '@' + best;
  }
  return null;
}

function goToStep(key){
  const idx = STEPS.findIndex(s => s.key === key);
  if (idx < 0) return;
  state.step = idx;

}

  const castingLines = [];

    petList.forEach(p => {

      if (desc) castingLines.push(`Pet: <strong>${esc(desc)}</strong>`);
    });
  }

  const villainLine = (d.storyKind === 'adventure' && d.hasVillain && d.villainName) ? `Baddie: <strong>${esc(d.villainName.trim())}</strong>` : '';

  const intoNowLines = d.children

  const giftLines = [];

    giftLines.push(`🎁 <strong>This is a gift</strong>`);

  }

  return [
    card('Story type', 'kind', [kindLabel]),
    card('Who it’s for', 'children', childrenLines),
    heartLines.length ? card('In your words', 'heart', heartLines) : '',
    card('What it’s about', 'world', themeBits.map(t => esc(t))),
    card('Where it takes place', 'world', placeBits.map(t => esc(t))),
    intoNowLines.length ? card('Really into right now', 'world', intoNowLines) : '',
    card('Who’s in it', 'casting', castingLines),
    nicknameLines.length ? card('What you call them', 'bits', nicknameLines) : '',
    foodNoLines.length ? card('Won’t touch', 'bits', foodNoLines) : '',
    villainLine ? card('The baddie', 'bits', [villainLine]) : '',
    card('Gift', 'gift', giftLines)
  ].filter(Boolean).join('');
}

function renderEmailStep(){
  const childList = state.data.children.map(c => c.name).filter(Boolean).join(' & ') || 'them';
  const host = document.getElementById('stepHost');
  host.classList.add('narrow');
  host.classList.remove('wide');
  host.innerHTML = `
    <div class="step-head">
      <div class="kicker">REVIEW</div>
      <h2 style="margin-top:10px;font-size:clamp(28px,3.8vw,40px)">One last look before we make <span class="italic-plum">${esc(childList)}'s</span> story.</h2>
      <p class="sub" style="max-width:480px;margin-left:auto;margin-right:auto">Take a moment. Tap <em>Edit</em> on anything that&rsquo;s off. The more accurate this is, the more it&rsquo;ll sound like them.</p>
    </div>

    <div class="review-stack">${buildReviewCards()}</div>

    <div style="margin-top:22px;padding:20px 22px;background:var(--paper-2);border:1px solid var(--line);border-radius:16px">
      <div class="kicker" style="margin-bottom:12px">FROM HERE</div>
      <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px">
        ${[
          ['✍️',"We&rsquo;ll write the opening of your story right now, with every name and detail you&rsquo;ve given us."],
          ['👀',"You&rsquo;ll see it on the next page. Read it. Edit anything that isn&rsquo;t right. Pick a voice."],
          ['🔒',"Then pay <span data-price>£24.99</span> to lock it in. The full 15-minute audio lands in your inbox within 24 hours."],
          ['💛','If anything isn&rsquo;t quite right when you hear it, just let us know. We&rsquo;ll tweak it until everything&rsquo;s absolutely perfect.'],
          ['🌙','Then it&rsquo;s theirs forever. Replay it, share it with grandparents, treasure it.']
        ].map(([e,t]) => `<li style="display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--ink)"><span style="flex:0 0 22px;font-size:16px">${e}</span><span style="color:var(--muted);line-height:1.55">${t}</span></li>`).join('')}
      </ul>
    </div>

    <div class="cta-row">
      <button class="btn" id="submitBtn" type="button">
        Start making your story &rarr;
      </button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted-2)">No payment yet. You'll see the opening of your story first, then decide.</div>`;
  document.getElementById('submitBtn').addEventListener('click', submitRequest);
  // The FROM HERE list has a [data-price] span; localise it now that it exists.
  if (window.htnApplyPrice) window.htnApplyPrice();
}

function render(){
  const isQuestion = state.step < STEPS.length;
  const isEmail = state.step === STEPS.length;

  // Effective step counter — skips conditionally hidden steps (e.g. villain on bedtime)
  const visibleQuestionCount = STEPS.reduce((n, _, i) => n + (isStepShown(i) ? 1 : 0), 0);
  const visibleStepNumber = isQuestion
    ? STEPS.slice(0, state.step + 1).reduce((n, _, i) => n + (isStepShown(i) ? 1 : 0), 0)
    : visibleQuestionCount + 1;
  const totalShown = visibleQuestionCount + 1;

  const counter = document.getElementById('stepCounter');
  counter.textContent = `${visibleStepNumber} / ${totalShown}`;
  document.getElementById('progressFill').style.width = `${(visibleStepNumber / totalShown) * 100}%`;

  if (isQuestion) renderQuestionStep();
  else if (isEmail) renderEmailStep();

  attachActions();
}

// ─────────────────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────────────────

function attachActions(){
  document.querySelectorAll('[data-action]').forEach(el => {
    if (el.dataset.bound) return;
    el.dataset.bound = '1';
    const action = el.dataset.action;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA'){
      el.addEventListener('input', e => handleAction(action, el, e));
    } else {
      el.addEventListener('click', e => handleAction(action, el, e));
    }
  });
}

function handleAction(action, el, e){
  const v = el.dataset.v;
  const i = el.dataset.i ? parseInt(el.dataset.i, 10) : null;
  const k = el.dataset.k;
  switch(action){
    case 'setKind': state.data.storyKind = el.dataset.value; render(); break;
    case 'addChild': if (state.data.children.length < 4){ state.data.children.push(newChild()); render(); } break;
    case 'removeChild': state.data.children.splice(i, 1); render(); break;
    case 'updateChild':
      if (el.tagName === 'INPUT'){ state.data.children[i][k] = el.value; updateContinueState(); }
      else { state.data.children[i][k] = v; render(); }
      break;
    case 'toggleTheme':
      const idx = state.data.themes.indexOf(v);
      if (idx >= 0) state.data.themes.splice(idx, 1); else state.data.themes.push(v);
      render(); break;
    case 'setThemesOther': state.data.themesOther = el.value; updateContinueState(); break;
    case 'setPlace': state.data.place = state.data.place === v ? '' : v; render(); break;
    case 'setPlaceReal': state.data.placeReal = el.value; updateContinueState(); break;
    case 'setBestFriend': state.data.bestFriend = el.value; break;
    case 'setOthers': state.data.others = el.value; break;
    case 'togglePet':
      state.data.hasPet = !state.data.hasPet;
      if (state.data.hasPet && state.data.pets.length === 0) {
        // Migrate any legacy single-pet data, otherwise seed with one empty entry.
        if (state.data.petName || state.data.petKind) {
          state.data.pets = [{ name: state.data.petName || '', kind: state.data.petKind || '' }];
          state.data.petName = ''; state.data.petKind = '';
        } else {
          state.data.pets = [newPet()];
        }
      }
      render();
      break;
    case 'addPet': state.data.pets.push(newPet()); render(); break;
    case 'removePet':
      state.data.pets.splice(i, 1);
      if (state.data.pets.length === 0) state.data.hasPet = false;
      render();
      break;
    case 'setPetKindAt': state.data.pets[i].kind = v; render(); break;
    case 'setPetNameAt': state.data.pets[i].name = el.value; break;
    case 'setToy': state.data.toy = el.value; break;
    case 'toggleVillain': state.data.hasVillain = !state.data.hasVillain; render(); break;
    case 'setVillainName': state.data.villainName = el.value; break;
    case 'pickVillain': state.data.villainName = v; render(); break;
    case 'setHeartOut': state.data.heartOut = el.value; break;
    case 'setIsGift': state.data.isGift = (v === 'true'); render(); break;
    case 'setGiftFrom': state.data.giftFrom = el.value; break;
    case 'setGiftMessage': state.data.giftMessage = el.value; break;
    case 'setGiftRecipientEmail': state.data.giftRecipientEmail = el.value; break;
    case 'setGiftDeliveryNote': state.data.giftDeliveryNote = el.value; break;
    case 'setGiftSendAt': state.data.giftSendAt = el.value; break;
    case 'goToStep': goToStep(el.dataset.key); break;
  }
}

function updateContinueState(){
  const cur = STEPS[state.step];
  if (!cur) return;
  const valid = cur.valid();
  const btn = document.getElementById('continueBtn');
  if (btn) btn.disabled = !valid;
  // Surface a per-step hint when Continue is disabled so the user knows
  // exactly what they still need to fill in (e.g. which child is missing
  // age or pronouns when multiple were pre-filled from the homepage).
  const hint = document.getElementById('stepHint');
  if (hint) hint.textContent = (!valid && cur.invalidHint) ? (cur.invalidHint() || '') : '';
}

// Conditional steps: villain only shown for adventure stories
function isStepShown(idx){
  const s = STEPS[idx];
  if (!s) return true;
  if (typeof s.showIf === 'function') return s.showIf();
  return true;
}

function next(){
  if (state.step < STEPS.length){
    if (!STEPS[state.step].valid()) return;
  }
  state.step++;
  while (state.step < STEPS.length && !isStepShown(state.step)) state.step++;
  pushHistory();
  render();
  // Land at the top of the new step instead of wherever the previous one
  // left the scroll. Long steps (like "the bits that make it theirs")
  // otherwise open scrolled to the bottom.
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function back(){
  // Use the browser's history. This way both the on-screen back button and
  // the device/browser back button take the user one step back instead of
  // jumping all the way to the homepage. popstate handles the actual state
  // restore + re-render.
  history.back();
}

document.getElementById('backBtn').addEventListener('click', back);

// ─── History wiring (browser back button = previous step) ───
// We push a new history entry on every forward step. The browser/device
// back button then naturally returns to the previous step via popstate.
// At step 0, pressing back leaves /start entirely (typically to /).
function pushHistory() {
  try {
    history.pushState({ step: state.step }, '', '#s' + state.step);
  } catch (_) { /* ignore — non-fatal if pushState unavailable */ }
}

window.addEventListener('popstate', (e) => {
  const newStep = (e.state && typeof e.state.step === 'number') ? e.state.step : 0;
  // Only honour valid step indices: questionnaire steps plus the review step.
  if (newStep < 0 || newStep > STEPS.length) return;
  state.step = newStep;
  // Skip past any hidden conditional steps (e.g. villain on bedtime)
  while (state.step > 0 && state.step < STEPS.length && !isStepShown(state.step)) state.step--;
  render();
});

// Mark the initial /start entry with state so popstate behaves predictably
// when the user goes forward then back to the very first step.
try { history.replaceState({ step: 0 }, '', window.location.href); } catch (_) {}

// ─────────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────────


// ─────────────────────────────────────────────────────────────────────────
// Submit — saves the row via /api/preview-request, fires the Lead +
// CompleteRegistration pixels (with deduped eventIds for CAPI), then
// redirects to /preview/{id}?t={token}. The preview page handles the
// wait-for-text, edit-the-opening, pick-a-voice, and Lock-it-in flow.
// ─────────────────────────────────────────────────────────────────────────

async function submitRequest(){
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = 'Saving&hellip;'; }
  try {
    const res = await fetch('/api/preview-request', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state.data)
    });
    if (!res.ok) throw new Error('save failed: ' + res.status);
    const data = await res.json();
    const requestId = data.requestId;
    const accessToken = data.accessToken;
    state.data.requestId = requestId;
    try {
      if (window.htnPixel){
        const leadEventId = 'lead_' + requestId;
        const registerEventId = 'register_' + requestId;
        window.htnPixel.track('Lead', { content_name: 'preview-request' }, { eventId: leadEventId, email: state.data.email });
        window.htnPixel.track('CompleteRegistration', { content_name: 'preview-request' }, { eventId: registerEventId, email: state.data.email });
        fetch('/api/track-lead', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requestId, leadEventId, registerEventId, fbp: window.htnPixel.fbp(), fbc: window.htnPixel.fbc() })
        }).catch(() => {});
      }
    } catch(e){}
    window.location.href = '/preview/' + encodeURIComponent(requestId) + (accessToken ? '?t=' + encodeURIComponent(accessToken) : '');
  } catch (err) {
    console.error('[submitRequest] failed', err);
    if (btn) { btn.disabled = false; btn.innerHTML = 'Start making your story &rarr;'; }
    alert("Something went wrong saving your story. Please try again or email jamie@heartheirname.com.");
  }
}

// ─────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────

render();
</script>
<script>
// Localised pricing — fetches /api/get-pricing and swaps every [data-price]
// span. The review/email step builds its DOM in JS (and the customer may
// reach it minutes later), so we expose window.htnApplyPrice for render()
// to call on every step. Falls back to inline £24.99 if the call fails.
(async function localisePrice(){
  let display = '£24.99';
  try {
    const r = await fetch('/api/get-pricing', { credentials:'omit' });
    if (r.ok) {
      const p = await r.json();
      if (p && p.display) display = p.display;
      if (p) window.htnPricing = p;
    }
  } catch (e) {}
  const apply = () => document.querySelectorAll('[data-price]').forEach(el => { el.textContent = display; });
  window.htnApplyPrice = apply;
  apply();
  setTimeout(apply, 300);
  setTimeout(apply, 1200);
})();
</script>
