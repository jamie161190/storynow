<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tell us about them — HearTheirName</title>
<meta name="description" content="Eight quick questions, a free 2-minute preview lands in your inbox within 24 hours.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#F4ECDB; --paper-2:#EFE4CD; --paper-3:#E7D9BA;
  --ink:#1F1B2E; --ink-2:#3D2E5A;
  --muted:#5C5240; --muted-2:#8A7E64;
  --line:rgba(31,27,46,.12); --line-2:#D6C7A4;
  --plum:#4B2E83; --plum-2:#7A55C9;
  --terra:#D87A3E; --terra-2:#C46A2E;
  --rose:#E0B7A0; --moss:#6F8A4F; --gold:#B89149;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,sans-serif;
  --hand:"Caveat",cursive;
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background-image:radial-gradient(rgba(80,60,30,.05) 1px,transparent 1px),radial-gradient(rgba(80,60,30,.04) 1px,transparent 1px);background-size:3px 3px,7px 7px;background-position:0 0,1px 2px;opacity:.55;mix-blend-mode:multiply}
::selection{background:var(--plum);color:var(--paper)}
a{color:inherit}
.app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column}
.container{width:100%;max-width:1200px;margin:0 auto;padding:0 24px}
@media(min-width:900px){.container{padding:0 40px}}
.serif{font-family:var(--serif);font-weight:500;letter-spacing:-.005em}
.hand{font-family:var(--hand)}
.mono{font-family:var(--mono);font-size:.78em;letter-spacing:.04em;text-transform:uppercase}
.italic-plum{font-style:italic;color:var(--plum)}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);font-weight:500}

.btn{appearance:none;border:0;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:16px;padding:18px 28px;border-radius:999px;background:var(--terra);color:#fff;box-shadow:0 8px 24px -10px rgba(216,122,62,.55);transition:transform .15s ease,background .15s ease,opacity .15s;display:inline-flex;align-items:center;justify-content:center;gap:10px;text-decoration:none}
.btn:hover{background:var(--terra-2);transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn--ink{background:var(--ink);color:var(--paper)}
.btn--ink:hover{background:#2c2545}
.btn--ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn--ghost:hover{background:rgba(0,0,0,.04)}
.btn--sm{padding:12px 18px;font-size:14px}

/* Header */
header.f{border-bottom:1px solid var(--line);background:rgba(244,236,219,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.headerbar{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none}
.logo-text{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink)}
.logo-text em{font-style:italic;font-weight:500;color:var(--plum)}
.progress-bar{height:3px;background:var(--paper-2)}
.progress-fill{height:100%;background:var(--plum);transition:width .35s ease}
.step-counter{font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.06em}

/* Main */
main.f{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px}
.step-wrap{width:100%;max-width:600px}
.step-wrap.wide{max-width:680px}
.step-wrap.narrow{max-width:540px}
.step-head{text-align:center;margin-bottom:28px}
.step-head h2{font-family:var(--serif);font-size:clamp(26px,3.6vw,38px);margin:0;font-weight:500;line-height:1.2}
.step-head .sub{color:var(--muted);font-size:15px;margin-top:10px;margin-bottom:0}

/* Chips */
.chip{appearance:none;border:1px solid var(--line);background:rgba(255,253,247,.7);border-radius:12px;padding:14px 12px;cursor:pointer;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;text-align:center;line-height:1.2;transition:border-color .15s,background .15s}
.chip[data-on="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:hover{border-color:var(--plum)}
.chip-card{appearance:none;border:1px solid var(--line);background:rgba(255,253,247,.7);border-radius:16px;padding:24px 18px;cursor:pointer;font-family:var(--sans);text-align:left;color:var(--ink);display:flex;flex-direction:column;align-items:flex-start;transition:border-color .15s}
.chip-card[data-on="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip-card[data-on="true"] *{color:var(--paper) !important}
.chip-card:hover{border-color:var(--plum)}

/* Forms */
.txt{appearance:none;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-family:var(--sans);font-size:16px;background:rgba(255,253,247,.7);outline:none;color:var(--ink);width:100%}
.txt:focus{border-color:var(--plum)}
textarea.txt{resize:vertical}
.field{margin-bottom:14px}
.field-label{font-family:var(--mono);color:var(--muted-2);margin-bottom:6px;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.field-hint{font-size:12px;color:var(--muted-2);margin-top:6px;line-height:1.5}

/* Toggle */
.toggle{appearance:none;border:0;background:transparent;display:inline-flex;align-items:center;gap:12px;cursor:pointer;padding:0}
.toggle-track{width:42px;height:24px;border-radius:999px;background:var(--paper-3);position:relative;transition:background .2s}
.toggle-track::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15);transition:left .2s}
.toggle[data-on="true"] .toggle-track{background:var(--plum)}
.toggle[data-on="true"] .toggle-track::after{left:20px}
.toggle-label{font-size:14px;font-weight:500;color:var(--ink)}

/* Child card */
.child-card{background:rgba(255,253,247,.7);border:1px solid var(--line);border-radius:14px;padding:18px}
.child-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.child-card-remove{appearance:none;border:0;background:transparent;color:var(--muted-2);font-size:12px;cursor:pointer}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:540px){.grid-3{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(3,1fr)}}

/* CTA */
.cta-row{display:flex;justify-content:center;margin-top:32px;gap:12px;flex-wrap:wrap}

/* Confirmation lists */
.timeline{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:14px}
.timeline li{display:flex;gap:14px;align-items:flex-start}
.timeline li .when{flex:0 0 110px;font-family:var(--mono);font-size:10px;color:var(--plum);padding-top:3px;letter-spacing:.06em;text-transform:uppercase}
.timeline li .what{font-size:14px;color:var(--muted);line-height:1.55}

/* Review summary list */
.sum-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line)}
.sum-row .k{flex:0 0 130px;font-family:var(--mono);color:var(--muted-2);font-size:10px;padding-top:3px;letter-spacing:.06em;text-transform:uppercase}
.sum-row .v{font-size:14px;color:var(--ink);white-space:pre-wrap}
</style>
</head>
<body>
<div class="app" id="app">

<header class="f">
  <div class="container headerbar">
    <button class="btn btn--ghost btn--sm" id="backBtn" type="button" style="padding:8px 14px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 5 5 12 12 19"/></svg>
      Back
    </button>
    <a href="/" class="logo" aria-label="HearTheirName home">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="3" y="6" width="26" height="20" rx="3" fill="#1F1B2E"/>
        <path d="M16 8v18M11 12v10M21 12v10M7 14v6M25 14v6" stroke="#F4ECDB" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Hear<em>Their</em>Name</span>
    </a>
    <span class="step-counter" id="stepCounter">1 / 11</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:9%"></div>
  </div>
</header>

<main class="f">
  <div class="step-wrap" id="stepHost"></div>
</main>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// Funnel state + step engine
// ─────────────────────────────────────────────────────────────────────────

const PARAMS = new URLSearchParams(window.location.search);
const STARTS_AS_GIFT = PARAMS.get('gift') === '1';
const STARTS_AS_GIFTCARD = PARAMS.get('giftcard') === '1';

const THEMES = [
  ['🦖','Dinosaurs'],['🚀','Space'],['⚽','Football'],
  ['🦄','Unicorns'],['👸','Princesses'],['🐶','Animals'],
  ['🚗','Cars'],['🎮','Gaming'],['🧜','Mermaids'],
  ['🏴‍☠️','Pirates'],['🦸','Superheroes'],['🚂','Trains'],
  ['🤖','Robots'],['🎵','Music'],['🌳','Nature'],
  ['🧸','Toys'],['👗','Fashion'],['✈️','Aeroplanes']
];
const PLACES = [
  ['🛏️','Bedroom'],['🌲','Magic forest'],['🌌','Outer space'],
  ['🌊','Under the sea'],['🏰','A castle'],['🌴','The jungle'],
  ['⛵','Pirate ship'],['🏫','School'],['✨','Surprise me']
];
const PETS = [
  ['🐶','Dog'],['🐱','Cat'],['🐰','Rabbit'],['🐹','Hamster'],
  ['🐠','Fish'],['🦎','Reptile'],['🐴','Horse'],['🦜','Other']
];
const VOICES = [
  'British (warm)','British (gentle)','Irish (lilting)',
  'American (cosy)','Scottish (kind)','Australian (bright)'
];
const AGE_BANDS = ['2-3','4-5','6-7','8+'];
const PRONOUNS = ['She / her','He / him','They / them'];

function newChild(){ return { id: Math.random().toString(36).slice(2,8), name:'', age:'', pronouns:'' }; }

const state = {
  step: 0,
  data: {
    children: [newChild()],
    storyKind: '',
    bestFriend: '', others: '',
    hasPet: false, petKind:'', petName:'',
    toy: '',
    themes: [], themesOther: '',
    place: '', placeReal: '',
    quirk: '',
    voice: '',
    isGift: STARTS_AS_GIFT || STARTS_AS_GIFTCARD,
    isGiftCard: STARTS_AS_GIFTCARD,
    giftFrom: '', giftMessage: '',
    email: '',
    requestId: null,
  }
};

const TOTAL_STEPS = 11; // 8 questionnaire + email + confirm-inbox + ordered

const STEPS = [
  { key:'kind', title:"What kind of story?", sub:"This shapes the pace, voice and where it ends.",
    valid: () => !!state.data.storyKind,
    render: () => `
      <div class="grid-2">
        ${[
          {v:'bedtime',e:'🌙',t:'A bedtime story',d:"Calm, warm, a soft landing into sleep."},
          {v:'adventure',e:'⭐',t:'A bigger adventure',d:"More excitement, for daytime, journeys, treats."}
        ].map(o => `
          <button class="chip-card" data-on="${state.data.storyKind === o.v}" data-action="setKind" data-value="${o.v}" type="button">
            <div style="font-size:32px">${o.e}</div>
            <div style="font-family:var(--serif);font-size:20px;font-weight:500;margin-top:8px;line-height:1.35">${o.t}</div>
            <div style="font-size:13px;color:var(--muted);margin-top:16px;line-height:1.5">${o.d}</div>
          </button>
        `).join('')}
      </div>` },

  { key:'children', title:"Who's the story for?", sub:"You can add a sibling or two. They'll share the adventure.",
    valid: () => state.data.children.length > 0 && state.data.children.every(c => c.name.trim() && c.age && c.pronouns),
    render: () => `
      <div style="display:flex;flex-direction:column;gap:14px">
        ${state.data.children.map((c, i) => `
          <div class="child-card">
            <div class="child-card-head">
              <span class="kicker">CHILD ${i+1}</span>
              ${state.data.children.length > 1 ? `<button type="button" class="child-card-remove" data-action="removeChild" data-i="${i}">Remove</button>` : ''}
            </div>
            <input class="txt" placeholder="Their name" value="${esc(c.name)}" data-action="updateChild" data-i="${i}" data-k="name" style="margin-bottom:10px">
            <div class="grid-4" style="margin-bottom:10px">
              ${AGE_BANDS.map(a => `<button type="button" class="chip" data-on="${c.age === a}" data-action="updateChild" data-i="${i}" data-k="age" data-v="${a}" style="padding:10px 8px;font-size:13px">${a}</button>`).join('')}
            </div>
            <div class="grid-3">
              ${PRONOUNS.map(p => `<button type="button" class="chip" data-on="${c.pronouns === p}" data-action="updateChild" data-i="${i}" data-k="pronouns" data-v="${esc(p)}" style="padding:10px 6px;font-size:12px">${p}</button>`).join('')}
            </div>
          </div>
        `).join('')}
        ${state.data.children.length < 4 ? `<button type="button" class="btn btn--ghost btn--sm" data-action="addChild" style="align-self:center">＋ Add another child</button>` : ''}
      </div>` },

  { key:'themes', title:"What's the story about?", sub:"Pick as many as you like. These shape the whole story.",
    valid: () => state.data.themes.length > 0 || state.data.themesOther.trim().length > 0,
    render: () => `
      <div class="grid-3">
        ${THEMES.map(([e,t]) => `
          <button type="button" class="chip" data-on="${state.data.themes.includes(t)}" data-action="toggleTheme" data-v="${esc(t)}" style="flex-direction:column;gap:4px;padding:14px 8px;min-height:80px;display:flex">
            <span style="font-size:24px">${e}</span>
            <span style="font-size:12px">${t}</span>
          </button>
        `).join('')}
      </div>
      <div class="kicker" style="margin-top:18px;margin-bottom:6px">OR TELL US SOMETHING ELSE</div>
      <input class="txt" placeholder="e.g. Minecraft, ballet, cooking, classic cars" value="${esc(state.data.themesOther)}" data-action="setThemesOther">` },

  { key:'place', title:"Where does it take place?", sub:"",
    valid: () => !!state.data.place || !!state.data.placeReal.trim(),
    render: () => `
      <div class="grid-3">
        ${PLACES.map(([e,t]) => `
          <button type="button" class="chip" data-on="${state.data.place === t}" data-action="setPlace" data-v="${esc(t)}" style="flex-direction:column;gap:4px;padding:16px 8px;min-height:88px;display:flex">
            <span style="font-size:24px">${e}</span>
            <span style="font-size:12px">${t}</span>
          </button>
        `).join('')}
      </div>
      <div class="kicker" style="margin-top:18px;margin-bottom:6px">OR A REAL PLACE THEY LOVE</div>
      <input class="txt" placeholder="e.g. Grandma's garden, the park on Elm Street" value="${esc(state.data.placeReal)}" data-action="setPlaceReal">` },

  { key:'casting', title:"Who's in the story with them?", sub:"This is the casting. Real names, real roles.",
    valid: () => true,
    render: () => `
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <div class="field-label">BEST FRIEND OR FAVOURITE PERSON</div>
          <input class="txt" placeholder="e.g. Mira" value="${esc(state.data.bestFriend)}" data-action="setBestFriend">
          <div class="field-hint">They go on the adventure together. Don't know? Type a name and we'll make it work.</div>
        </div>
        <div>
          <div class="field-label">OTHER PEOPLE (OPTIONAL)</div>
          <textarea class="txt" rows="2" placeholder="e.g. Mum, Dad, Nanny Rose, sister Isla, Mrs Taylor" data-action="setOthers">${esc(state.data.others)}</textarea>
          <div class="field-hint">Family, teachers, anyone you like. They'll each get a real role, not just a mention.</div>
        </div>
        <div>
          <div class="field-label">A PET</div>
          <button type="button" class="toggle" data-on="${state.data.hasPet}" data-action="togglePet">
            <span class="toggle-track"></span>
            <span class="toggle-label">They have a pet</span>
          </button>
          ${state.data.hasPet ? `
            <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">
              <div class="grid-4">
                ${PETS.map(([e,t]) => `<button type="button" class="chip" data-on="${state.data.petKind === t}" data-action="setPetKind" data-v="${esc(t)}" style="flex-direction:column;gap:4px;padding:10px 6px;display:flex"><span style="font-size:18px">${e}</span><span style="font-size:11px">${t}</span></button>`).join('')}
              </div>
              <input class="txt" placeholder="Pet's name" value="${esc(state.data.petName)}" data-action="setPetName">
            </div>` : ''}
        </div>
        <div>
          <div class="field-label">FAVOURITE TOY OR COMFORT ITEM (OPTIONAL)</div>
          <input class="txt" placeholder="e.g. a small white bunny called Mr Flopsy" value="${esc(state.data.toy)}" data-action="setToy">
          <div class="field-hint">It will appear in the story exactly as you describe it.</div>
        </div>
      </div>` },

  { key:'quirk', title:"A tiny detail only you'd know.", sub:"This is the bit that makes them gasp.",
    valid: () => true,
    render: () => `
      <textarea class="txt" rows="4" placeholder='e.g. She calls spaghetti "pasketti", and won&apos;t sleep without her green dinosaur called Steve.' data-action="setQuirk">${esc(state.data.quirk)}</textarea>` },

  { key:'voice', title:"Choose a storyteller.", sub:"Six warm voices, all human-toned.",
    valid: () => !!state.data.voice,
    render: () => `
      <div class="grid-2">
        ${VOICES.map(v => `
          <button type="button" class="chip" data-on="${state.data.voice === v}" data-action="setVoice" data-v="${esc(v)}" style="justify-content:flex-start;padding:14px 16px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 4.5v15l13-7.5L7 4.5z"/></svg>
            <span style="margin-left:10px">${v}</span>
          </button>
        `).join('')}
      </div>` },

  { key:'gift', title:"Is this a gift?", sub:"",
    valid: () => true,
    render: () => `
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="grid-2">
          ${[{v:false,t:"For my own family",e:'🏠'},{v:true,t:"It's a gift",e:'🎁'}].map(o => `
            <button type="button" class="chip-card" data-on="${state.data.isGift === o.v}" data-action="setIsGift" data-v="${o.v}">
              <div style="font-size:28px">${o.e}</div>
              <div style="font-family:var(--serif);font-size:18px;font-weight:500;margin-top:8px;line-height:1.25">${o.t}</div>
            </button>
          `).join('')}
        </div>
        ${state.data.isGift ? `
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:6px">
            <input class="txt" placeholder="From (your name)" value="${esc(state.data.giftFrom)}" data-action="setGiftFrom">
            <textarea class="txt" rows="3" placeholder="A short message to include with the story" data-action="setGiftMessage">${esc(state.data.giftMessage)}</textarea>
          </div>` : ''}
      </div>` }
];

// ─────────────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────────────

function esc(s){
  if (s == null) return '';
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderQuestionStep(){
  const cur = STEPS[state.step];
  const host = document.getElementById('stepHost');
  host.classList.remove('wide','narrow');
  host.innerHTML = `
    <div class="step-head">
      <div class="kicker">STEP ${state.step + 1} OF ${STEPS.length}</div>
      <h2 style="margin-top:10px">${cur.title}</h2>
      ${cur.sub ? `<p class="sub">${cur.sub}</p>` : ''}
    </div>
    <div>${cur.render()}</div>
    <div class="cta-row">
      <button class="btn" id="continueBtn" type="button"${cur.valid() ? '' : ' disabled'}>
        Continue
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>`;
  document.getElementById('continueBtn').addEventListener('click', next);
}

function renderEmailStep(){
  const childList = state.data.children.map(c => c.name).filter(Boolean).join(' & ') || 'them';
  const host = document.getElementById('stepHost');
  host.classList.add('narrow');
  host.classList.remove('wide');
  host.innerHTML = `
    <div class="step-head">
      <div class="kicker">ALMOST THERE</div>
      <h2 style="margin-top:10px;font-size:clamp(28px,3.8vw,40px)">Where shall we send <span class="italic-plum">${esc(childList)}'s</span> preview?</h2>
      <p class="sub" style="max-width:460px;margin-left:auto;margin-right:auto">We'll write a 2-minute taste of their story and send it within 24 hours. <strong style="color:var(--ink)">Free.</strong> If you love it, the full 15-minute version is £24.99.</p>
    </div>

      <div class="field-label">YOUR EMAIL</div>
      <input class="txt" id="emailInput" type="email" autofocus value="${esc(state.data.email)}" placeholder="you@example.com">
      <div class="field-hint">We'll only email about this story. No newsletters, no spam.</div>
      <ul style="list-style:none;padding:0;margin:22px 0 0;display:flex;flex-direction:column;gap:10px">
        ${[
          ['🎧',"A 2-minute audio preview of your child's story"],
          ['⏱️','Delivered within 24 hours, written by hand, not on a server'],
          ['💷','Full 15-minute version available for £24.99, only if you love the preview'],
          ['🚫','No card details now. No subscription. Ever.']
        ].map(([e,t]) => `<li style="display:flex;gap:12px;align-items:flex-start;font-size:14px;color:var(--ink)"><span style="flex:0 0 22px;font-size:16px">${e}</span><span style="color:var(--muted);line-height:1.5">${t}</span></li>`).join('')}
      </ul>
    </div>
    <div class="cta-row">
      <button class="btn" id="submitBtn" type="button" disabled>
        Get my free preview
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--muted-2)">One more tiny step after this. We promise it's important.</div>`;
  const emailInput = document.getElementById('emailInput');
  const submitBtn = document.getElementById('submitBtn');
  function checkValid(){
    const v = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    submitBtn.disabled = !v;
  }
  emailInput.addEventListener('input', () => { state.data.email = emailInput.value.trim(); checkValid(); });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !submitBtn.disabled) submitRequest(); });
  submitBtn.addEventListener('click', submitRequest);
  checkValid();
}

      <div style="font-size:18px;margin-top:1px">🔍</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6"><strong style="color:var(--ink)">Can't find it?</strong> Check Promotions, Updates, or your Spam folder. Search for <em>"hello@heartheirname.com"</em>. Drag the email into your main inbox if you can — it'll keep our future emails out of junk too.</div>

  const host = document.getElementById('stepHost');

function render(){
  const isQuestion = state.step < STEPS.length;
  const isEmail = state.step === STEPS.length;
  const isConfirm = state.step === STEPS.length + 1;
  const isOrdered = state.step === STEPS.length + 2;

  const totalShown = STEPS.length + 3;
  const counter = document.getElementById('stepCounter');
  counter.textContent = isOrdered ? 'DONE' : `${state.step + 1} / ${totalShown}`;
  document.getElementById('progressFill').style.width = `${((state.step + 1) / totalShown) * 100}%`;

  if (isQuestion) renderQuestionStep();
  else if (isEmail) renderEmailStep();
  else if (isConfirm) renderConfirmInboxStep();
  else if (isOrdered) renderOrderedStep();

  attachActions();
}

// ─────────────────────────────────────────────────────────────────────────
// Actions
// ─────────────────────────────────────────────────────────────────────────

function attachActions(){
  document.querySelectorAll('[data-action]').forEach(el => {
    if (el.dataset.bound) return;
    el.dataset.bound = '1';
    const action = el.dataset.action;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA'){
      el.addEventListener('input', e => handleAction(action, el, e));
    } else {
      el.addEventListener('click', e => handleAction(action, el, e));
    }
  });
}

function handleAction(action, el, e){
  const v = el.dataset.v;
  const i = el.dataset.i ? parseInt(el.dataset.i, 10) : null;
  const k = el.dataset.k;
  switch(action){
    case 'setKind': state.data.storyKind = el.dataset.value; render(); break;
    case 'addChild': if (state.data.children.length < 4){ state.data.children.push(newChild()); render(); } break;
    case 'removeChild': state.data.children.splice(i, 1); render(); break;
    case 'updateChild':
      if (el.tagName === 'INPUT'){ state.data.children[i][k] = el.value; updateContinueState(); }
      else { state.data.children[i][k] = v; render(); }
      break;
    case 'toggleTheme':
      const idx = state.data.themes.indexOf(v);
      if (idx >= 0) state.data.themes.splice(idx, 1); else state.data.themes.push(v);
      render(); break;
    case 'setThemesOther': state.data.themesOther = el.value; updateContinueState(); break;
    case 'setPlace': state.data.place = state.data.place === v ? '' : v; render(); break;
    case 'setPlaceReal': state.data.placeReal = el.value; updateContinueState(); break;
    case 'setBestFriend': state.data.bestFriend = el.value; break;
    case 'setOthers': state.data.others = el.value; break;
    case 'togglePet': state.data.hasPet = !state.data.hasPet; render(); break;
    case 'setPetKind': state.data.petKind = v; render(); break;
    case 'setPetName': state.data.petName = el.value; break;
    case 'setToy': state.data.toy = el.value; break;
    case 'setQuirk': state.data.quirk = el.value; break;
    case 'setVoice': state.data.voice = v; render(); break;
    case 'setIsGift': state.data.isGift = (v === 'true'); render(); break;
    case 'setGiftFrom': state.data.giftFrom = el.value; break;
    case 'setGiftMessage': state.data.giftMessage = el.value; break;
  }
}

function updateContinueState(){
  const cur = STEPS[state.step];
  if (!cur) return;
  const btn = document.getElementById('continueBtn');
  if (btn) btn.disabled = !cur.valid();
}

function next(){
  if (state.step < STEPS.length){
    if (!STEPS[state.step].valid()) return;
  }
  state.step++;
  render();
}

function back(){
  if (state.step === 0){ window.location.href = '/'; return; }
  if (state.step === STEPS.length + 2) return; // can't go back from "ordered"
  state.step--;
  render();
}

document.getElementById('backBtn').addEventListener('click', back);

// ─────────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────────

async function submitRequest(){
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = 'Sending… <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 1-7.07 2.93"/></svg>';
  try {
    const res = await fetch('/api/preview-request', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(state.data)
    });
    if (!res.ok){ throw new Error('Request failed'); }
    const data = await res.json();
    state.data.requestId = data.requestId;
    state.step++;
    render();
  } catch(err){
    alert("Something went wrong. Please try again or email hello@heartheirname.com");
    btn.disabled = false;
    btn.innerHTML = 'Get my free preview';
  }
}

async function resendVerify(){
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    await fetch('/api/resend-verify', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email: state.data.email, requestId: state.data.requestId })
    });
    btn.textContent = 'Sent! Check your inbox.';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Resend verification email'; }, 4000);
  } catch(err){
    btn.disabled = false;
    btn.textContent = 'Try again';
  }
}

// ─────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────

render();
</script>
