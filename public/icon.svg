<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C5CFC"/>
      <stop offset="100%" style="stop-color:#6A4CE0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <g transform="translate(100, 105) scale(1.6)">
    <!-- Open book -->
    <path d="M-28 30 Q-28 -10 0 -15 L0 25 Q-28 30 -28 30Z" fill="white" opacity="0.85"/>
    <path d="M28 30 Q28 -10 0 -15 L0 25 Q28 30 28 30Z" fill="white"/>

    <!-- Headphone arc -->
    <path d="M-32 12 Q-32 -22 0 -28 Q32 -22 32 12" fill="none" stroke="url(#accent)" stroke-width="5.5" stroke-linecap="round"/>

    <!-- Ear pieces -->
    <rect x="-37" y="8" width="12" height="18" rx="6" fill="url(#accent)"/>
    <rect x="25" y="8" width="12" height="18" rx="6" fill="url(#accent)"/>

    <!-- Sound waves -->
    <path d="M12 -2 Q18 -5 12 -10" fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M16 2 Q24 -3 16 -12" fill="none" stroke="#FFB347" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>