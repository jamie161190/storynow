<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storytold Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: #FEFBF6; color: #2D2844; min-height: 100vh; }
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 360px; width: 100%; text-align: center; }
.login-box h1 { color: #7C5CFC; font-size: 1.5rem; margin-bottom: 1rem; }
.login-box input { width: 100%; padding: 0.75rem 1rem; border: 2px solid #E8E0F0; border-radius: 10px; font-size: 1rem; font-family: inherit; margin-bottom: 0.75rem; }
.login-box button { width: 100%; padding: 0.75rem; background: #7C5CFC; color: #fff; border: none; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.login-box .err { color: #FF6B9D; font-size: 0.82rem; margin-top: 0.5rem; display: none; }

.admin { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.admin.active { display: block; }
.admin h1 { color: #7C5CFC; font-size: 1.4rem; margin-bottom: 0.25rem; }
.admin .sub { color: #999; font-size: 0.82rem; margin-bottom: 1.5rem; }

.tabs { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: 2px solid #E8E0F0; background: #fff; color: #2D2844; transition: all 0.2s; }
.tab.active { background: #7C5CFC; color: #fff; border-color: #7C5CFC; }

.search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.search-bar input { flex: 1; padding: 0.6rem 1rem; border: 2px solid #E8E0F0; border-radius: 10px; font-size: 0.9rem; font-family: inherit; }
.search-bar button { padding: 0.6rem 1.5rem; background: #7C5CFC; color: #fff; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: inherit; }

.card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #F0ECF5; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.card-title { font-weight: 800; font-size: 0.95rem; }
.card-meta { font-size: 0.75rem; color: #999; }
.card-detail { font-size: 0.82rem; color: #666; line-height: 1.6; margin-bottom: 0.3rem; }
.card-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; flex-wrap: wrap; }
.btn { padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.78rem; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
.btn-purple { background: #7C5CFC; color: #fff; }
.btn-orange { background: #FF8C42; color: #fff; }
.btn-green { background: #4CAF50; color: #fff; }
.btn-red { background: #FF6B9D; color: #fff; }
.btn-outline { background: transparent; border: 2px solid #E8E0F0; color: #666; }
.badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
.badge-green { background: #E8F5E9; color: #2E7D32; }
.badge-orange { background: #FFF3E0; color: #E65100; }
.badge-purple { background: #F3E8FF; color: #7C3AED; }
.badge-red { background: #FFEBEE; color: #C62828; }

.empty { text-align: center; padding: 3rem; color: #999; }
.loading { text-align: center; padding: 2rem; color: #7C5CFC; font-weight: 700; }

.detail-panel { background: #F8F5FF; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.detail-panel h3 { font-size: 0.9rem; color: #7C5CFC; margin-bottom: 0.75rem; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem 1rem; font-size: 0.82rem; }
.detail-grid dt { color: #999; font-weight: 600; }
.detail-grid dd { color: #2D2844; font-weight: 700; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 1.1rem; color: #7C5CFC; margin-bottom: 1rem; }
.modal label { display: block; font-size: 0.82rem; font-weight: 700; color: #666; margin-bottom: 0.25rem; margin-top: 0.75rem; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 0.6rem 0.8rem; border: 2px solid #E8E0F0; border-radius: 10px; font-size: 0.9rem; font-family: inherit; }
.modal textarea { height: 80px; resize: vertical; }
.modal .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
audio { width: 100%; margin-top: 0.5rem; }

/* Analytics Dashboard */
.metrics-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
.metrics-header h2 { font-size: 1rem; color: #7C5CFC; margin: 0; }
.period-select { padding: 0.4rem 0.8rem; border: 2px solid #E8E0F0; border-radius: 50px; font-family: inherit; font-weight: 700; font-size: 0.78rem; background: #fff; color: #2D2844; cursor: pointer; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
.summary-card { background: #fff; border-radius: 12px; padding: 1rem; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #F0ECF5; text-align: center; }
.summary-card .sc-value { font-size: 1.6rem; font-weight: 800; color: #7C5CFC; line-height: 1.2; }
.summary-card .sc-value.green { color: #4CAF50; }
.summary-card .sc-value.orange { color: #FF8C42; }
.summary-card .sc-label { font-size: 0.72rem; color: #999; font-weight: 600; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.03em; }

.chart-card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #F0ECF5; margin-bottom: 1rem; }
.chart-card h3 { font-size: 0.88rem; color: #7C5CFC; margin-bottom: 1rem; }
.chart-row { display: flex; align-items: flex-end; gap: 2px; height: 140px; padding-bottom: 1.5rem; position: relative; overflow-x: auto; }
.chart-bar-group { flex: 1; min-width: 14px; display: flex; flex-direction: column; align-items: center; gap: 1px; height: 100%; justify-content: flex-end; position: relative; }
.chart-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; cursor: pointer; position: relative; }
.chart-bar.sales { background: #7C5CFC; }
.chart-bar.visitors { background: #E8E0F0; }
.chart-bar.previews { background: #FF8C42; opacity: 0.7; }
.chart-bar-label { font-size: 0.55rem; color: #bbb; writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); position: absolute; bottom: -1.4rem; white-space: nowrap; }
.chart-legend { display: flex; gap: 1rem; margin-top: 0.5rem; justify-content: center; flex-wrap: wrap; }
.chart-legend span { font-size: 0.72rem; color: #666; display: flex; align-items: center; gap: 0.3rem; }
.chart-legend .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

.chart-tooltip { position: absolute; background: #2D2844; color: #fff; padding: 0.4rem 0.6rem; border-radius: 8px; font-size: 0.7rem; z-index: 10; pointer-events: none; white-space: nowrap; bottom: 100%; left: 50%; transform: translateX(-50%); display: none; }
.chart-bar-group:hover .chart-tooltip { display: block; }

.breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
@media (max-width: 600px) { .breakdown-grid { grid-template-columns: 1fr; } }

.breakdown-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #F0ECF5; }
.breakdown-card h3 { font-size: 0.85rem; color: #7C5CFC; margin-bottom: 0.75rem; }
.breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 0.35rem 0; border-bottom: 1px solid #F8F5FF; font-size: 0.82rem; }
.breakdown-row:last-child { border-bottom: none; }
.breakdown-row .br-label { color: #555; font-weight: 600; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.breakdown-row .br-value { font-weight: 800; color: #2D2844; }
.breakdown-bar { height: 6px; background: #F0ECF5; border-radius: 3px; margin-top: 0.2rem; }
.breakdown-bar-fill { height: 100%; border-radius: 3px; background: #7C5CFC; }

.funnel-steps { display: flex; flex-direction: column; gap: 0.4rem; }
.funnel-step { display: flex; align-items: center; gap: 0.75rem; }
.funnel-step .fs-bar { flex: 1; height: 28px; background: #F0ECF5; border-radius: 8px; position: relative; overflow: hidden; }
.funnel-step .fs-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #7C5CFC, #A78BFA); display: flex; align-items: center; padding-left: 0.6rem; }
.funnel-step .fs-label { font-size: 0.78rem; font-weight: 700; color: #555; min-width: 80px; text-align: right; }
.funnel-step .fs-count { font-size: 0.72rem; font-weight: 800; color: #fff; }

/* Live Dashboard */
@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes fade-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

.live-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
.live-header h2 { font-size: 1rem; color: #7C5CFC; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
.live-header .live-pulse { width: 10px; height: 10px; background: #4CAF50; border-radius: 50%; animation: pulse-dot 1.5s infinite; }
.live-header .live-ago { font-size: 0.72rem; color: #999; font-weight: 600; }

.live-big-number { text-align: center; margin-bottom: 1.5rem; }
.live-big-number .big { font-size: 3.5rem; font-weight: 800; color: #7C5CFC; line-height: 1; }
.live-big-number .big-label { font-size: 0.82rem; color: #999; font-weight: 600; margin-top: 0.3rem; }

.live-funnel { margin-bottom: 1.25rem; }
.live-funnel h3 { font-size: 0.88rem; color: #7C5CFC; margin-bottom: 0.75rem; }
.live-stage { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
.live-stage .ls-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.live-stage .ls-name { font-size: 0.82rem; font-weight: 700; color: #2D2844; flex: 1; }
.live-stage .ls-count { font-size: 1rem; font-weight: 800; color: #2D2844; min-width: 30px; text-align: right; }
.live-stage .ls-bar-wrap { flex: 2; height: 8px; background: #F0ECF5; border-radius: 4px; overflow: hidden; }
.live-stage .ls-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

.live-feed { margin-top: 1.25rem; }
.live-feed h3 { font-size: 0.88rem; color: #7C5CFC; margin-bottom: 0.75rem; }
.live-event { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.75rem; background: #fff; border-radius: 10px; margin-bottom: 0.4rem; border: 1px solid #F0ECF5; animation: fade-in 0.3s ease; font-size: 0.8rem; }
.live-event .le-icon { font-size: 1rem; flex-shrink: 0; }
.live-event .le-text { flex: 1; color: #555; font-weight: 600; }
.live-event .le-time { color: #bbb; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Storytold Admin</h1>
    <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Log in</button>
    <p class="err" id="loginErr">Wrong password</p>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin" id="adminPanel">
  <h1>Storytold Admin</h1>
  <p class="sub" id="statsLine">Loading...</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('customers')">Customers</div>
    <div class="tab" onclick="switchTab('attempts')">Attempts</div>
    <div class="tab" onclick="switchTab('retry')">Retry Queue</div>
    <div class="tab" onclick="switchTab('errors')" id="errorsTab">Errors <span id="errorBadge" style="display:none;background:#FF6B9D;color:#fff;font-size:0.65rem;padding:0.1rem 0.45rem;border-radius:50px;margin-left:0.3rem;vertical-align:middle"></span></div>
    <div class="tab" onclick="switchTab('analytics')">Analytics</div>
    <div class="tab" onclick="switchTab('live')" id="liveTab">Live <span id="liveDot" style="display:inline-block;width:8px;height:8px;background:#4CAF50;border-radius:50%;margin-left:0.3rem;vertical-align:middle;animation:pulse-dot 1.5s infinite"></span></div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by email or child name..." onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">Search</button>
  </div>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- Generate Story Modal -->
<div class="modal-overlay" id="generateModal">
  <div class="modal" style="max-height:85vh;overflow-y:auto">
    <h2>Generate Story</h2>
    <label>Customer email</label>
    <input type="email" id="genEmail" placeholder="customer@email.com">
    <label>Child name</label>
    <input type="text" id="genChildName" placeholder="e.g. Lily">
    <label>Age</label>
    <input type="text" id="genAge" placeholder="e.g. 5">
    <label>Category</label>
    <select id="genCategory">
      <option value="bedtime">Bedtime Story</option>
      <option value="journey">Adventure Story</option>
      <option value="learning">Learning Adventure</option>
    </select>
    <label>Gender</label>
    <select id="genGender">
      <option value="girl">Girl</option>
      <option value="boy">Boy</option>
      <option value="neutral">Neutral</option>
    </select>
    <label>Themes (comma separated)</label>
    <input type="text" id="genThemes" placeholder="e.g. Dinosaurs, Space, Football">
    <label>Best friend</label>
    <input type="text" id="genFriend" placeholder="e.g. Ellis, cousin Amara">
    <label>Sidekick / adventure companion</label>
    <input type="text" id="genSidekick" placeholder="e.g. Mum, Daddy, a robot called Sparky">
    <label>Family members</label>
    <input type="text" id="genFamily" placeholder="e.g. Mummy, Daddy, baby sister Isla">
    <label>Pet</label>
    <div style="display:flex;gap:0.5rem">
      <input type="text" id="genPetName" placeholder="Pet name" style="flex:1">
      <input type="text" id="genPetType" placeholder="Pet type" style="flex:1">
    </div>
    <label>Teacher name</label>
    <input type="text" id="genTeacher" placeholder="e.g. Mrs Smith">
    <label>Favourite teddy</label>
    <input type="text" id="genTeddy" placeholder="e.g. Mr Snuggles">
    <label>Proud of (something special about the child)</label>
    <input type="text" id="genProud" placeholder="e.g. always sharing with friends">
    <label>Where (setting)</label>
    <input type="text" id="genWhere" placeholder="e.g. Enchanted Forest, Surprise me">
    <label>Personal message</label>
    <textarea id="genMessage" placeholder="e.g. Chase, this is from Daddy. I am so proud of you..."></textarea>
    <label>Extra details</label>
    <textarea id="genDetails" placeholder="Anything else..."></textarea>
    <label>Voice ID (optional)</label>
    <input type="text" id="genVoice" placeholder="Leave blank for default">
    <p id="genStatus" style="font-size:0.82rem;color:#7C5CFC;margin-top:0.75rem;display:none"></p>
    <div class="modal-actions">
      <button class="btn btn-purple" onclick="submitGenerate()">Generate Story</button>
      <button class="btn btn-outline" onclick="closeModal('generateModal')">Cancel</button>
    </div>
  </div>
</div>

<script>
let adminSecret = '';
let currentTab = 'customers';
let allCustomers = [];
let allAttempts = [];

// ── Auth ──
function adminLogin() {
  adminSecret = document.getElementById('adminPass').value.trim();
  if (!adminSecret) return;
  // Test with a simple request
  api('customers').then(data => {
    if (data.error) {
      document.getElementById('loginErr').style.display = 'block';
      adminSecret = '';
    } else {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      allCustomers = data.customers || [];
      renderCustomers(allCustomers);
      updateStats();
      // Pre-load attempts and error count
      api('attempts').then(d => { allAttempts = d.attempts || []; });
      loadErrorBadge();
    }
  });
}

// ── API helper ──
async function api(action, opts = {}) {
  const params = new URLSearchParams({ action, ...opts.params });
  const fetchOpts = {
    headers: { 'x-admin-secret': adminSecret, 'Content-Type': 'application/json' }
  };
  if (opts.body) {
    fetchOpts.method = 'POST';
    fetchOpts.body = JSON.stringify(opts.body);
  }
  const res = await fetch('/api/admin?' + params.toString(), fetchOpts);
  return res.json();
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'customers') { renderCustomers(allCustomers); stopLiveRefresh(); }
  else if (tab === 'attempts') { renderAttempts(allAttempts); stopLiveRefresh(); }
  else if (tab === 'retry') { loadRetryQueue(); stopLiveRefresh(); }
  else if (tab === 'errors') { loadErrors(); stopLiveRefresh(); }
  else if (tab === 'analytics') { loadMetrics(); stopLiveRefresh(); }
  else if (tab === 'live') { loadLive(); startLiveRefresh(); }
}

// ── Search ──
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) {
    if (currentTab === 'customers') renderCustomers(allCustomers);
    else if (currentTab === 'attempts') renderAttempts(allAttempts);
    return;
  }
  document.getElementById('content').innerHTML = '<div class="loading">Searching...</div>';
  const data = await api('search', { params: { q } });
  if (currentTab === 'customers' || currentTab === 'retry') {
    // Group search results by email
    const grouped = {};
    for (const s of (data.stories || [])) {
      if (!grouped[s.email]) grouped[s.email] = { email: s.email, stories: [], storyCount: 0 };
      grouped[s.email].stories.push(s);
      grouped[s.email].storyCount++;
    }
    renderCustomers(Object.values(grouped));
  } else {
    renderAttempts(data.attempts || []);
  }
}

// ── Stats ──
function updateStats() {
  const totalCustomers = allCustomers.length;
  const totalStories = allCustomers.reduce((sum, c) => sum + c.storyCount, 0);
  document.getElementById('statsLine').textContent = totalCustomers + ' customers, ' + totalStories + ' stories generated';
}

// ── Render customers ──
function renderCustomers(customers) {
  if (!customers.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No customers found</div>';
    return;
  }
  let html = '<button class="btn btn-green" onclick="openGenerateModal()" style="margin-bottom:1rem">+ Generate New Story</button>';
  for (const c of customers) {
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">' + esc(c.email) + '</span><span class="badge badge-purple">' + c.storyCount + ' stories</span></div>';
    for (const s of c.stories) {
      const date = new Date(s.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const cat = { bedtime: 'Bedtime', journey: 'Adventure', learning: 'Learning' }[s.category] || s.category;
      html += '<div class="card-detail">' + esc(s.child_name) + ' &middot; ' + cat + ' &middot; ' + date;
      if (s.audio_url) html += ' <span class="badge badge-green">Audio ready</span>';
      else html += ' <span class="badge badge-orange">No audio</span>';
      html += '</div>';
      if (s.audio_url) {
        html += '<audio controls preload="none" src="' + esc(s.audio_url) + '"></audio>';
      }
    }
    html += '<div class="card-actions">';
    html += '<button class="btn btn-purple" onclick="openGenerateModal(\'' + esc(c.email) + '\')">Generate for this customer</button>';
    html += '</div></div>';
  }
  document.getElementById('content').innerHTML = html;
}

// ── Render attempts ──
function renderAttempts(attempts) {
  if (!attempts.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No attempts found</div>';
    return;
  }
  let html = '';
  for (const a of attempts) {
    const date = new Date(a.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    const sd = a.story_data || {};
    const cat = { bedtime: 'Bedtime', journey: 'Adventure', learning: 'Learning' }[sd.category || a.category] || (sd.category || a.category || 'Unknown');

    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">' + esc(a.child_name || sd.childName || 'Unknown') + '</span><span class="card-meta">' + date + '</span></div>';
    html += '<div class="card-detail">Category: ' + cat + '</div>';
    if (sd.age || sd.childAge) html += '<div class="card-detail">Age: ' + esc(sd.age || sd.childAge) + '</div>';
    if (sd.gender) html += '<div class="card-detail">Gender: ' + esc(sd.gender) + '</div>';
    if (sd.themes && sd.themes.length) html += '<div class="card-detail">Themes: ' + esc(sd.themes.join(', ')) + '</div>';
    if (sd.where) html += '<div class="card-detail">Setting: ' + esc(sd.where) + '</div>';
    if (sd.proudOf) html += '<div class="card-detail">Proud of: ' + esc(sd.proudOf) + '</div>';
    if (sd.friendName) html += '<div class="card-detail">Best friend: ' + esc(sd.friendName) + '</div>';
    if (sd.sidekickName) html += '<div class="card-detail">Sidekick: ' + esc(sd.sidekickName) + '</div>';
    if (sd.familyMembers) html += '<div class="card-detail">Family: ' + esc(sd.familyMembers) + '</div>';
    if (sd.teacherName) html += '<div class="card-detail">Teacher: ' + esc(sd.teacherName) + '</div>';
    if (sd.petName) html += '<div class="card-detail">Pet: ' + esc(sd.petName) + (sd.petType ? ' (' + esc(sd.petType) + ')' : '') + '</div>';
    if (sd.favTeddy) html += '<div class="card-detail">Teddy: ' + esc(sd.favTeddy) + '</div>';
    if (sd.extraDetails) html += '<div class="card-detail">Extra: ' + esc(sd.extraDetails) + '</div>';
    if (sd.personalMessage) html += '<div class="card-detail">Message: ' + esc(sd.personalMessage) + '</div>';
    if (a.status) html += '<div class="card-detail"><span class="badge badge-orange">' + esc(a.status) + '</span></div>';

    html += '<div class="card-actions">';
    html += '<button class="btn btn-purple" onclick=\'generateFromAttempt(' + JSON.stringify(a).replace(/'/g, "\\'") + ')\'>Generate this story</button>';
    html += '</div></div>';
  }
  document.getElementById('content').innerHTML = html;
}

// ── Retry Queue ──
async function loadRetryQueue() {
  document.getElementById('content').innerHTML = '<div class="loading">Loading retry queue...</div>';
  const data = await api('retry-queue');
  const queue = data.queue || [];
  if (!queue.length) {
    document.getElementById('content').innerHTML = '<div class="empty">Retry queue is empty. All good!</div>';
    return;
  }
  let html = '';
  for (const item of queue) {
    const date = new Date(item.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">' + esc(item.childName || 'Unknown') + '</span><span class="badge badge-red">Attempt ' + item.attempts + '</span></div>';
    html += '<div class="card-detail">Email: ' + esc(item.customerEmail || 'N/A') + '</div>';
    html += '<div class="card-detail">Queued: ' + date + '</div>';
    if (item.lastAttempt) html += '<div class="card-detail">Last tried: ' + new Date(item.lastAttempt).toLocaleString('en-GB') + '</div>';
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

function generateFromAttempt(attempt) {
  const sd = attempt.story_data || {};
  document.getElementById('genEmail').value = '';
  document.getElementById('genChildName').value = sd.childName || attempt.child_name || '';
  document.getElementById('genAge').value = sd.age || sd.childAge || '';
  document.getElementById('genCategory').value = sd.category || attempt.category || 'journey';
  document.getElementById('genGender').value = sd.gender || 'neutral';
  document.getElementById('genThemes').value = (sd.themes || []).join(', ');
  document.getElementById('genFriend').value = sd.friendName || '';
  document.getElementById('genSidekick').value = sd.sidekickName || '';
  document.getElementById('genFamily').value = sd.familyMembers || '';
  document.getElementById('genPetName').value = sd.petName || '';
  document.getElementById('genPetType').value = sd.petType || '';
  document.getElementById('genTeacher').value = sd.teacherName || '';
  document.getElementById('genTeddy').value = sd.favTeddy || '';
  document.getElementById('genProud').value = sd.proudOf || '';
  document.getElementById('genWhere').value = sd.where || '';
  document.getElementById('genMessage').value = sd.personalMessage || '';
  document.getElementById('genDetails').value = sd.extraDetails || '';
  document.getElementById('genVoice').value = attempt.voice_id || '';
  document.getElementById('genStatus').style.display = 'none';
  document.getElementById('generateModal').classList.add('active');

  // Prompt for email since attempts don't have one
  document.getElementById('genEmail').focus();
}

async function submitGenerate() {
  const email = document.getElementById('genEmail').value.trim();
  const childName = document.getElementById('genChildName').value.trim();
  const age = document.getElementById('genAge').value.trim();
  const category = document.getElementById('genCategory').value;
  const gender = document.getElementById('genGender').value;
  const themes = document.getElementById('genThemes').value.trim();
  const friendName = document.getElementById('genFriend').value.trim();
  const sidekickName = document.getElementById('genSidekick').value.trim();
  const familyMembers = document.getElementById('genFamily').value.trim();
  const petName = document.getElementById('genPetName').value.trim();
  const petType = document.getElementById('genPetType').value.trim();
  const teacherName = document.getElementById('genTeacher').value.trim();
  const favTeddy = document.getElementById('genTeddy').value.trim();
  const proudOf = document.getElementById('genProud').value.trim();
  const where = document.getElementById('genWhere').value.trim();
  const personalMessage = document.getElementById('genMessage').value.trim();
  const details = document.getElementById('genDetails').value.trim();
  const voiceId = document.getElementById('genVoice').value.trim();

  if (!email || !childName) {
    document.getElementById('genStatus').textContent = 'Email and child name are required';
    document.getElementById('genStatus').style.color = '#FF6B9D';
    document.getElementById('genStatus').style.display = 'block';
    return;
  }

  document.getElementById('genStatus').textContent = 'Starting generation...';
  document.getElementById('genStatus').style.color = '#7C5CFC';
  document.getElementById('genStatus').style.display = 'block';

  const storyData = {
    childName,
    age: age || '5',
    gender,
    category,
    length: 'full'
  };
  if (themes) storyData.themes = themes.split(',').map(t => t.trim()).filter(Boolean);
  if (friendName) storyData.friendName = friendName;
  if (sidekickName) storyData.sidekickName = sidekickName;
  if (familyMembers) storyData.familyMembers = familyMembers;
  if (petName) storyData.petName = petName;
  if (petType) storyData.petType = petType;
  if (teacherName) storyData.teacherName = teacherName;
  if (favTeddy) storyData.favTeddy = favTeddy;
  if (proudOf) storyData.proudOf = proudOf;
  if (where) storyData.where = where;
  if (personalMessage) storyData.personalMessage = personalMessage;
  if (details) storyData.extraDetails = details;

  const data = await api('generate', {
    body: { email, storyData, voiceId: voiceId || undefined }
  });

  if (data.success) {
    document.getElementById('genStatus').textContent = 'Story generation started! ' + email + ' will receive an email when it is ready.';
    document.getElementById('genStatus').style.color = '#4CAF50';
  } else {
    document.getElementById('genStatus').textContent = 'Error: ' + (data.error || 'Unknown error');
    document.getElementById('genStatus').style.color = '#FF6B9D';
  }
}

// ── Errors ──
async function loadErrors() {
  document.getElementById('content').innerHTML = '<div class="loading">Loading errors...</div>';
  const data = await api('errors');
  const errors = data.errors || [];
  if (!errors.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No errors in the last 7 days. All clear!</div>';
    return;
  }
  let html = '<p style="font-size:0.78rem;color:#999;margin-bottom:1rem">Last 7 days, newest first</p>';
  for (const e of errors) {
    const date = new Date(e.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const sevBadge = e.severity === 'critical' ? 'badge-red' : e.severity === 'warning' ? 'badge-orange' : 'badge-purple';
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">' + esc(e.source) + '</span><span class="badge ' + sevBadge + '">' + esc(e.severity) + '</span></div>';
    html += '<div class="card-detail" style="font-weight:600;color:#2D2844">' + esc(e.message) + '</div>';
    if (e.child_name) html += '<div class="card-detail">Child: ' + esc(e.child_name) + '</div>';
    if (e.customer_email) html += '<div class="card-detail">Email: ' + esc(e.customer_email) + '</div>';
    if (e.job_id) html += '<div class="card-detail">Job: ' + esc(e.job_id) + '</div>';
    html += '<div class="card-meta">' + date + '</div>';
    if (e.details) {
      html += '<details style="margin-top:0.4rem"><summary style="font-size:0.75rem;color:#7C5CFC;cursor:pointer;font-weight:600">Details</summary>';
      html += '<pre style="font-size:0.72rem;background:#F8F5FF;padding:0.5rem;border-radius:8px;margin-top:0.3rem;overflow-x:auto;white-space:pre-wrap">' + esc(JSON.stringify(e.details, null, 2)) + '</pre></details>';
    }
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

async function loadErrorBadge() {
  try {
    const data = await api('error-count');
    const badge = document.getElementById('errorBadge');
    if (data.count > 0) {
      badge.textContent = data.count;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  } catch (e) { /* silent */ }
}

// ── Analytics ──
let metricsDays = 30;

async function loadMetrics(days) {
  if (days) metricsDays = days;
  document.getElementById('content').innerHTML = '<div class="loading">Loading analytics...</div>';
  const data = await api('metrics', { params: { days: metricsDays } });
  if (data.error) {
    document.getElementById('content').innerHTML = '<div class="empty">Could not load metrics: ' + esc(data.error) + '</div>';
    return;
  }
  renderMetrics(data);
}

function renderMetrics(data) {
  const t = data.totals || {};
  const daily = data.daily || [];
  const cats = data.categories || {};
  const refs = data.topReferrers || [];
  const utms = data.topUtm || [];
  const devices = data.devices || {};
  const funnel = data.funnel || {};

  let html = '';

  // Period selector
  html += '<div class="metrics-header">';
  html += '<h2>Analytics Dashboard</h2>';
  html += '<select class="period-select" onchange="loadMetrics(parseInt(this.value))">';
  [7, 14, 30, 60, 90].forEach(d => {
    html += '<option value="' + d + '"' + (d === metricsDays ? ' selected' : '') + '>' + d + ' days</option>';
  });
  html += '</select></div>';

  // Summary cards
  html += '<div class="summary-grid">';
  html += summaryCard(t.sales || 0, 'Total Sales', '');
  html += summaryCard('£' + ((t.revenue || 0).toFixed(2)), 'Revenue', 'green');
  html += summaryCard(t.visitors || 0, 'Page Views', '');
  html += summaryCard(t.previews || 0, 'Previews', 'orange');
  html += summaryCard(t.uniqueCustomers || 0, 'Unique Customers', '');
  html += summaryCard((t.conversionRate || 0) + '%', 'Preview to Sale', 'green');
  html += '</div>';

  // Daily chart
  if (daily.length) {
    const maxSales = Math.max(...daily.map(d => d.sales), 1);
    const maxVisitors = Math.max(...daily.map(d => d.visitors), 1);
    const maxPreviews = Math.max(...daily.map(d => d.previews), 1);
    const maxVal = Math.max(maxSales, maxVisitors, maxPreviews, 1);

    html += '<div class="chart-card">';
    html += '<h3>Daily Activity (last ' + metricsDays + ' days)</h3>';
    html += '<div class="chart-row">';

    for (const d of daily) {
      const sH = Math.max((d.sales / maxVal) * 120, d.sales > 0 ? 4 : 0);
      const vH = Math.max((d.visitors / maxVal) * 120, d.visitors > 0 ? 3 : 0);
      const pH = Math.max((d.previews / maxVal) * 120, d.previews > 0 ? 3 : 0);
      const dateLabel = d.date.slice(5); // MM-DD
      const revForDay = (d.sales * 19.99).toFixed(2);

      html += '<div class="chart-bar-group">';
      html += '<div class="chart-tooltip">' + d.date + '<br>' + d.sales + ' sales (£' + revForDay + ')<br>' + d.visitors + ' views, ' + d.previews + ' previews</div>';
      html += '<div class="chart-bar visitors" style="height:' + vH + 'px" title="' + d.visitors + ' views"></div>';
      html += '<div class="chart-bar previews" style="height:' + pH + 'px" title="' + d.previews + ' previews"></div>';
      html += '<div class="chart-bar sales" style="height:' + sH + 'px" title="' + d.sales + ' sales"></div>';
      html += '<span class="chart-bar-label">' + dateLabel + '</span>';
      html += '</div>';
    }

    html += '</div>';
    html += '<div class="chart-legend">';
    html += '<span><span class="dot" style="background:#E8E0F0"></span> Page Views</span>';
    html += '<span><span class="dot" style="background:#FF8C42;opacity:0.7"></span> Previews</span>';
    html += '<span><span class="dot" style="background:#7C5CFC"></span> Sales</span>';
    html += '</div>';
    html += '</div>';
  }

  // Breakdowns: 2x2 grid
  html += '<div class="breakdown-grid">';

  // Category breakdown
  html += '<div class="breakdown-card"><h3>Story Categories</h3>';
  const catEntries = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const catMax = catEntries.length ? catEntries[0][1] : 1;
  const catLabels = { bedtime: 'Bedtime', journey: 'Adventure', learning: 'Learning' };
  if (catEntries.length) {
    for (const [cat, count] of catEntries) {
      const pct = Math.round((count / catMax) * 100);
      html += '<div class="breakdown-row"><span class="br-label">' + esc(catLabels[cat] || cat) + '</span><span class="br-value">' + count + '</span></div>';
      html += '<div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:' + pct + '%"></div></div>';
    }
  } else {
    html += '<div style="color:#999;font-size:0.82rem;padding:0.5rem 0">No data yet</div>';
  }
  html += '</div>';

  // Device breakdown
  html += '<div class="breakdown-card"><h3>Devices</h3>';
  const devEntries = Object.entries(devices).sort((a, b) => b[1] - a[1]);
  const devMax = devEntries.length ? devEntries[0][1] : 1;
  if (devEntries.length) {
    for (const [device, count] of devEntries) {
      const pct = Math.round((count / devMax) * 100);
      html += '<div class="breakdown-row"><span class="br-label">' + esc(device.charAt(0).toUpperCase() + device.slice(1)) + '</span><span class="br-value">' + count + '</span></div>';
      html += '<div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:' + pct + '%;background:#FF8C42"></div></div>';
    }
  } else {
    html += '<div style="color:#999;font-size:0.82rem;padding:0.5rem 0">No data yet</div>';
  }
  html += '</div>';

  // Top referrers
  html += '<div class="breakdown-card"><h3>Top Referrers</h3>';
  if (refs.length) {
    for (const r of refs.slice(0, 8)) {
      const pct = Math.round((r.count / (refs[0]?.count || 1)) * 100);
      html += '<div class="breakdown-row"><span class="br-label">' + esc(r.source) + '</span><span class="br-value">' + r.count + '</span></div>';
      html += '<div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:' + pct + '%;background:#4CAF50"></div></div>';
    }
  } else {
    html += '<div style="color:#999;font-size:0.82rem;padding:0.5rem 0">No referrer data yet</div>';
  }
  html += '</div>';

  // UTM campaigns
  html += '<div class="breakdown-card"><h3>UTM Campaigns</h3>';
  if (utms.length) {
    for (const u of utms.slice(0, 8)) {
      const pct = Math.round((u.count / (utms[0]?.count || 1)) * 100);
      html += '<div class="breakdown-row"><span class="br-label">' + esc(u.campaign) + '</span><span class="br-value">' + u.count + '</span></div>';
      html += '<div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:' + pct + '%;background:#A78BFA"></div></div>';
    }
  } else {
    html += '<div style="color:#999;font-size:0.82rem;padding:0.5rem 0">No UTM data yet</div>';
  }
  html += '</div>';

  html += '</div>'; // close breakdown-grid

  // Funnel
  const funnelEntries = Object.entries(funnel).sort((a, b) => b[1] - a[1]);
  if (funnelEntries.length) {
    const funnelMax = funnelEntries[0][1] || 1;
    html += '<div class="chart-card"><h3>Funnel Steps</h3>';
    html += '<div class="funnel-steps">';
    for (const [step, count] of funnelEntries) {
      const pct = Math.max(Math.round((count / funnelMax) * 100), 5);
      html += '<div class="funnel-step">';
      html += '<span class="fs-label">' + esc(step) + '</span>';
      html += '<div class="fs-bar"><div class="fs-fill" style="width:' + pct + '%"><span class="fs-count">' + count + '</span></div></div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  document.getElementById('content').innerHTML = html;
}

function summaryCard(value, label, colorClass) {
  return '<div class="summary-card"><div class="sc-value ' + colorClass + '">' + value + '</div><div class="sc-label">' + label + '</div></div>';
}

// ── Live Dashboard ──
let liveInterval = null;

function startLiveRefresh() {
  stopLiveRefresh();
  liveInterval = setInterval(() => { if (currentTab === 'live') loadLive(true); }, 10000);
}

function stopLiveRefresh() {
  if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
}

async function loadLive(silent) {
  if (!silent) document.getElementById('content').innerHTML = '<div class="loading">Loading live data...</div>';
  const data = await api('live', { params: { minutes: 5 } });
  if (data.error) {
    document.getElementById('content').innerHTML = '<div class="empty">Could not load live data: ' + esc(data.error) + '</div>';
    return;
  }
  renderLive(data);
}

function renderLive(data) {
  const screens = data.screens || {};
  const devices = data.devices || {};
  const events = data.recentEvents || [];
  const total = data.totalHits || 0;

  // Ordered funnel stages with labels, colors, and emoji
  const stageConfig = [
    { key: 'landing', label: 'Homepage', color: '#7C5CFC', emoji: '🏠' },
    { key: 'screenHow', label: 'How It Works', color: '#A78BFA', emoji: '📖' },
    { key: 'screenSample', label: 'Sample Story', color: '#9B59B6', emoji: '🎧' },
    { key: 'screenStart', label: 'Start Creating', color: '#FF8C42', emoji: '✏️' },
    { key: 'screenDetails', label: 'Child Details', color: '#FF8C42', emoji: '👶' },
    { key: 'screenThemes', label: 'Choosing Themes', color: '#FF8C42', emoji: '🎨' },
    { key: 'screenVoice', label: 'Voice Selection', color: '#FF8C42', emoji: '🎙️' },
    { key: 'screenLoading', label: 'Generating Preview', color: '#E67E22', emoji: '⏳' },
    { key: 'screenPreview', label: 'Listening to Preview', color: '#E67E22', emoji: '▶️' },
    { key: 'screenUnlock', label: 'Unlock / Checkout', color: '#FF6B9D', emoji: '💳' },
    { key: 'screenGenerating', label: 'Full Story Generating', color: '#4CAF50', emoji: '🔄' },
    { key: 'screenFull', label: 'Playing Full Story', color: '#4CAF50', emoji: '🎉' },
    { key: 'screenLogin', label: 'Login', color: '#999', emoji: '🔑' },
    { key: 'screenLibrary', label: 'My Stories', color: '#999', emoji: '📚' },
    { key: 'screenShared', label: 'Shared Link', color: '#00B4A0', emoji: '🔗' }
  ];

  const maxCount = Math.max(...Object.values(screens), 1);

  let html = '';

  // Header
  html += '<div class="live-header">';
  html += '<h2><span class="live-pulse"></span> Live Activity</h2>';
  html += '<span class="live-ago">Last 5 minutes · auto refreshes every 10s</span>';
  html += '</div>';

  // Big number
  html += '<div class="live-big-number">';
  html += '<div class="big">' + total + '</div>';
  html += '<div class="big-label">page views in the last 5 minutes</div>';
  html += '</div>';

  // Device split inline
  const devParts = [];
  if (devices.mobile) devParts.push('📱 ' + devices.mobile + ' mobile');
  if (devices.desktop) devParts.push('💻 ' + devices.desktop + ' desktop');
  if (devices.tablet) devParts.push('📟 ' + devices.tablet + ' tablet');
  if (devParts.length) {
    html += '<div style="text-align:center;font-size:0.78rem;color:#999;font-weight:600;margin-bottom:1.5rem">' + devParts.join(' &nbsp;·&nbsp; ') + '</div>';
  }

  // Funnel stages
  html += '<div class="chart-card live-funnel"><h3>Where People Are Right Now</h3>';
  let hasAny = false;
  for (const stage of stageConfig) {
    const count = screens[stage.key] || 0;
    if (count === 0) continue;
    hasAny = true;
    const pct = Math.max(Math.round((count / maxCount) * 100), 6);
    html += '<div class="live-stage">';
    html += '<div class="ls-dot" style="background:' + stage.color + '"></div>';
    html += '<span class="ls-name">' + stage.emoji + ' ' + stage.label + '</span>';
    html += '<div class="ls-bar-wrap"><div class="ls-bar-fill" style="width:' + pct + '%;background:' + stage.color + '"></div></div>';
    html += '<span class="ls-count">' + count + '</span>';
    html += '</div>';
  }

  // Show any unknown screens
  for (const [key, count] of Object.entries(screens)) {
    if (stageConfig.some(s => s.key === key) || !count) continue;
    hasAny = true;
    const pct = Math.max(Math.round((count / maxCount) * 100), 6);
    html += '<div class="live-stage">';
    html += '<div class="ls-dot" style="background:#ccc"></div>';
    html += '<span class="ls-name">' + esc(key) + '</span>';
    html += '<div class="ls-bar-wrap"><div class="ls-bar-fill" style="width:' + pct + '%;background:#ccc"></div></div>';
    html += '<span class="ls-count">' + count + '</span>';
    html += '</div>';
  }

  if (!hasAny) html += '<div style="color:#999;font-size:0.82rem;padding:1rem 0;text-align:center">No activity right now</div>';
  html += '</div>';

  // Live event feed
  html += '<div class="chart-card live-feed"><h3>Live Feed</h3>';
  if (events.length) {
    for (const ev of events) {
      const stageInfo = stageConfig.find(s => s.key === ev.screen) || { emoji: '·', label: ev.screen };
      const timeLabel = ev.secondsAgo < 60 ? ev.secondsAgo + 's ago' : Math.round(ev.secondsAgo / 60) + 'm ago';
      const deviceIcon = ev.device === 'mobile' ? '📱' : ev.device === 'tablet' ? '📟' : '💻';
      html += '<div class="live-event">';
      html += '<span class="le-icon">' + stageInfo.emoji + '</span>';
      html += '<span class="le-text">' + deviceIcon + ' ' + esc(stageInfo.label);
      if (ev.source && ev.source !== 'direct') html += ' <span style="color:#bbb">via ' + esc(ev.source) + '</span>';
      html += '</span>';
      html += '<span class="le-time">' + timeLabel + '</span>';
      html += '</div>';
    }
  } else {
    html += '<div style="color:#999;font-size:0.82rem;padding:1rem 0;text-align:center">No recent events</div>';
  }
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
