<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hear Their Name Admin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: #FEFBF6; color: #2D2844; min-height: 100vh; }
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 360px; width: 100%; text-align: center; }
.login-box h1 { color: #6B2F93; font-size: 1.5rem; margin-bottom: 1rem; }
.login-box input { width: 100%; padding: 0.75rem 1rem; border: 2px solid #E8E0F0; border-radius: 10px; font-size: 1rem; font-family: inherit; margin-bottom: 0.75rem; }
.login-box button { width: 100%; padding: 0.75rem; background: #6B2F93; color: #fff; border: none; border-radius: 50px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.login-box .err { color: #FF6B9D; font-size: 0.82rem; margin-top: 0.5rem; display: none; }

.admin { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.admin.active { display: block; }
.admin h1 { color: #6B2F93; font-size: 1.4rem; margin-bottom: 0.25rem; }
.admin .sub { color: #999; font-size: 0.82rem; margin-bottom: 1.5rem; }

.tabs { display: flex; gap: 0.4rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 0.5rem 1.2rem; border-radius: 50px; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: 2px solid #E8E0F0; background: #fff; color: #2D2844; transition: all 0.2s; }
.tab.active { background: #6B2F93; color: #fff; border-color: #6B2F93; }

.card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; box-shadow: 0 1px 6px rgba(0,0,0,0.04); border: 1px solid #F0ECF5; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
.card-title { font-weight: 800; font-size: 0.95rem; }
.card-meta { font-size: 0.75rem; color: #999; }
.card-detail { font-size: 0.82rem; color: #666; line-height: 1.6; margin-bottom: 0.3rem; }
.card-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; flex-wrap: wrap; }
.btn { padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.78rem; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
.btn-purple { background: #6B2F93; color: #fff; }
.btn-orange { background: #F1753B; color: #fff; }
.btn-green { background: #4CAF50; color: #fff; }
.btn-red { background: #FF6B9D; color: #fff; }
.btn-outline { background: transparent; border: 2px solid #E8E0F0; color: #666; }
.badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
.badge-green { background: #E8F5E9; color: #2E7D32; }
.badge-orange { background: #FFF3E0; color: #E65100; }
.badge-purple { background: #F3E8FF; color: #7C3AED; }
.badge-red { background: #FFEBEE; color: #C62828; }
.badge-blue { background: #E3F2FD; color: #1565C0; }

.empty { text-align: center; padding: 3rem; color: #999; }
.loading { text-align: center; padding: 2rem; color: #6B2F93; font-weight: 700; }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid #F0ECF5; text-align: center; }
.stat-card .stat-value { font-size: 2.2rem; font-weight: 800; color: #6B2F93; line-height: 1; margin-bottom: 0.3rem; }
.stat-card .stat-label { font-size: 0.72rem; color: #999; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.5rem; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 1.1rem; color: #6B2F93; margin-bottom: 1rem; }
.modal label { display: block; font-size: 0.82rem; font-weight: 700; color: #666; margin-bottom: 0.25rem; margin-top: 0.75rem; }
.modal textarea { width: 100%; padding: 0.6rem 0.8rem; border: 2px solid #E8E0F0; border-radius: 10px; font-size: 0.9rem; font-family: inherit; height: 100px; resize: vertical; }
.modal .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }

.story-text-preview { background: #F8F5FF; border-radius: 12px; padding: 1rem; margin-top: 0.75rem; max-height: 300px; overflow-y: auto; font-size: 0.82rem; line-height: 1.7; color: #2D2844; white-space: pre-wrap; }

audio { width: 100%; margin-top: 0.5rem; }
.filter-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.filter-pill { padding: 0.35rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: 2px solid #E8E0F0; background: #fff; color: #666; }
.filter-pill.active { background: #6B2F93; color: #fff; border-color: #6B2F93; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Hear Their Name Admin</h1>
    <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Log in</button>
    <p class="err" id="loginErr">Wrong password</p>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin" id="adminPanel">
  <h1>Hear Their Name</h1>
  <p class="sub" id="statsLine">Loading...</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('queue',this)">Queue</div>
    <div class="tab" onclick="switchTab('delivered',this)">Delivered</div>
    <div class="tab" onclick="switchTab('rejected',this)">Bad stories</div>
    <div class="tab" onclick="switchTab('stats',this)">Stats</div>
  </div>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- Story Text Modal -->
<div class="modal-overlay" id="storyModal">
  <div class="modal">
    <h2 id="storyModalTitle">Story text</h2>
    <div class="story-text-preview" id="storyModalText"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('storyModal')">Close</button>
    </div>
  </div>
</div>

<!-- Regenerate Modal -->
<div class="modal-overlay" id="regenModal">
  <div class="modal">
    <h2>Regenerate story</h2>
    <p style="font-size:0.82rem;color:#666;margin-bottom:0.5rem">Add notes for the rewrite. The customer's original feedback (if any) will also be included.</p>
    <label>Your notes</label>
    <textarea id="regenNotes" placeholder="e.g. Make the dragon less scary, add more dialogue for the friend"></textarea>
    <p id="regenStatus" style="font-size:0.82rem;color:#6B2F93;margin-top:0.5rem;display:none"></p>
    <div class="modal-actions">
      <button class="btn btn-orange" id="regenBtn" onclick="submitRegen()">Regenerate</button>
      <button class="btn btn-outline" onclick="closeModal('regenModal')">Cancel</button>
    </div>
  </div>
</div>

<script>
let adminSecret = '';
let currentTab = 'queue';
let regenStoryId = null;

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

// Auth
function adminLogin() {
  adminSecret = document.getElementById('adminPass').value.trim();
  if (!adminSecret) return;
  queueApi('list', { status: 'pending' }).then(data => {
    if (data.error) {
      document.getElementById('loginErr').style.display = 'block';
      adminSecret = '';
    } else {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').classList.add('active');
      renderQueue(data.stories || []);
      loadStats();
    }
  });
}

// Queue API helper
async function queueApi(action, params = {}, body = null) {
  const url = new URL('/api/admin-queue', window.location.origin);
  url.searchParams.set('action', action);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const opts = { headers: { 'x-admin-secret': adminSecret, 'Content-Type': 'application/json' } };
  if (body) { opts.method = 'POST'; opts.body = JSON.stringify(body); }
  const res = await fetch(url, opts);
  return res.json();
}

// Admin API helper (for old endpoints)
async function adminApi(action, params = {}) {
  const url = new URL('/api/admin', window.location.origin);
  url.searchParams.set('action', action);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const res = await fetch(url, { headers: { 'x-admin-secret': adminSecret } });
  return res.json();
}

// Tabs
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
  if (tab === 'queue') loadQueue('pending');
  else if (tab === 'delivered') loadQueue('delivered');
  else if (tab === 'rejected') loadRejected();
  else if (tab === 'stats') loadStatsTab();
}

// ===== QUEUE =====
async function loadQueue(status) {
  const data = await queueApi('list', { status });
  if (status === 'pending') renderQueue(data.stories || []);
  else renderDelivered(data.stories || []);
}

const VOICE_NAMES = { 'N2lVS1w4EtoT3dr4eOWO':'Callum', 'oWAxZDx7w5VEj9dCyTzz':'Grace', 'onwK4e9ZLuTAKqWW03F9':'Daniel', 'ThT5KcBeYPX3keUQqHPh':'Dorothy', 'g5CIjZEefAph4nQFvHAz':'Ethan', 'ZQe5CZNOzWyzPSCn5a3c':'James', 'cjVigY5qzO86Huf0OWal':'Eric' };

function renderQueue(stories) {
  if (!stories.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No pending requests. All caught up!</div>';
    return;
  }
  let html = '';
  for (const s of stories) {
    const sd = s.story_data || {};
    const isMulti = sd.isMultiChild && sd.children && sd.children.length > 1;
    const catLabel = { bedtime:'Bedtime', journey:'Adventure', learning:'Learning' }[s.category] || s.category;
    const hasFeedback = s.feedback && s.feedback.trim();
    const voiceName = VOICE_NAMES[s.voice_id] || s.voice_id || 'Unknown';
    const requesterName = sd.requesterName || '';

    html += '<div class="card">';

    // Header: child name + status + time
    html += '<div class="card-header">';
    html += '<span class="card-title">' + esc(s.child_name || 'Unknown') + ' <span style="font-weight:500;font-size:0.78rem;color:#999">' + catLabel + '</span></span>';
    html += '<span class="card-meta">' + timeAgo(s.created_at) + '</span>';
    html += '</div>';

    // Status badges
    html += '<div style="margin-bottom:0.5rem">';
    if (isMulti) html += '<span class="badge badge-blue">' + sd.children.length + ' children</span> ';
    if (s.status === 'generating') html += '<span class="badge badge-orange">Generating...</span> ';
    if (s.status === 'ready') html += '<span class="badge badge-green">Audio ready</span> ';
    if (!s.story_text) html += '<span class="badge badge-orange">Needs text</span> ';
    html += '</div>';

    // Customer info
    html += '<div style="background:#F8F7FA;border-radius:10px;padding:0.75rem;margin-bottom:0.75rem;font-size:0.8rem;line-height:1.6">';
    if (requesterName) html += '<strong>From:</strong> ' + esc(requesterName) + '<br>';
    html += '<strong>Email:</strong> ' + esc(s.email) + '<br>';
    html += '<strong>Narrator:</strong> ' + esc(voiceName);
    html += '</div>';

    // What they told us (the input)
    html += '<details style="margin-bottom:0.75rem">';
    html += '<summary style="font-size:0.78rem;font-weight:700;color:#6B2F93;cursor:pointer;padding:0.3rem 0">What they shared with us</summary>';
    html += '<div style="background:#F8F5FF;border-radius:10px;padding:0.75rem;margin-top:0.4rem;font-size:0.78rem;line-height:1.7">';

    if (isMulti && sd.children) {
      for (const c of sd.children) {
        html += '<strong>' + esc(c.name) + '</strong> (' + esc(c.gender) + ', age ' + esc(c.age) + ')';
        if (c.about) html += ' — ' + esc(c.about);
        html += '<br>';
      }
    } else {
      if (sd.childName) html += '<strong>Name:</strong> ' + esc(sd.childName) + '<br>';
      if (sd.age) html += '<strong>Age:</strong> ' + esc(sd.age) + '<br>';
      if (sd.gender) html += '<strong>Gender:</strong> ' + esc(sd.gender) + '<br>';
    }
    if (sd.friendName) html += '<strong>Best friend:</strong> ' + esc(sd.friendName) + '<br>';
    if (sd.sidekickName) html += '<strong>Sidekick:</strong> ' + esc(sd.sidekickName) + '<br>';
    if (sd.familyMembers) html += '<strong>Family:</strong> ' + esc(sd.familyMembers) + '<br>';
    if (sd.hasPet && sd.petName) html += '<strong>Pet:</strong> ' + esc(sd.petName) + (sd.petType ? ' (' + esc(sd.petType) + ')' : '') + '<br>';
    if (sd.hasVillain && sd.villainName) html += '<strong>Villain:</strong> ' + esc(sd.villainName) + '<br>';
    if (sd.favTeddy) html += '<strong>Special item:</strong> ' + esc(sd.favTeddy) + '<br>';
    if (sd.themes && sd.themes.length) html += '<strong>Interests:</strong> ' + esc(sd.themes.join(', ')) + (sd.themeDetail ? ' (' + esc(sd.themeDetail) + ')' : '') + '<br>';
    if (sd.setting) html += '<strong>Setting:</strong> ' + esc(sd.setting) + '<br>';
    if (sd.siblingDynamics) html += '<strong>Sibling dynamic:</strong> ' + esc(sd.siblingDynamics) + '<br>';
    if (sd.extraDetails) html += '<strong>Extra notes:</strong> ' + esc(sd.extraDetails) + '<br>';
    if (sd.subject) html += '<strong>Subject:</strong> ' + esc(sd.subject) + '<br>';
    if (sd.learningGoal) html += '<strong>Learning goal:</strong> ' + esc(sd.learningGoal) + '<br>';

    html += '</div>';
    html += '<button class="btn btn-outline" style="margin-top:0.4rem" onclick="editStoryData(\'' + esc(s.id) + '\',this)">Edit input</button>';
    html += '</details>';

    // Customer feedback (if rewrite request)
    if (hasFeedback) {
      html += '<div style="background:#FFF8F0;border-radius:8px;padding:0.6rem 0.8rem;margin:0 0 0.75rem;border-left:3px solid #F1753B">';
      html += '<p style="font-size:0.72rem;font-weight:700;color:#E65100;margin:0 0 0.2rem">Customer feedback</p>';
      html += '<p style="font-size:0.82rem;color:#2D2844;margin:0;line-height:1.5">' + esc(s.feedback) + '</p>';
      html += '</div>';
    }


    // Story text (if generated)
    if (s.story_text) {
      html += '<details style="margin:0.75rem 0">';
      html += '<summary style="font-size:0.78rem;font-weight:700;color:#6B2F93;cursor:pointer;padding:0.3rem 0">Read the story</summary>';
      html += '<div class="story-text-preview" id="storyText_' + esc(s.id) + '">' + esc(s.story_text) + '</div>';
      html += '<div style="margin-top:0.5rem;display:flex;gap:0.4rem">';
      html += '<button class="btn btn-outline" onclick="editStoryText(\'' + esc(s.id) + '\')">Edit text</button>';
      html += '</div>';
      html += '</details>';
    }

    // Audio player
    if (s.audio_url) {
      html += '<audio controls preload="none" src="' + esc(s.audio_url) + '" style="width:100%;margin:0.5rem 0"></audio>';
    }

    // Actions
    html += '<div class="card-actions">';
    if (!s.story_text) {
      html += '<button class="btn btn-purple" onclick="generateStoryText(\'' + esc(s.id) + '\',this)">Generate story</button>';
    } else if (!s.audio_url || s.status !== 'ready') {
      html += '<button class="btn btn-purple" onclick="generateTTS(\'' + esc(s.id) + '\',this)">Generate audio</button>';
    }
    if (s.story_text) {
      html += '<button class="btn btn-orange" onclick="openRegen(\'' + esc(s.id) + '\')">Regenerate</button>';
    }
    if (s.audio_url) {
      html += '<button class="btn btn-green" onclick="sendStory(\'' + esc(s.id) + '\',this)">Send to customer</button>';
    }
    html += '</div></div>';
  }
  document.getElementById('content').innerHTML = html;
}

function renderDelivered(stories) {
  if (!stories.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No delivered stories yet</div>';
    return;
  }
  let html = '';
  for (const s of stories) {
    const catLabel = { bedtime:'Bedtime', journey:'Adventure', learning:'Learning' }[s.category] || s.category;
    const date = new Date(s.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    html += '<div class="card">';
    html += '<div class="card-header"><span class="card-title">' + esc(s.child_name) + '</span><span class="card-meta">' + date + '</span></div>';
    html += '<div class="card-detail">' + catLabel + ' &middot; ' + esc(s.email) + '</div>';
    if (s.audio_url) html += '<audio controls preload="none" src="' + esc(s.audio_url) + '"></audio>';
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

// Queue actions
async function viewStory(id) {
  const data = await queueApi('get', { id });
  const s = data.story;
  if (!s) { alert('Story not found'); return; }
  document.getElementById('storyModalTitle').textContent = (s.child_name || 'Story') + ' text';
  document.getElementById('storyModalText').textContent = s.story_text || 'No story text available';
  document.getElementById('storyModal').classList.add('active');
}

function editStoryData(id, btn) {
  var card = btn.closest('details');
  var dataDiv = card.querySelector('div[style*="F8F5FF"]');
  if (!dataDiv) return;

  // Fetch the story to get the raw story_data
  queueApi('get', { id: id }).then(function(data) {
    var s = data.story;
    if (!s) { alert('Story not found'); return; }
    var sd = s.story_data || {};
    var isMulti = sd.isMultiChild && sd.children && sd.children.length > 1;

    var fields = '';
    if (isMulti && sd.children) {
      sd.children.forEach(function(c, i) {
        fields += '<div style="margin-bottom:0.5rem;padding-bottom:0.5rem;border-bottom:1px solid #E8E0F0">';
        fields += '<strong style="font-size:0.75rem">Child ' + (i+1) + '</strong><br>';
        fields += '<label style="font-size:0.72rem;color:#666">Name</label><input data-field="children.' + i + '.name" value="' + esc(c.name || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
        fields += '<label style="font-size:0.72rem;color:#666">Age</label><input data-field="children.' + i + '.age" value="' + esc(c.age || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
        fields += '<label style="font-size:0.72rem;color:#666">About</label><input data-field="children.' + i + '.about" value="' + esc(c.about || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem">';
        fields += '</div>';
      });
    } else {
      fields += '<label style="font-size:0.72rem;color:#666">Name</label><input data-field="childName" value="' + esc(sd.childName || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
      fields += '<label style="font-size:0.72rem;color:#666">Age</label><input data-field="age" value="' + esc(sd.age || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
      fields += '<label style="font-size:0.72rem;color:#666">Gender</label><input data-field="gender" value="' + esc(sd.gender || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    }
    fields += '<label style="font-size:0.72rem;color:#666">Best friend</label><input data-field="friendName" value="' + esc(sd.friendName || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Family</label><input data-field="familyMembers" value="' + esc(sd.familyMembers || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Pet name</label><input data-field="petName" value="' + esc(sd.petName || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Pet type</label><input data-field="petType" value="' + esc(sd.petType || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Villain</label><input data-field="villainName" value="' + esc(sd.villainName || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Special item</label><input data-field="favTeddy" value="' + esc(sd.favTeddy || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Interests</label><input data-field="themes" value="' + esc((sd.themes || []).join(', ')) + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Setting</label><input data-field="setting" value="' + esc(sd.setting || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Extra notes</label><input data-field="extraDetails" value="' + esc(sd.extraDetails || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';
    fields += '<label style="font-size:0.72rem;color:#666">Sibling dynamic</label><input data-field="siblingDynamics" value="' + esc(sd.siblingDynamics || '') + '" style="width:100%;padding:0.3rem 0.5rem;border:1.5px solid #E8E0F0;border-radius:6px;font-size:0.82rem;margin-bottom:0.3rem">';

    dataDiv.innerHTML = '<div id="editFields_' + id + '">' + fields +
      '<div style="display:flex;gap:0.4rem;margin-top:0.75rem">' +
      '<button class="btn btn-purple" onclick="saveStoryData(\'' + id + '\')">Save input</button>' +
      '<button class="btn btn-outline" onclick="loadQueue(\'pending\')">Cancel</button>' +
      '</div></div>';
  });
}

function saveStoryData(id) {
  var container = document.getElementById('editFields_' + id);
  if (!container) return;

  // Build updated story_data from the fields
  var updates = {};
  container.querySelectorAll('input[data-field]').forEach(function(input) {
    var field = input.dataset.field;
    var val = input.value.trim();
    if (field === 'themes') {
      updates.themes = val ? val.split(',').map(function(t) { return t.trim(); }) : [];
    } else if (field.startsWith('children.')) {
      // e.g. children.0.name
      var parts = field.split('.');
      if (!updates.children) updates.children = [];
      var idx = parseInt(parts[1]);
      if (!updates.children[idx]) updates.children[idx] = {};
      updates.children[idx][parts[2]] = val;
    } else {
      updates[field] = val;
    }
  });

  queueApi('update-data', {}, { storyId: id, updates: updates }).then(function(data) {
    if (data.success) {
      alert('Input saved. Regenerate the story to apply changes.');
      loadQueue('pending');
    } else {
      alert('Failed: ' + (data.error || 'Unknown'));
    }
  });
}

function editStoryText(id) {
  var el = document.getElementById('storyText_' + id);
  if (!el) return;
  var currentText = el.textContent;
  el.innerHTML = '<textarea id="storyEdit_' + id + '" style="width:100%;min-height:300px;padding:0.75rem;border:2px solid #6B2F93;border-radius:10px;font-size:0.82rem;line-height:1.7;font-family:inherit;resize:vertical">' + esc(currentText) + '</textarea>' +
    '<div style="display:flex;gap:0.4rem;margin-top:0.5rem">' +
    '<button class="btn btn-purple" onclick="saveStoryText(\'' + id + '\')">Save changes</button>' +
    '<button class="btn btn-outline" onclick="loadQueue(\'pending\')">Cancel</button>' +
    '</div>';
}

async function saveStoryText(id) {
  var textarea = document.getElementById('storyEdit_' + id);
  if (!textarea) return;
  var newText = textarea.value.trim();
  if (!newText) { alert('Story text cannot be empty'); return; }

  try {
    var data = await queueApi('update-text', {}, { storyId: id, storyText: newText });
    if (data.success) {
      alert('Story text saved');
      loadQueue('pending');
    } else {
      alert('Failed to save: ' + (data.error || 'Unknown error'));
    }
  } catch (e) {
    alert('Failed to save');
  }
}

async function generateStoryText(id, btn) {
  btn.disabled = true;
  btn.textContent = 'Writing story...';
  const data = await queueApi('generate-text', {}, { storyId: id });
  if (data.success) {
    btn.textContent = 'Done! ' + (data.wordCount || '') + ' words';
    btn.className = 'btn btn-green';
    setTimeout(() => loadQueue('pending'), 1500);
  } else {
    btn.textContent = 'Failed';
    btn.disabled = false;
    alert('Story generation failed: ' + (data.error || 'Unknown error'));
  }
}

async function generateTTS(id, btn) {
  btn.disabled = true;
  btn.textContent = 'Generating...';
  const data = await queueApi('generate-tts', {}, { storyId: id });
  if (data.success) {
    btn.textContent = 'Done!';
    btn.className = 'btn btn-green';
    setTimeout(() => loadQueue('pending'), 1000);
  } else {
    btn.textContent = 'Failed';
    btn.disabled = false;
    alert('TTS generation failed: ' + (data.error || 'Unknown error'));
  }
}

function openRegen(id) {
  regenStoryId = id;
  document.getElementById('regenNotes').value = '';
  document.getElementById('regenStatus').style.display = 'none';
  document.getElementById('regenModal').classList.add('active');
}

async function submitRegen() {
  if (!regenStoryId) return;
  const notes = document.getElementById('regenNotes').value.trim();
  const status = document.getElementById('regenStatus');
  const btn = document.getElementById('regenBtn');
  btn.disabled = true;
  status.textContent = 'Regenerating story...';
  status.style.color = '#6B2F93';
  status.style.display = 'block';

  const data = await queueApi('regenerate', {}, { storyId: regenStoryId, notes });
  if (data.success) {
    status.textContent = data.message || 'Regenerating in background. Refresh in about a minute.';
    status.style.color = '#4CAF50';
    btn.disabled = false;
    setTimeout(() => { closeModal('regenModal'); loadQueue('pending'); }, 3000);
  } else {
    status.textContent = 'Error: ' + (data.error || 'Unknown');
    status.style.color = '#FF6B9D';
    btn.disabled = false;
  }
}

async function sendStory(id, btn) {
  if (!confirm('Send the delivery email to the customer?')) return;
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const data = await queueApi('send', {}, { storyId: id });
  if (data.success) {
    btn.textContent = 'Sent!';
    btn.className = 'btn btn-green';
    setTimeout(() => loadQueue('pending'), 1500);
  } else {
    btn.textContent = 'Failed';
    btn.disabled = false;
    alert('Send failed: ' + (data.error || 'Unknown error'));
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ===== BAD STORIES =====
async function loadRejected() {
  // Fetch stories that have rejected_versions
  const data = await queueApi('list', { status: 'pending' });
  const deliveredData = await queueApi('list', { status: 'delivered' });
  const allStories = [...(data.stories || []), ...(deliveredData.stories || [])];
  const withRejected = allStories.filter(s => s.rejected_versions && s.rejected_versions.length > 0);

  if (!withRejected.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No rejected stories yet. When you regenerate a story, the old version gets saved here.</div>';
    return;
  }

  let html = '';
  for (const s of withRejected) {
    const sd = s.story_data || {};
    const voiceName = VOICE_NAMES[s.voice_id] || s.voice_id || 'Unknown';

    for (let i = 0; i < s.rejected_versions.length; i++) {
      const rv = s.rejected_versions[i];
      const date = new Date(rv.rejected_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });

      html += '<div class="card">';
      html += '<div class="card-header">';
      html += '<span class="card-title">' + esc(s.child_name || 'Unknown') + ' <span style="font-weight:500;font-size:0.78rem;color:#FF6B9D">Rejected #' + (i + 1) + '</span></span>';
      html += '<span class="card-meta">' + date + '</span>';
      html += '</div>';

      html += '<div style="font-size:0.78rem;color:#666;margin-bottom:0.5rem">';
      html += esc(s.email) + ' &middot; ' + esc(voiceName);
      html += '</div>';

      if (rv.notes) {
        html += '<div style="background:#FFF8F0;border-radius:8px;padding:0.5rem 0.7rem;margin-bottom:0.5rem;border-left:3px solid #F1753B">';
        html += '<p style="font-size:0.72rem;font-weight:700;color:#E65100;margin:0 0 0.2rem">Why it was rejected</p>';
        html += '<p style="font-size:0.78rem;color:#2D2844;margin:0;line-height:1.5">' + esc(rv.notes) + '</p>';
        html += '</div>';
      }

      html += '<details>';
      html += '<summary style="font-size:0.78rem;font-weight:700;color:#6B2F93;cursor:pointer;padding:0.3rem 0">Read rejected story</summary>';
      html += '<div class="story-text-preview">' + esc(rv.text) + '</div>';
      html += '</details>';

      html += '</div>';
    }
  }
  document.getElementById('content').innerHTML = html;
}

// ===== STATS =====
async function loadStats() {
  try {
    const data = await adminApi('metrics', { days: 30 });
    const s = data.simplified || {};
    document.getElementById('statsLine').textContent =
      (s.totalStories || 0) + ' stories delivered';
  } catch(e) {
    document.getElementById('statsLine').textContent = 'Admin ready';
  }
}

async function loadStatsTab() {
  let html = '<div class="stat-grid">';

  try {
    const data = await adminApi('metrics', { days: 30 });
    const s = data.simplified || {};
    html += statCard(s.totalStories || 0, 'Stories delivered');
    html += statCard(s.totalRequests || s.totalCustomers || 0, 'Requests');
  } catch(e) {
    html += '<div class="empty">Could not load stats</div>';
  }

  html += '</div>';

  // Pending queue count
  try {
    const q = await queueApi('list', { status: 'pending' });
    const pending = (q.stories || []).length;
    html += '<div class="card"><div class="card-header"><span class="card-title">Pending requests</span><span class="badge badge-orange">' + pending + '</span></div></div>';
  } catch(e) {}

  document.getElementById('content').innerHTML = html;
}

function statCard(value, label) {
  return '<div class="stat-card"><div class="stat-value">' + value + '</div><div class="stat-label">' + label + '</div></div>';
}
