[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-preview"]
  external_node_modules = []

[functions."story-worker-background"]
  external_node_modules = []

[functions."generate-full"]
  external_node_modules = ["stripe"]

[functions."full-worker-background"]
  external_node_modules = []

[functions."create-discount"]
  external_node_modules = ["stripe"]

[functions."stripe-webhook"]
  external_node_modules = ["stripe"]

[functions."retry-worker"]
  schedule = "*/5 * * * *"


[[edge_functions]]
  path = "/*"
  function = "redirect-old-domain"

[[edge_functions]]
  path = "/"
  function = "og-shared"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 301 redirect old domain to new domain (handled by edge function)
# Edge function redirect-old-domain.js catches storytold.ai requests
