[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-preview"]
  external_node_modules = []

[functions."preview-worker-background"]
  external_node_modules = []

[functions."full-worker-v2-background"]
  external_node_modules = []

[functions."stripe-webhook-paid"]
  external_node_modules = ["stripe"]

[functions."checkout-paid"]
  external_node_modules = ["stripe"]

[functions."refund-request"]
  external_node_modules = ["stripe"]

[functions."story-worker-background"]
  external_node_modules = []

[functions."generate-full"]
  external_node_modules = ["stripe"]

[functions."full-worker-background"]
  external_node_modules = []

[functions."create-discount"]
  external_node_modules = ["stripe"]

[functions."stripe-webhook"]
  external_node_modules = ["stripe"]

[functions."create-donation"]
  external_node_modules = ["stripe"]

# Retry worker disabled — moving to queued delivery system
# [functions."retry-worker"]
#   schedule = "*/5 * * * *"

[functions."followup-worker"]
  schedule = "*/30 * * * *"


[[edge_functions]]
  path = "/*"
  function = "redirect-old-domain"

[[edge_functions]]
  path = "/"
  function = "og-shared"

[[redirects]]
  from = "/story/*"
  to = "/story.html"
  status = 200

[[redirects]]
  from = "/preview/*"
  to = "/preview.html"
  status = 200

[[redirects]]
  from = "/listen/*"
  to = "/listen.html"
  status = 200

[[redirects]]
  from = "/start"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/start/*"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/account/story/*/re-record"
  to = "/account-action.html"
  status = 200

[[redirects]]
  from = "/account/story/*/refund"
  to = "/account-action.html"
